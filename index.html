  :root{--bg:#f6f3ee;--card:#fffdfa;--ink:#2a2621;--muted:#8c8377;--line:#ece6dc;--accent:#a5282a;--accent-soft:#f6e7e3;--gold:#a9803a;--ok:#3c7a54;--shadow:0 4px 18px rgba(60,45,30,.07);--walk:#3c7a54;--transit:#2f6db0;--didi:#c9871f;--meal:#9a6d2f;}
  @media (prefers-color-scheme: dark){:root{--bg:#15120e;--card:#1e1a15;--ink:#ece6db;--muted:#9a9184;--line:#2d2820;--accent:#e26a5f;--accent-soft:#2c1815;--gold:#cda45f;--ok:#4fb37a;--shadow:0 4px 20px rgba(0,0,0,.4);--walk:#4fb37a;--transit:#5fa0e0;--didi:#e0ad55;--meal:#d3a45e;}}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  /* 'clip' y no 'hidden': hidden crea un contenedor de scroll y rompe el position:sticky de la cabecera */
  html,body{max-width:100%;overflow-x:clip}
  /* franja opaca bajo la hora y la cobertura: nada de la app pasa por debajo */
  .statusbar{position:fixed;top:0;left:0;right:0;height:env(safe-area-inset-top);background:var(--bg);z-index:30}
  /* iOS Safari hace zoom al enfocar cualquier campo de menos de 16px y NO lo deshace */
  input,textarea,select{font-size:16px}
  body{margin:0;background:var(--bg);color:var(--ink);font:15.5px/1.5 'Nunito Sans',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
  body.dragging{touch-action:none;user-select:none}
  .disp{font-family:'Sora','Nunito Sans',-apple-system,sans-serif}
  svg.ic{width:1em;height:1em;vertical-align:-.14em;flex:0 0 auto}
  button{font-family:inherit}
  header{position:sticky;top:env(safe-area-inset-top);z-index:20;background:color-mix(in srgb,var(--card) 90%,transparent);-webkit-backdrop-filter:saturate(140%) blur(12px);backdrop-filter:saturate(140%) blur(12px);border-bottom:1px solid var(--line);padding:11px 16px 9px}

</style>
</head>

<div class="statusbar"></div>

</header>

<footer>Mantén pulsado un sitio para arrastrarlo y reordenar. Los cambios se guardan en este móvil y se sincronizan con el otro cuando hay conexión. <br><button class="verbtn" id="verBtn">v17 · Buscar actualización</button></footer>

function orderedIds(day){const d=ds(day.id);if(d.order&&d.order.length===day.items.length)return d.order.slice();return day.items.map(it=>it.id);}
function itemById(day,id){return day.items.find(it=>it.id===id);}
function visitMin(day,it){const d=ds(day.id);return d.visitas[it.id]!=null?d.visitas[it.id]:(it.kind==="meal"?it.min:it.visitaMin);}
function legData(day,aId,bId){const key=aId+">"+bId,pre=day.legs[key];if(pre)return Object.assign({key:key,est:false},pre);

function legGastos(day,key){return ds(day.id).gastos[key]||[];}
function sum(arr){return arr.reduce((s,g)=>s+(+g.amount||0),0);}

function tripSummary(){const days=[];const byCat={entradas:0,comidas:0,transporte:0,extras:0};
  VIAJE.dias.forEach(day=>{const d=ds(day.id);let dt={entradas:0,comidas:0,transporte:0,extras:0};
    const seq=visibleSeq(day);let prev=null;
    seq.forEach(({it,isLoc})=>{const g=sum(gastosOf(day,it));if(it.kind==="meal")dt.comidas+=g;else dt.entradas+=g;
      if(isLoc&&prev){dt.transporte+=sum(legGastos(day,prev.id+">"+it.id));}if(isLoc)prev=it;});
    dt.extras+=sum(d.extras);
    const tot=dt.entradas+dt.comidas+dt.transporte+dt.extras;

/* ---------- AVISO DE VERSIÓN NUEVA ----------
   Pregunta por un fichero de 3 bytes, no recarga nada. Si hay versión nueva avisa y deja
   que el usuario decida: recargar solo le cortaría a media edición. */
const VER="v17";
let updVista=false;
/* Lo lanza SOLO el usuario, desde el botón del pie. Sin comprobaciones automáticas: él sabe
   cuándo se ha publicado algo, y así nada le interrumpe por su cuenta. */
async function chkVer(){
  if(updVista)return;
  const b=document.getElementById("verBtn");
  if(!navigator.onLine){toast("Sin conexión");return;}
  if(b)b.classList.add("busy");
  try{
    const r=await fetch("version.txt?t="+Date.now(),{cache:"no-store"});
    if(!r.ok)throw new Error(r.status);
    const v=(await r.text()).trim();
    if(v&&v!==VER){updVista=true;barraUpd(v);}
    else toast("Ya tienes la última versión ("+VER+")");
  }catch(e){toast("No se pudo comprobar");}
  if(b)b.classList.remove("busy");}
function barraUpd(v){
  if(document.getElementById("updbar"))return;
  const b=document.createElement("div");b.id="updbar";b.className="updbar";
  b.innerHTML='<span>'+ic("refresh-cw")+'Versión nueva '+esc(v)+'</span><button id="updGo">Actualizar</button>';
  document.body.appendChild(b);
  /* por duplicado a propósito: si el rAF no dispara, la barra se quedaría fuera de pantalla */
  const ver=()=>b.classList.add("show");
  requestAnimationFrame(ver);setTimeout(ver,60);
  b.querySelector("#updGo").onclick=async()=>{
    b.querySelector("#updGo").textContent="…";
    /* subimos lo pendiente antes de recargar, para no dejarlo colgado */
    try{if(sb&&navigator.onLine)await doSync(true);}catch(e){}
    try{if(navigator.serviceWorker){const r=await navigator.serviceWorker.getRegistration();if(r)await r.update();}}catch(e){}
    location.reload();};}

/* ---------- SYNC ----------
   Cada dato modificado es una entrada independiente con su clave y su marca de tiempo.
   Los gastos llevan id propio: si los dos móviles añaden gastos a la vez, se suman los dos.
   Si se edita el MISMO dato en ambos, gana la marca de tiempo más reciente. */
const CFG="viajeChina.sb", SK="viajeChina.sync";
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
let sb=(function(){try{return JSON.parse(localStorage.getItem(CFG))||null}catch(e){return null}})();
let sync=(function(){try{return JSON.parse(localStorage.getItem(SK))||{}}catch(e){return{}}})();
sync.snap=sync.snap||{}; sync.pull=sync.pull||0; sync.dev=sync.dev||("m"+Math.random().toString(36).slice(2,6));
function saveSync(){try{localStorage.setItem(SK,JSON.stringify(sync))}catch(e){}}
let syncState=sb?"idle":"off", syncMsg="", pushT=null;

function sbFetch(path,opt){opt=opt||{};
  opt.headers=Object.assign({apikey:sb.key,Authorization:"Bearer "+sb.key},opt.headers||{});
  return fetch(sb.url.replace(/\/+$/,"")+path,opt);}

/* estado local -> entradas planas */
function exportEntries(){const e={};
  VIAJE.dias.forEach(day=>{const d=state[day.id];if(!d)return;const P=day.id+".";
    if(d.start)e[P+"start"]=d.start;
    if(d.order)e[P+"order"]=d.order;
    for(const k in d.hidden)if(d.hidden[k])e[P+"hid."+k]=1;
    for(const k in d.visitas)if(d.visitas[k]!=null)e[P+"vis."+k]=d.visitas[k];
    for(const k in d.modos)if(d.modos[k])e[P+"mod."+k]=d.modos[k];
    for(const k in d.tiempos)if(d.tiempos[k]!=null)e[P+"tim."+k]=d.tiempos[k];
    for(const slot in d.gastos){e[P+"gm."+slot]=1;
      d.gastos[slot].forEach(g=>{if(!g.id)g.id=gid();e[P+"g."+g.id]={s:slot,l:g.label,a:g.amount};});}
    (d.extras||[]).forEach(g=>{if(!g.id)g.id=gid();e[P+"g."+g.id]={s:"_x",l:g.label,a:g.amount};});
  });return e;}

/* entradas -> estado local (los gastos se reconstruyen enteros desde las entradas) */
function applySnap(){
  VIAJE.dias.forEach(day=>{const d=ds(day.id);
    d.hidden={};d.visitas={};d.modos={};d.tiempos={};d.gastos={};d.extras=[];delete d.order;delete d.start;});
  const gs={};
  for(const k in sync.snap){const e=sync.snap[k];if(e.v==null)continue;
    const i=k.indexOf(".");if(i<0)continue;
    const dayId=k.slice(0,i),rest=k.slice(i+1);
    if(!VIAJE.dias.some(x=>x.id===dayId))continue;
    const d=ds(dayId);
    if(rest==="start"){d.start=e.v;continue;}
    if(rest==="order"){d.order=e.v;continue;}
    const j=rest.indexOf(".");if(j<0)continue;
    const t=rest.slice(0,j),id=rest.slice(j+1);
    if(t==="hid")d.hidden[id]=true;
    else if(t==="vis")d.visitas[id]=e.v;
    else if(t==="mod")d.modos[id]=e.v;
    else if(t==="tim")d.tiempos[id]=e.v;
    else if(t==="gm"){d.gastos[id]=d.gastos[id]||[];}
    else if(t==="g"&&e.v&&e.v.s)(gs[dayId]=gs[dayId]||[]).push({id:id,s:e.v.s,l:e.v.l,a:e.v.a});}
  for(const dayId in gs){const d=ds(dayId);
    gs[dayId].sort((a,b)=>a.id<b.id?-1:a.id>b.id?1:0);
    gs[dayId].forEach(x=>{const o={id:x.id,label:x.l,amount:x.a};
      if(x.s==="_x")d.extras.push(o);else (d.gastos[x.s]=d.gastos[x.s]||[]).push(o);});}
  saveLocal();}

/* marca con la hora actual todo lo que haya cambiado desde la última vez */
function stampChanges(){const cur=exportEntries(),sn=sync.snap,now=Date.now();let n=0;
  for(const k in cur){const j=JSON.stringify(cur[k]);
    if(!sn[k]||sn[k].j!==j){sn[k]={j:j,v:cur[k],ts:now,dv:sync.dev,d:1};n++;}}
  for(const k in sn){if(!(k in cur)&&sn[k].v!==null){sn[k]={j:"null",v:null,ts:now,dv:sync.dev,d:1};n++;}}
  if(n){saveSync();if(syncState==="ok")setSync("idle");}
  return n;}

function pendientes(){let n=0;for(const k in sync.snap)if(sync.snap[k].d)n++;return n;}

function setSync(s,m){syncState=s;syncMsg=m||"";paintSync();}
function paintSync(){const b=document.getElementById("syncBtn");if(!b)return;
  const p=pendientes();
  const map={off:["cloud-off","","Conectar"],idle:["cloud",p?"pend":"",p?p+" sin subir":"Sincronizar"],
    busy:["refresh-cw","busy","Subiendo"],ok:["cloud","ok","Al día"],err:["triangle-alert","err","Error"]};
  const m=map[syncState]||map.idle;
  b.className="syncbtn "+m[1];b.innerHTML=ic(m[0])+'<span>'+m[2]+'</span>';b.title=syncMsg||m[2];}

async function pull(){
  const r=await sbFetch("/rest/v1/cambios?select=k,v,ts,dev&ts=gt."+(sync.pull||0)+"&order=ts.asc&limit=10000",{});
  if(!r.ok)throw new Error("HTTP "+r.status);
  const rows=await r.json();let n=0,max=sync.pull||0;
  rows.forEach(row=>{if(row.ts>max)max=row.ts;
    const cur=sync.snap[row.k];
    /* gana la marca más reciente; si empatan al milisegundo, desempata el id de móvil
       (siempre igual en los dos, para que acaben viendo lo mismo) */
    if(cur&&(cur.ts>row.ts||(cur.ts===row.ts&&(cur.dv||"")>=(row.dev||""))))return;
    sync.snap[row.k]={j:JSON.stringify(row.v),v:row.v,ts:row.ts,dv:row.dev};n++;});
  sync.pull=max;
  if(n)applySnap();
  saveSync();return n;}

async function push(){const rows=[];
  for(const k in sync.snap){const s=sync.snap[k];if(s.d)rows.push({k:k,v:s.v,ts:s.ts,dev:sync.dev});}
  if(!rows.length)return 0;
  for(let i=0;i<rows.length;i+=200){
    const r=await sbFetch("/rest/v1/cambios?on_conflict=k",{method:"POST",
      headers:{"Content-Type":"application/json","Prefer":"resolution=merge-duplicates"},
      body:JSON.stringify(rows.slice(i,i+200))});
    if(!r.ok)throw new Error("HTTP "+r.status);}
  rows.forEach(x=>{const s=sync.snap[x.k];if(s&&s.ts===x.ts)delete s.d;});
  saveSync();return rows.length;}

let syncing=false;
async function doSync(silent){
  if(!sb||syncing)return;
  if(!navigator.onLine){if(!silent)toast("Sin conexión · se sincronizará al volver");setSync("idle");return;}
  syncing=true;setSync("busy");
  try{
    const got=await pull();     /* primero traer: si el otro móvil es más nuevo, gana él */
    stampChanges();
    const sent=await push();
    setSync("ok");
    if(got){render();if(!silent)toast("Actualizado ("+got+" cambio"+(got>1?"s":"")+")");}
    else if(!silent)toast(sent?"Enviado":"Todo al día");
  }catch(e){setSync("err",String(e.message||e));if(!silent)toast("Error al sincronizar: "+(e.message||e));}
  syncing=false;paintSync();}

function queuePush(){paintSync();if(!sb)return;clearTimeout(pushT);pushT=setTimeout(()=>doSync(true),3000);}

  h+='<div class="gtot"><div class="n">¥'+num(S.total)+'</div><div class="l">Total estimado · 2 personas</div></div>';

  h+='<div class="filters">'+F.map(f=>'<button class="'+(gFilter===f[0]?"on":"")+'" data-f="'+f[0]+'">'+f[1]+'</button>').join("")+'</div>';

  if(gFilter==="todos"){
    h+='<div class="gcard"><h3>'+ic("wallet")+' Todos los gastos</h3><div class="gsub">'+E.length+' apuntes · ordenados por día</div>';
    if(!E.length)h+='<div class="gsub">Todavía no hay gastos. Añádelos en cada sitio, tramo o comida.</div>';
    E.sort((a,b)=>a.di-b.di).forEach(e=>{h+='<div class="grow2"><span class="dot" style="background:'+CATS[e.cat].col+'"></span><div class="c1"><b>'+e.label+'</b><span>Día '+(e.di+1)+' · '+e.src+'</span></div><span class="amt2">¥'+num(e.amount)+'</span></div>';});
    h+='</div>';
  } else if(gFilter==="tipo"){
    h+='<div class="gcard"><h3>'+ic("chart-pie")+' Todo el viaje por tipo</h3>'+catBars(S.byCat)+'</div>';
  } else if(gFilter==="dias"){
    h+='<div class="gcard"><h3>'+ic("calendar")+' Todo el viaje por días</h3>';
    /* todas las barras se miden contra el día más caro, para que sean comparables entre sí */
    const maxD=Math.max(1,...S.days.map(d=>d.tot));
    S.days.forEach((d,i)=>{
      h+='<div class="dday'+(d.tot?"":" zero")+'"><div class="top"><span>Día '+(i+1)+' · '+d.fecha+' · '+d.ciudad+'</span><b>¥'+num(d.tot)+'</b></div>'
        +'<div class="stack" style="width:'+(d.tot?Math.max(2,d.tot/maxD*100):100)+'%">';
      if(d.tot)for(const c in CATS){const v=d.dt[c]||0;if(v>0)
        h+='<i style="width:'+(v/d.tot*100)+'%;background:'+CATS[c].col+'" title="'+CATS[c].lb+': ¥'+num(v)+'"></i>';}
      h+='</div></div>';});
    h+='<div class="glegend">';
    for(const c in CATS)h+='<span><i style="background:'+CATS[c].col+'"></i>'+CATS[c].lb+'</span>';
    h+='</div></div>';
  } else {
    S.days.forEach((d,i)=>{h+='<div class="gcard"><h3>'+ic("calendar")+' Día '+(i+1)+' · '+d.fecha+' · '+d.ciudad+'</h3><div class="gsub">Total del día: ¥'+num(d.tot)+'</div>'+catBars(d.dt)+'</div>';});
  }
  h+='<div class="endday">Los gastos se editan en cada sitio, tramo o comida, y en "Gastos extra del día".</div>';
  const main=document.getElementById("main");main.innerHTML=h;
  main.querySelectorAll("[data-f]").forEach(b=>b.addEventListener("click",()=>{gFilter=b.dataset.f;renderGastos();}));
}

/* ---------- BIND (día) ---------- */
function bindDay(day){const d=ds(day.id),main=document.getElementById("main");
  document.getElementById("startInput").addEventListener("change",e=>{d.start=e.target.value;save();renderDay();});
  main.querySelectorAll(".head").forEach(el=>attachHead(day,el));
  main.querySelectorAll("[data-copy]").forEach(b=>b.addEventListener("click",e=>{e.stopPropagation();copy(decodeURIComponent(b.dataset.copy));}));
  main.querySelectorAll("[data-editvisit]").forEach(b=>b.addEventListener("click",e=>{e.stopPropagation();const it=itemById(day,b.dataset.editvisit),v=prompt("Minutos en "+(it.nombre||it.label)+":",visitMin(day,it));if(v===null)return;const n=parseInt(v,10);if(isNaN(n))delete d.visitas[it.id];else d.visitas[it.id]=n;save();renderDay();}));
  main.querySelectorAll("[data-hide]").forEach(b=>b.addEventListener("click",e=>{e.stopPropagation();const id=b.dataset.hide;if(d.hidden[id])delete d.hidden[id];else d.hidden[id]=true;save();renderDay();}));
  main.querySelectorAll("[data-legk]").forEach(b=>b.addEventListener("click",()=>{d.modos[b.dataset.legk]=b.dataset.m;save();renderDay();if(document.getElementById("mapWrap").classList.contains("open"))drawMap(day);}));
  main.querySelectorAll("[data-editleg]").forEach(b=>b.addEventListener("click",()=>{const k=b.dataset.editleg,v=prompt("Minutos de este tramo:",b.textContent.replace(/\D/g,""));if(v===null)return;const n=parseInt(v,10);if(isNaN(n))delete d.tiempos[k];else d.tiempos[k]=n;save();renderDay();}));
  main.querySelectorAll("[data-legcost]").forEach(b=>b.addEventListener("click",()=>{const k=b.dataset.legcost,arr=d.gastos[k]||[],cur=arr[0]||{label:"Trayecto",amount:null};
    gastoDialog("Coste del trayecto",cur,g=>{d.gastos[k]=[g];save();renderDay();},arr.length?()=>{delete d.gastos[k];save();renderDay();}:null);}));
  main.querySelectorAll("[data-gadd]").forEach(b=>b.addEventListener("click",()=>{const it=itemById(day,b.dataset.gadd);
    gastoDialog("Nuevo gasto",null,g=>{materialG(day,it).push(g);save();renderDay();});}));
  main.querySelectorAll("[data-gedit]").forEach(b=>b.addEventListener("click",()=>{const p=b.dataset.gedit.split("|"),arr=materialG(day,itemById(day,p[0])),i=+p[1],g=arr[i];
    gastoDialog("Editar gasto",g,ng=>{arr[i]=ng;save();renderDay();},()=>{arr.splice(i,1);save();renderDay();});}));
  main.querySelectorAll("[data-gdel]").forEach(b=>b.addEventListener("click",()=>{const p=b.dataset.gdel.split("|"),arr=materialG(day,itemById(day,p[0]));arr.splice(+p[1],1);save();renderDay();}));
  main.querySelectorAll("[data-addextra]").forEach(b=>b.addEventListener("click",()=>{gastoDialog("Gasto extra del día",null,g=>{d.extras.push(g);save();renderDay();});}));
  main.querySelectorAll("[data-editextra]").forEach(b=>b.addEventListener("click",()=>{const i=+b.dataset.editextra,g=d.extras[i];
    gastoDialog("Editar gasto extra",g,ng=>{d.extras[i]=ng;save();renderDay();},()=>{d.extras.splice(i,1);save();renderDay();});}));
  main.querySelectorAll("[data-delextra]").forEach(b=>b.addEventListener("click",()=>{d.extras.splice(+b.dataset.delextra,1);save();renderDay();}));
  const wrap=document.getElementById("mapWrap");
  document.getElementById("mapToggle").addEventListener("click",()=>{wrap.classList.toggle("open");if(wrap.classList.contains("open"))requestAnimationFrame(()=>{drawMap(day);bindMap(day);});});
  document.getElementById("zin").addEventListener("click",()=>mapZoom(day,1));
  document.getElementById("zout").addEventListener("click",()=>mapZoom(day,-1));
  document.getElementById("zfit").addEventListener("click",()=>{delete mapState[day.id];mapSel=null;drawMap(day);});
  document.getElementById("locBtn").addEventListener("click",()=>locate(day));
}
/* tap = expandir · long-press = arrastrar */
function attachHead(day,head){const d=ds(day.id),item=head.parentElement,id=head.dataset.id;let timer=null,startY=0,dragging=false,moved=false;
  head.addEventListener("pointerdown",e=>{if(e.target.closest("button")||e.target.closest("[data-copy]"))return;startY=e.clientY;moved=false;
    timer=setTimeout(()=>{dragging=true;beginDrag(day,item,e.clientY);},380);});
  head.addEventListener("pointermove",e=>{if(dragging){dragMove(e.clientY);return;}if(Math.abs(e.clientY-startY)>8){moved=true;clearTimeout(timer);}});
  head.addEventListener("pointerup",e=>{clearTimeout(timer);if(dragging){dragging=false;endDrag(day);return;}if(!moved&&!e.target.closest("button")){d._open[id]=!d._open[id];item.classList.toggle("open");}});
  head.addEventListener("pointercancel",()=>{clearTimeout(timer);if(dragging){dragging=false;endDrag(day);}});
}
/* Drag&drop */
let drag=null;
function beginDrag(day,item,y){document.body.classList.add("dragging");
  const line=document.createElement("div");line.className="dropline";
  drag={day,item,id:item.dataset.id,y0:y,dy:0,line:line,target:null};
  item.classList.add("drag");item.after(line);
  if(navigator.vibrate)navigator.vibrate(15);}
function dragMove(y){if(!drag)return;drag.dy=y-drag.y0;drag.item.style.transform="translateY("+drag.dy+"px)";
  const list=document.getElementById("list");if(!list)return;
  const items=[...list.querySelectorAll(".item")].filter(el=>el!==drag.item);
  let target=null;
  for(const el of items){const r=el.getBoundingClientRect();if(y<r.top+r.height/2){target=el;break;}}
  drag.target=target;
  // mover la línea indicadora a la posición de destino
  if(target)list.insertBefore(drag.line,target);else list.appendChild(drag.line);}
function endDrag(day){document.body.classList.remove("dragging");if(!drag)return;
  if(drag.line&&drag.line.parentElement)drag.line.remove();
  drag.item.style.transform="";drag.item.classList.remove("drag");
  const d=ds(day.id),ord=orderedIds(day),from=ord.indexOf(drag.id);
  if(from>=0)ord.splice(from,1);
  if(drag.target){const ti=ord.indexOf(drag.target.dataset.id);ord.splice(ti<0?ord.length:ti,0,drag.id);}else ord.push(drag.id);
  d.order=ord;save();drag=null;renderDay();}

/* ---------- MAPA ---------- */
function project(lng,lat,z){var s=256*Math.pow(2,z);var x=(lng+180)/360*s;var sl=Math.sin(lat*Math.PI/180);var y=(0.5-Math.log((1+sl)/(1-sl))/(4*Math.PI))*s;return[x,y];}
function locSeq(day){return visibleSeq(day).filter(o=>o.isLoc).map(o=>o.it);}
function fitZoom(pts,W,H){for(var z=17;z>=3;z--){var xs=[],ys=[];pts.forEach(p=>{var xy=project(p[0],p[1],z);xs.push(xy[0]);ys.push(xy[1]);});if(Math.max.apply(0,xs)-Math.min.apply(0,xs)<=W-60&&Math.max.apply(0,ys)-Math.min.apply(0,ys)<=H-84)return z;}return 3;}
function initMap(day,W,H){const pts=locSeq(day).map(it=>it.gcj),z=fitZoom(pts,W,H),xs=[],ys=[];pts.forEach(p=>{const xy=project(p[0],p[1],z);xs.push(xy[0]);ys.push(xy[1]);});mapState[day.id]={z,cx:(Math.min.apply(0,xs)+Math.max.apply(0,xs))/2,cy:(Math.min.apply(0,ys)+Math.max.apply(0,ys))/2};}
function drawMap(day){const cv=document.getElementById("mapCanvas");if(!cv)return;const W=cv.clientWidth,H=cv.clientHeight;if(!W)return;if(!mapState[day.id])initMap(day,W,H);
  const ms=mapState[day.id],z=ms.z,n=Math.pow(2,z),left=ms.cx-W/2,top=ms.cy-H/2,P=(lng,lat)=>{const xy=project(lng,lat,z);return[xy[0]-left,xy[1]-top];};
  let html="";const tx0=Math.floor(left/256),tx1=Math.floor((left+W)/256),ty0=Math.floor(top/256),ty1=Math.floor((top+H)/256);
  for(let tx=tx0;tx<=tx1;tx++)for(let ty=ty0;ty<=ty1;ty++){if(ty<0||ty>=n)continue;const wx=((tx%n)+n)%n;html+='<img class="tile" style="left:'+(tx*256-left)+'px;top:'+(ty*256-top)+'px" src="https://webrd0'+((wx%4)+1)+'.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x='+wx+'&y='+ty+'&z='+z+'">';}
  const acc=getComputedStyle(document.body).getPropertyValue('--accent').trim()||'#a5282a';const seq=locSeq(day);let paths="";
  for(let i=0;i<seq.length-1;i++){const L=legData(day,seq[i].id,seq[i+1].id),g=(legMode(day,L)==="walk"&&L.geomWalk)?L.geomWalk:(L.geomDrive||[seq[i].gcj,seq[i+1].gcj]);let pts="";[seq[i].gcj].concat(g,[seq[i+1].gcj]).forEach(c=>{const s=P(c[0],c[1]);pts+=s[0].toFixed(1)+","+s[1].toFixed(1)+" ";});paths+='<polyline points="'+pts+'" fill="none" stroke="'+acc+'" stroke-width="4" stroke-opacity="0.85" stroke-linecap="round" stroke-linejoin="round"/>';}
  html+='<svg class="route" width="'+W+'" height="'+H+'">'+paths+'</svg>';
  seq.forEach((it,i)=>{const s=P(it.gcj[0],it.gcj[1]);html+='<div class="pin" data-pin="'+i+'" style="left:'+s[0]+'px;top:'+s[1]+'px"><svg width="27" height="27" viewBox="0 0 27 27"><path d="M13.5 1C7.7 1 3 5.7 3 11.5 3 19 13.5 26 13.5 26S24 19 24 11.5C24 5.7 19.3 1 13.5 1z" fill="'+acc+'"/></svg><b>'+(i+1)+'</b></div>';});
  if(userGCJ){const s=P(userGCJ[0],userGCJ[1]);html+='<div class="me" style="left:'+s[0]+'px;top:'+s[1]+'px"></div>';}
  if(mapSel!=null&&seq[mapSel]){const it=seq[mapSel],s=P(it.gcj[0],it.gcj[1]);let info="";if(it.horario)info+='<div>'+it.horario+'</div>';const gt=sum(gastosOf(day,it));if(gt)info+='<div>Entrada ¥'+num(gt)+'</div>';
    html+='<div class="bubble" style="left:'+s[0]+'px;top:'+s[1]+'px"><span class="x" data-closebubble="1">'+ic("x")+'</span><b>'+(mapSel+1)+'. '+it.nombre+'</b>'+(it.cn?'<div style="opacity:.7">'+it.cn+'</div>':'')+'<div style="opacity:.7">'+it.tipo+'</div>'+info+'</div>';}
  cv.innerHTML=html;
  cv.querySelectorAll(".pin").forEach(p=>p.addEventListener("click",e=>{e.stopPropagation();mapSel=+p.dataset.pin;drawMap(day);}));
  const xb=cv.querySelector("[data-closebubble]");if(xb)xb.addEventListener("click",e=>{e.stopPropagation();mapSel=null;drawMap(day);});
}
function mapZoom(day,dz){const ms=mapState[day.id];if(!ms)return;const nz=Math.max(4,Math.min(18,ms.z+dz)),f=Math.pow(2,nz-ms.z);ms.cx*=f;ms.cy*=f;ms.z=nz;drawMap(day);}
function bindMap(day){const cv=document.getElementById("mapCanvas");if(!cv||cv._b)return;cv._b=1;const ptrs=new Map();let dr=null,pinch=null;
  cv.addEventListener("pointerdown",e=>{ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});cv.setPointerCapture(e.pointerId);if(ptrs.size===2){const v=[...ptrs.values()],ms=mapState[day.id];pinch={d:Math.hypot(v[0].x-v[1].x,v[0].y-v[1].y),z:ms.z,cx:ms.cx,cy:ms.cy};dr=null;}else{dr={x:e.clientX,y:e.clientY};cv.style.cursor="grabbing";}});
  cv.addEventListener("pointermove",e=>{if(!ptrs.has(e.pointerId))return;ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});const ms=mapState[day.id];if(ptrs.size>=2&&pinch){const v=[...ptrs.values()],dd=Math.hypot(v[0].x-v[1].x,v[0].y-v[1].y),nz=Math.max(4,Math.min(18,Math.round(pinch.z+Math.log(dd/pinch.d)/Math.LN2)));if(nz!==ms.z){const f=Math.pow(2,nz-pinch.z);ms.z=nz;ms.cx=pinch.cx*f;ms.cy=pinch.cy*f;drawMap(day);}}else if(dr){ms.cx-=e.clientX-dr.x;ms.cy-=e.clientY-dr.y;dr={x:e.clientX,y:e.clientY};drawMap(day);}});
  const end=e=>{ptrs.delete(e.pointerId);if(ptrs.size<2)pinch=null;if(ptrs.size===0){dr=null;cv.style.cursor="grab";}};
  cv.addEventListener("pointerup",end);cv.addEventListener("pointercancel",end);}
function locate(day){if(!navigator.geolocation){toast("GPS no disponible");return;}toast("Buscando ubicación…");navigator.geolocation.getCurrentPosition(p=>{userGCJ=wgs2gcj(p.coords.longitude,p.coords.latitude);const ms=mapState[day.id];if(ms){const xy=project(userGCJ[0],userGCJ[1],ms.z);ms.cx=xy[0];ms.cy=xy[1];}drawMap(day);toast("Ubicación encontrada");},e=>toast("No se pudo obtener el GPS"),{enableHighAccuracy:true,timeout:10000});}

render();

stampChanges();
document.getElementById("syncBtn").onclick=()=>{if(!sb)syncDialog();else doSync();};
document.getElementById("syncBtn").addEventListener("contextmenu",e=>{e.preventDefault();syncDialog();});
paintSync();

window.addEventListener("online",()=>{if(sb)doSync(true);});
document.addEventListener("visibilitychange",()=>{if(!document.hidden&&sb)doSync(true);});
document.getElementById("verBtn").onclick=()=>chkVer();
if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(()=>{});}
