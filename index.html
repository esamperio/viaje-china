  @media (prefers-color-scheme: dark){:root{--bg:#15120e;--card:#1e1a15;--ink:#ece6db;--muted:#9a9184;--line:#2d2820;--accent:#e26a5f;--accent-soft:#2c1815;--gold:#cda45f;--ok:#4fb37a;--shadow:0 4px 20px rgba(0,0,0,.4);--walk:#4fb37a;--transit:#5fa0e0;--didi:#e0ad55;--meal:#d3a45e;--food:#35b6a0;--cafe:#e09a4e;}}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  /* 'clip' y no 'hidden': hidden crea un contenedor de scroll y rompe el position:sticky de la cabecera */
  html,body{max-width:100%;overflow-x:clip}
  /* franja opaca bajo la hora y la cobertura: nada de la app pasa por debajo */
  .statusbar{position:fixed;top:0;left:0;right:0;height:env(safe-area-inset-top);background:var(--bg);z-index:30}
  /* iOS Safari hace zoom al enfocar cualquier campo de menos de 16px y NO lo deshace */
  input,textarea,select{font-size:16px}
  body{margin:0;background:var(--bg);color:var(--ink);font:15.5px/1.5 'Nunito Sans',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
  body.dragging{touch-action:none;user-select:none}
  .disp{font-family:'Sora','Nunito Sans',-apple-system,sans-serif}
  svg.ic{width:1em;height:1em;vertical-align:-.14em;flex:0 0 auto}
  button{font-family:inherit}
  header{position:sticky;top:env(safe-area-inset-top);z-index:20;background:color-mix(in srgb,var(--card) 90%,transparent);-webkit-backdrop-filter:saturate(140%) blur(12px);backdrop-filter:saturate(140%) blur(12px);border-bottom:1px solid var(--line);padding:11px 16px 9px}
  .brand{display:flex;align-items:center;gap:8px;font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:700}

  main{max-width:660px;margin:0 auto;padding:16px 14px 90px}

  .startedit{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:11px;font-size:14px;box-shadow:var(--shadow)}

  .mapbtn{width:100%;display:flex;align-items:center;justify-content:center;gap:9px;background:var(--card);border:1px solid var(--line);color:var(--ink);font-weight:700;font-size:14px;padding:13px;border-radius:14px;margin-bottom:16px;box-shadow:var(--shadow)}

  #mapCanvas{position:relative;width:100%;height:68.4vh;min-height:342px;background:#e4ddd0;overflow:hidden;touch-action:none;cursor:grab}

  #mapCanvas .bubble:after{content:"";position:absolute;left:50%;bottom:-7px;transform:translateX(-50%);border:7px solid transparent;border-top-color:var(--card);border-bottom:0}
  .maphint{background:var(--card);color:var(--muted);font-size:11px;text-align:center;padding:7px}
  .mapbar{display:flex;gap:8px;padding:9px 11px;background:var(--card);align-items:center;border-top:1px solid var(--line)}
  .mapbar button{border:1px solid var(--line);background:transparent;color:var(--ink);width:38px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px}

  .item{position:relative;background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);margin-bottom:8px;overflow:hidden}

  .chk{display:inline-flex;align-items:center;justify-content:center;gap:4px;border-radius:999px;padding:4px 8px;font:700 10.5px 'Sora',sans-serif;
       border:1.5px solid var(--line);background:var(--card);color:var(--muted);cursor:pointer;line-height:1;white-space:nowrap}
  .chk .ic{width:12px;height:12px}
  .chk.done.on{background:color-mix(in srgb,#2e9e5b 16%,var(--card));border-color:#2e9e5b;color:#2e9e5b}
  .chk.tik.on{background:color-mix(in srgb,#2f6bd8 16%,var(--card));border-color:#2f6bd8;color:#2f6bd8}
  .item.done-mark{border-color:color-mix(in srgb,#2e9e5b 45%,var(--line))}
  /* botones de la cabecera (lupa buscador + calendario) */
  .hactions{margin-left:auto;display:flex;align-items:center;gap:7px}
  .hactions .syncbtn{margin-left:0}
  .hbtn{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;width:32px;height:30px;
        border-radius:9px;border:1px solid var(--line);background:transparent;color:var(--muted);cursor:pointer}
  .hbtn .ic{width:16px;height:16px}
  .hbtn.on{color:var(--accent);border-color:var(--accent);background:var(--accent-soft)}
  /* calendario para saltar de día */
  .cal{max-width:340px}
  .calmonth{margin-top:6px}
  .calmonth+.calmonth{margin-top:14px}
  .calmt{font:800 12px 'Sora',sans-serif;text-transform:uppercase;letter-spacing:.09em;color:var(--gold);margin-bottom:8px}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .caldow{text-align:center;font-size:10px;font-weight:800;color:var(--muted);padding-bottom:2px}

           border-radius:9px;color:var(--muted)}

  .calcell.trip{background:var(--accent-soft);color:var(--ink);border:1px solid var(--line);cursor:pointer}
  .calcell.trip.now{background:var(--accent);border-color:var(--accent);color:#fff}
  .calcell.today{box-shadow:inset 0 0 0 2px var(--gold)}
  .callegend{display:flex;gap:16px;justify-content:center;margin-top:10px;font-size:11px;font-weight:700;color:var(--muted)}

  .callegend i{width:11px;height:11px;border-radius:4px}
  .callegend .lg-now{background:var(--accent)}
  .callegend .lg-hoy{box-shadow:inset 0 0 0 2px var(--gold)}
  .calquick{display:flex;gap:8px;margin-top:14px}
  .calquick button{flex:1;border:1px solid var(--line);background:transparent;color:var(--ink);font:700 13px 'Sora',sans-serif;
                   padding:9px;border-radius:11px;display:inline-flex;align-items:center;justify-content:center;gap:6px}
  .calquick button .ic{width:15px;height:15px}
  /* buscador general */
  .searchrow{display:none;align-items:center;gap:7px;margin-top:9px;background:var(--card);border:1px solid var(--line);
             border-radius:12px;padding:8px 11px}

  .searchrow .ic{width:16px;height:16px;color:var(--muted);flex:none}
  .searchrow input{flex:1;border:0;background:transparent;color:var(--ink);font-size:16px;outline:none;font-family:'Nunito Sans',sans-serif}
  .searchrow button{border:0;background:transparent;color:var(--muted);cursor:pointer;display:none;padding:2px}

  .searchres{margin-top:6px;background:var(--card);border:1px solid var(--line);border-radius:12px;overflow-y:auto;max-height:62vh;box-shadow:var(--shadow);display:none}

  .head{display:flex;gap:12px;padding:13px 14px;align-items:flex-start;cursor:pointer;touch-action:pan-y}
  .num{flex:0 0 auto;width:31px;height:31px;border-radius:10px;background:var(--accent);color:#fff;font:700 14px 'Sora',sans-serif;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 7px rgba(165,40,42,.28)}
  .num.free{background:var(--card);color:var(--muted);border:1.5px solid var(--line);box-shadow:none}
  .num.mealnum{background:var(--meal);box-shadow:none;font-size:13px}
  .pmain{flex:1;min-width:0}

  .rcol{flex:0 0 auto;display:flex;gap:7px;align-items:flex-start}
  .eye{border:none;background:transparent;color:var(--muted);padding:2px;font-size:14px;opacity:.55}
  .times{text-align:right;font-variant-numeric:tabular-nums}
  .tarr{font:700 16px 'Sora',sans-serif}
  .tdep{color:var(--muted);font-size:11.5px;margin-top:1px}

  .body{display:none;padding:0 14px 14px 57px;font-size:13.7px;line-height:1.55}

  .addr{margin-top:9px;font-size:12.5px;color:var(--muted);display:flex;flex-direction:column;gap:5px}
  .addr .line{display:flex;align-items:center;gap:7px}.addr .line span{flex:1}
  .notas{margin-top:9px;color:var(--gold);font-size:12.5px;display:flex;gap:7px;align-items:baseline}
  .gastos{margin-top:11px;border-top:1px dashed var(--line);padding-top:9px}
  .gastos .glabel{font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:5px}
  .gtag{display:inline-block;margin-left:6px;padding:1px 7px;border-radius:999px;font-size:10px;font-weight:800;letter-spacing:.03em;color:#fff;vertical-align:1px}
  /* nota escrita por nosotros (mismo aire que Gastos) */
  .notalibre{margin-top:11px;border-top:1px dashed var(--line);padding-top:9px}
  .notalibre .glabel{font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:5px}
  .notalibre .ntext{font-size:13.5px;line-height:1.5;color:var(--ink);white-space:pre-wrap;word-break:break-word;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:9px 11px;cursor:pointer}

  .dlg textarea{width:100%;font:inherit;font-size:16px;line-height:1.5;padding:11px 12px;border:1px solid var(--line);border-radius:11px;background:var(--bg);color:var(--ink);resize:vertical;min-height:96px}

  .miniact{margin-top:11px;display:flex;gap:8px;align-items:center}

  .leg{display:flex;align-items:center;gap:8px;padding:7px 14px 7px 57px}

  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* diálogo de gasto */
  .ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}

  .dlg select{appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%238a8a8a' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:right 11px center;padding-right:34px}
  .dlg input.amt{font-family:'Sora';font-weight:700;font-size:17px}

  .dlg .dlgnote{margin:2px 0 0;font-size:12.5px;line-height:1.45;color:var(--muted);text-transform:none;letter-spacing:0}
  .brand .btxt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
  .syncbtn{margin-left:auto;flex:0 0 auto;display:inline-flex;align-items:center;gap:5px;padding:5px 9px;border-radius:999px;
    border:1px solid var(--line);background:transparent;color:var(--muted);font:inherit;font-size:10.5px;
    font-weight:700;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}

  .syncbtn.ok{color:#3c7a54;border-color:#3c7a5455}
  .syncbtn.pend{color:#c9871f;border-color:#c9871f55}
  .syncbtn.err{color:var(--accent);border-color:#a5282a66}
  .syncbtn.busy{color:var(--muted)}
  .syncbtn.busy .ic{animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media(max-width:400px){.syncbtn span{display:none}}
  /* feedback de arrastre */
  .dropline{height:4px;border-radius:3px;background:var(--accent);margin:7px 0;box-shadow:0 0 10px color-mix(in srgb,var(--accent) 70%,transparent);position:relative}
  .dropline:before{content:"";position:absolute;left:-3px;top:-3px;width:10px;height:10px;border-radius:50%;background:var(--accent)}

  .filters::-webkit-scrollbar{display:none}
  .filters button{flex:0 0 auto;border:1px solid var(--line);background:var(--card);color:var(--muted);padding:7px 13px;border-radius:999px;font-size:12.5px;font-weight:700}

  .grow2 .c1 span{font-size:11.5px;color:var(--muted)}
  .grow2 .amt2{font:700 14px 'Sora';white-space:nowrap}
  .gsub{font-size:12px;color:var(--muted);margin:-4px 0 10px}
  /* vista gastos */
  .gtot{background:linear-gradient(135deg,var(--accent),#7d1c17);color:#fff;border-radius:18px;padding:20px;text-align:center;margin-bottom:16px;box-shadow:var(--shadow)}
  .gtot .n{font:800 40px 'Sora';line-height:1}
  .gtot .l{opacity:.85;font-size:12px;text-transform:uppercase;letter-spacing:.12em;margin-top:6px}
  .gcard{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);margin-bottom:12px;padding:15px 16px}
  .gcard h3{margin:0 0 12px;font:700 15px 'Sora';display:flex;align-items:center;gap:8px}
  .gbar{display:flex;align-items:center;gap:10px;margin:9px 0}
  .gbar .ico{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;flex:0 0 auto}
  .gbar .txt{flex:1;min-width:0}
  .gbar .track{height:7px;background:var(--bg);border-radius:5px;margin-top:4px;overflow:hidden}
  .gbar .fill{height:100%;border-radius:5px}
  .gbar .amt{font:700 14px 'Sora';white-space:nowrap}
  .gday{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-top:1px solid var(--line);font-size:14px}
  .gday:first-of-type{border-top:none}
  .gday b{font-family:'Sora'}
  .dday{padding:10px 0;border-top:1px solid var(--line)}
  .dday:first-of-type{border-top:none;padding-top:2px}
  .dday .top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;font-size:13.5px}
  .dday .top span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .dday .top b{font:700 14px 'Sora';white-space:nowrap}
  .dday .stack{display:flex;height:10px;background:var(--bg);border-radius:5px;overflow:hidden;margin-top:6px}
  .dday .stack i{display:block;height:100%}
  .dday.zero .stack{opacity:.45}
  .glegend{display:flex;flex-wrap:wrap;gap:10px 14px;margin-top:14px;padding-top:12px;border-top:1px solid var(--line)}
  .glegend span{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted);font-weight:700}
  .glegend i{width:9px;height:9px;border-radius:3px;flex:0 0 auto}
  .verbtn{margin-top:9px;border:1px solid var(--line);background:transparent;color:var(--muted);
    font:inherit;font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;
    padding:7px 14px;border-radius:999px}
  .verbtn.busy{opacity:.5}
  /* ---- Comer ---- */
  .chips{display:flex;gap:7px;overflow-x:auto;padding:2px 0 12px;-webkit-overflow-scrolling:touch}
  .chips button{flex:0 0 auto;border:1px solid var(--line);background:transparent;color:var(--muted);
    padding:7px 14px;border-radius:999px;font:inherit;font-size:12.5px;font-weight:700}
  .chips button.on{background:var(--food);border-color:var(--food);color:#fff}
  .rcard{background:var(--card);border:1px solid var(--line);border-radius:15px;box-shadow:var(--shadow);
    margin-bottom:10px;padding:13px 14px;display:flex;gap:11px;align-items:flex-start;width:100%;text-align:left;font:inherit;color:var(--ink)}
  .rcard .ric{width:34px;height:34px;border-radius:10px;background:var(--food);color:#fff;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center}
  .rcard .rb{flex:1;min-width:0}
  .rcard .rn{font:700 15px 'Sora';display:block}
  .rcard .rcn{font-size:13px;color:var(--muted)}
  .rcard .rmeta{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px}
  .tag{font-size:11px;font-weight:700;padding:3px 8px;border-radius:7px;background:var(--bg);color:var(--muted)}
  .tag.pr{background:var(--accent-soft);color:var(--accent)}
  .tag.nota{background:#f2b21422;color:var(--gold)}
  .rcard .ric.cafe{background:var(--cafe)}
  .comerhint{display:flex;gap:7px;align-items:flex-start;font-size:12.5px;color:var(--muted);
    background:var(--accent-soft);border-radius:10px;padding:9px 11px;margin:2px 0 10px;line-height:1.4}
  .comerhint svg{width:15px;height:15px;flex:0 0 auto;margin-top:1px;color:var(--accent)}
  .tag.cerca{background:var(--card);border:1px solid var(--line);color:var(--muted)}
  .tag.cerca.ok{background:#0f7b6c1c;border-color:transparent;color:var(--food);font-weight:800}
  .tag.dupt,.tag.cerr{background:var(--accent-soft);color:var(--accent)}
  .ficha .altsuc{margin:12px 0;padding:11px 12px;border:1px solid var(--line);border-radius:11px;background:var(--bg)}
  .ficha .altsuc .k{font-size:12px;font-weight:800;color:var(--muted);margin-bottom:7px}
  .ficha .altrow{display:flex;align-items:center;gap:7px;font-size:13px;padding:4px 0}
  .ficha .altrow svg{width:14px;height:14px;color:var(--food);flex:0 0 auto}
  .ficha .altrow b{color:var(--food)}
  .ficha .altrow .ap{color:var(--muted);font-size:12px;margin-left:auto;text-align:right}
  /* --- qué hemos comido --- */
  .pcomida{display:flex;align-items:center;gap:5px;font-size:12.5px;font-weight:700;color:var(--food);margin-top:2px}
  .pcomida svg{width:13px;height:13px}
  .comida{margin-top:10px;padding:11px 12px;border:1px solid var(--line);border-radius:12px;background:var(--bg)}
  .comida .glabel{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:800;color:var(--muted);margin-bottom:8px}

  .comsel{width:100%;font-size:16px;font-family:inherit;padding:10px 11px;border-radius:10px;
    border:1px solid var(--line);background:var(--card);color:var(--ink)}
  .comsel-det{display:flex;flex-direction:column;gap:5px;margin-top:9px;padding:10px 11px;
    border-radius:10px;background:var(--card);border:1px solid var(--line)}
  .comsel-det .cd-n{display:flex;align-items:center;gap:6px;font:700 14px 'Sora'}
  .comsel-det .cd-n svg{width:15px;height:15px;color:var(--food)}
  .comsel-det .cd-m{font-size:12.5px;color:var(--muted)}
  .comsel-det .cd-foto img{width:100%;border-radius:9px;display:block;margin-top:3px}
  .comsel-det .cd-b{align-self:flex-start;display:inline-flex;align-items:center;gap:5px;margin-top:3px;
    background:transparent;border:1px solid var(--line);color:var(--food);font:inherit;font-size:12px;
    font-weight:700;padding:6px 11px;border-radius:9px}

  .fld{margin-bottom:13px}
  .fld label{display:block;font-size:12px;font-weight:800;color:var(--muted);margin-bottom:5px}
  .fld input{width:100%;font-size:16px;font-family:inherit;padding:11px;border-radius:10px;
    border:1px solid var(--line);background:var(--bg);color:var(--ink)}

  .fotobox img{width:100%;border-radius:10px;display:block;margin-bottom:8px}
  .fotoact{display:flex;gap:8px;flex-wrap:wrap}
  .fbtn{display:inline-flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--line);

  .fbtn.wide{width:100%;justify-content:center;margin-top:10px}
  .fhint{font-size:11.5px;color:var(--muted);line-height:1.45;margin-top:8px}

  .ficha .row{padding:11px 0;border-top:1px solid var(--line)}

    background:var(--bg);border-radius:10px}
  #mapCanvas .rpin{position:absolute;z-index:2;width:23px;height:23px;margin:-23px 0 0 -11.5px;cursor:pointer}

  #mapCanvas .maplegend span{display:flex;align-items:center;gap:4px}
  #mapCanvas .maplegend i{width:9px;height:9px;border-radius:50%}
  #mapCanvas .maplegend i.sq{border-radius:2px}
  #mapCanvas .maplegend i.ring{background:transparent;border:2.5px solid;box-sizing:border-box}
  #mapCanvas .rpin.imp{width:27px;height:27px;margin:-27px 0 0 -13.5px;z-index:3}
  #mapCanvas .rpin.gris{z-index:1;opacity:.85}
  #mapCanvas .bubble .bimp{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:800;
    color:var(--gold);margin-bottom:3px}
  #mapCanvas .bubble .bimp svg{width:12px;height:12px}
  .tag.pr svg{width:12px;height:12px}
  .bubble .verficha{display:inline-flex;align-items:center;gap:5px;margin-top:7px;background:var(--food);
    color:#fff;border:none;font:inherit;font-size:12px;font-weight:800;padding:6px 11px;border-radius:8px}
  .updbar{position:fixed;left:50%;bottom:calc(20px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(80px);
    display:flex;align-items:center;gap:12px;background:var(--ink);color:var(--bg);padding:10px 12px 10px 16px;
    border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.35);z-index:60;font-size:13px;font-weight:700;
    transition:transform .28s;max-width:calc(100% - 28px)}
  .updbar.show{transform:translateX(-50%) translateY(0)}
  .updbar span{display:inline-flex;align-items:center;gap:7px;white-space:nowrap}
  .updbar .ic{width:15px;height:15px}
  .updbar button{border:none;background:var(--bg);color:var(--ink);font:inherit;font-weight:800;
    padding:8px 13px;border-radius:10px;white-space:nowrap}
</style>
</head>

e las dinastías Ming y Qing (1420), 980 edificios y 72 ha; el conjunto de madera antigua más grande del mundo. Se entra SOLO por la Puerta del Meridiano (午门, al sur, desde Tiananmén) y se sale por el norte (神武门), que deja justo enfrente de Jingshan. Reserva online obligatoria con pasaporte, se agota con días de antelación. ¥60/pers en temporada alta (¥120 para 2).", "notas": "Reservar online con pasaporte · se entra por el sur y se sale por el norte", "direccion": "No.4 Jingshan Front St, Dongcheng", "direccionCn": "北京市东城区景山前街4号"}, {"id": "p3", "kind": "place", "gcj": [116.39676, 39.92344], "nombre": "Parque Jingshan", "cn": "景山公园", "tipo": "Atracción", "horario": "6:30–21:00", "costeCny": 36, "visitaMin": 60, "amapKeyword": "景山公园", "resumen": "Colina artificial hecha con la tierra excavada del foso de la Ciudad Prohibida. Desde el pabellón Wanchun, en lo alto, está LA vista clásica de los tejados dorados del palacio: es la foto que todo el mundo busca de Pekín. Subida corta pero con escaleras. Mejor al atardecer.", "notas": "La mejor vista de la Ciudad Prohibida · entrar por la puerta sur", "direccion": "No.44 Jingshan West St, Xicheng", "direccionCn": "北京市西城区景山西街44号"}, {"id": "p4", "kind": "place", "gcj": [116.39108, 39.92588], "nombre": "Parque Beihai", "cn": "北海公园", "tipo": "Atracción", "horario": "6:30–20:00", "costeCny": 20, "visitaMin": 90, "amapKeyword": "北海公园", "resumen": "Jardín imperial de 69 ha alrededor de un lago, uno de los más antiguos que se conservan (s. XI). La Dagoba Blanca sobre la Isla de Jade preside la vista; abajo, barcas de remos, el Muro de los Nueve Dragones y galerías cubiertas. ¥10/pers (¥20 para 2), con suplemento si se entra a la dagoba.", "notas": "", "direccion": "No.1 Wenjin St, Xicheng", "direccionCn": "北京市西城区文津街1号"}, {"id": "p5", "kind": "place", "gcj": [116.39599, 39.94075], "nombre": "Torres de la Campana y el Tambor", "cn": "钟鼓楼", "tipo": "Atracción", "horario": "9:00–17:00 (últ. entrada 16:30)", "costeCny": 60, "visitaMin": 60, "amapKeyword": "钟鼓楼", "resumen": "Las dos torres que daban la hora a la ciudad imperial, en el extremo norte del eje central. En la del Tambor hay pases de percusión cada media hora; desde arriba se ven los tejados grises de los hutongs. Escaleras muy empinadas. Entrada combinada ¥30/pers (¥60 para 2).", "notas": "Escaleras empinadas · pases de tambor cada media hora", "direccion": "Gulou East St, Dongcheng", "direccionCn": "北京市东城区鼓楼东大街"}, {"id": "m_com", "kind": "meal", "label": "Comida", "min": 0}, {"id": "p6", "kind": "place", "gcj": [116.40774, 39.94543], "nombre": "Mr. Shi's Dumplings", "cn": "老石饺子馆", "tipo": "Comida", "horario": "11:00–22:00", "costeCny": 0, "visitaMin": 60, "amapKeyword": "老石饺子馆 宝钞胡同", "resumen": "Local pequeño y muy conocido de jiaozi (empanadillas) en un hutong junto a la Torre del Tambor. Carta en inglés, raciones generosas y precio bajo. Suele haber cola: se apunta uno y espera en la calle.", "notas": "Comer por aquí · suele haber cola", "direccion": "No.74 Baochao Hutong, Dongcheng", "direccionCn": "北京市东城区宝钞胡同74号"}, {"id": "p7", "kind": "place", "gcj": [116.41459, 39.94553], "nombre": "Templo de Confucio", "cn": "北京孔庙", "tipo": "Atracción", "horario": "8:30–17:00 (últ. entrada 16:30)", "costeCny": 60, "visitaMin": 60, "amapKeyword": "北京孔庙 国子监", "resumen": "Segundo templo confuciano más grande de China (1302). Patios con cipreses centenarios y 198 estelas de piedra con los nombres de más de 50.000 licenciados de los exámenes imperiales. La entrada incluye el Guozijian (Colegio Imperial), justo al lado. Mucho más tranquilo que el resto de la ciudad.", "notas": "Entrada combinada con el Guozijian", "direccion": "No.13 Guozijian St, Dongcheng", "direccionCn": "北京市东城区国子监街13号"}, {"id": "p8", "kind": "place", "gcj": [116.41771, 39.94506], "nombre": "Templo de los Lamas (Yonghegong)", "cn": "雍和宫", "tipo": "Atracción", "horario": "9:00–16:30 (últ. entrada 16:00)", "costeCny": 50, "visitaMin": 60, "amapKeyword": "雍和宫", "resumen": "El templo budista tibetano más importante de Pekín, antigua residencia del emperador Yongzheng (1694). Cinco patios en fila; al fondo, un Buda Maitreya de 18 m tallado en un solo tronco de sándalo. Sigue en culto: huele a incienso y hay monjes y fieles. ¥25/pers (¥50 para 2).", "notas": "Templo en culto · vestir con respeto", "direccion": "No.12 Yonghegong St, Dongcheng", "direccionCn": "北京市东城区雍和宫大街12号"}, {"id": "p9", "kind": "place", "gcj": [116.45438, 39.93491], "nombre": "Sanlitun", "cn": "三里屯太古里", "tipo": "Atracción", "horario": "10:00–22:00 (zona abierta)", "costeCny": 0, "visitaMin": 60, "amapKeyword": "三里屯太古里", "resumen": "El barrio moderno de Pekín: Taikoo Li, un complejo abierto de tiendas, terrazas y restaurantes, y la zona de bares alrededor. Contraste total con la mañana imperial. Ambiente a partir del atardecer.", "notas": "", "direccion": "No.19 Sanlitun Rd, Chaoyang", "direccionCn": "北京市朝阳区三里屯路19号"}, {"id": "p10", "kind": "place", "gcj": [116.44883, 39.91959], "nombre": "Beijing Parkview Green", "cn": "侨福芳草地", "tipo": "Mercado/Compras", "horario": "10:00–22:00", "costeCny": 0, "visitaMin": 60, "amapKeyword": "侨福芳草地", "resumen": "Centro comercial dentro de una pirámide de vidrio bioclimática, con más de 500 obras de arte contemporáneo repartidas por los pasillos (varios Dalí incluidos). Se puede recorrer solo por verlo, sin comprar. Aire acondicionado, que en agosto no sobra.", "notas": "Es medio museo de arte contemporáneo · gratis entrar", "direccion": "No.9 Dongdaqiao Rd, Chaoyang", "direccionCn": "北京市朝阳区东大桥路9号"}, {"id": "m_cen", "kind": "meal", "label": "Cena", "min": 0}, {"id": "p11", "kind": "place", "gcj": [116.44969, 39.90949], "nombre": "Silk Street", "cn": "秀水街", "tipo": "Mercado/Compras", "horario": "9:30–21:00", "costeCny": 0, "visitaMin": 75, "amapKeyword": "秀水街", "resumen": "Mercado cubierto de seis plantas famoso por las imitaciones: ropa, bolsos, electrónica, seda y sastrería a medida. Se regatea SIEMPRE, y fuerte: se empieza por un 20-30% de lo que dos y compras, con el Templo del Cielo por la tarde. Panjiayuan sale dos veces (al abrir y a la vuelta) porque en domingo es cuando está a tope. El Museo Nacional es gratis pero HAY QUE RESERVAR con 7 días de antelación.", "items": [{"id": "p0", "kind": "place", "gcj": [116.45203, 39.86987], "nombre": "Beijing Suwen Hotel", "cn": "北京素问酒店", "tipo": "Hotel", "horario": "Salida 08:00", "costeCny": 0, "visitaMin": 0, "amapKeyword": "北京素问酒店 华威南路", "resumen": "Salida del hotel. Panjiayuan está a un paso: abre pronto y en domingo es cuando merece la pena.", "notas": "Desayunar por aquí", "direccion": "Building 404, Hongshan Jiayuan, No.42 Huawei South Rd, Chaoyang", "direccionCn": "北京市朝阳区华威南路42号红山嘉园404楼"}, {"id": "m_des", "kind": "meal", "label": "Desayuno", "min": 30}, {"id": "p1", "kind": "place", "gcj": [116.45835, 39.87538], "nombre": "Mercado de Panjiayuan", "cn": "潘家园旧货市场", "tipo": "Mercado/Compras", "horario": "8:30–18:00 · sáb y dom es el día fuerte", "costeCny": 0, "visitaMin": 90, "amapKeyword": "潘家园旧货市场", "resumen": "El mercado de antigüedades más grande de China: 3.000 puestos de jade, porcelana, caligrafía, muebles, sellos y baratijas. En fin de semana se llena y salen los vendedores de provincias. Casi nada es antiguo de verdad: comprad por lo que os guste, no por la supuesta antigüedad, y regatead sin piedad.", "notas": "Regatear siempre · casi nada es antigüedad real · efectivo o Alipay", "direccion": "No.18 Huaweili, Panjiayuan Rd, Chaoyang", "direccionCn": "北京市朝阳区潘家园路华威里18号"}, {"id": "p2", "kind": "place", "gcj": [116.4113, 39.91301], "nombre": "Wangfujing", "cn": "王府井步行街", "tipo": "Comida", "horario": "Zona abierta", "costeCny": 0, "visitaMin": 60, "amapKeyword": "王府井步行街", "resumen": "La calle comercial peatonal más conocida de Pekín, a un paso de la Ciudad Prohibida. Grandes almacenes, marcas y, en los callejones, puestos de comida. Buen sitio para desayunar o comer temprano.", "notas": "Desayunar / comer por aquí", "direccion": "Wangfujing St, Dongcheng", "direccionCn": "北京市东城区王府井大街"}, {"id": "m_com", "kind": "meal", "label": "Comida", "min": 0}, {"id": "p3", "kind": "place", "gcj": [116.41128, 39.91319], "nombre": "Beijing Department Store", "cn": "北京市百货大楼", "tipo": "Mercado/Compras", "horario": "9:30–21:30", "costeCny": 0, "visitaMin": 45, "amapKeyword": "北京市百货大楼", "resumen": "Los grandes almacenes históricos de Wangfujing (1955). Lo que hay que ver está en la planta -2: una reconstrucción de las calles del viejo Pekín con puestos de comida y tiendas de época, la llamada 'ciudad subterránea'.", "notas": "Bajar a la planta -2 (ciudad subterránea)", "direccion": "No.253 Wangfujing St, Dongcheng", "direccionCn": "北京市东城区王府井大街253号"}, {"id": "p4", "kind": "place", "gcj": [116.40051, 39.90525], "nombre": "Museo Nacional de China", "cn": "中国国家博物馆", "tipo": "Atracción", "horario": "9:00–17:00 (últ. entrada 16:00) · CERRADO LUNES", "costeCny": 0, "visitaMin": 120, "amapKeyword": "中国国家博物馆", "resumen": "El museo más visitado del mundo y el mejor resumen de 5.000 años de historia china: bronces Shang, el traje funerario de jade, cerámica y la exposición del Rejuvenecimiento Nacional. Está en el lado este de Tiananmén y se entra por el oeste. GRATIS, pero la reserva online se abre 7 días antes y se agota en minutos: hay que estar pendiente.", "notas": "GRATIS pero HAY QUE RESERVAR 7 DÍAS ANTES · se agota en minutos · pasaporte", "direccion": "No.16 East Chang'an Ave, Dongcheng", "direccionCn": "北京市东城区东长安街16号"}, {"id": "p5", "kind": "place", "gcj": [116.3935, 39.89969], "nombre": "Lao She's Teahouse", "cn": "老舍茶馆", "tipo": "Comida", "horario": "9:00–21:30", "costeCny": 0, "visitaMin": 90, "amapKeyword": "老舍茶馆", "resumen": "Casa de té clásica abierta en 1988 y bautizada por el dramaturgo Lao She. Sirve té y aperitivos pekineses, y por la tarde-noche hay espectáculo: ópera de Pekín, acrobacia, cambios de máscara y cuentacuentos. El pase con espectáculo se paga aparte y conviene reservar.", "notas": "El espectáculo se paga aparte · conviene reservar", "direccion": "No.3 Qianmen West St, Xicheng", "direccionCn": "北京市西城区前门西大街3号"}, {"id": "p6", "kind": "place", "gcj": [116.39817, 39.89511], "nombre": "Qian Men Da Jie", "cn": "前门大街", "tipo": "Atracción", "horario": "Zona abierta", "costeCny": 0, "visitaMin": 45, "amapKeyword": "前门大街", "resumen": "Repetido desde el 01/08: aquí queda de paso entre la casa de té y el Templo del Cielo. Si ya lo recorristeis, ocultadlo y la app recalcula el día.", "notas": "Repetido del 01/08 · queda de paso", "direccion": "Qianmen Ave, Dongcheng", "direccionCn": "北京市东城区前门大街"}, {"id": "p7", "kind": "place", "gcj": [116.41264, 39.88781], "nombre": "Templo del Cielo", "cn": "天坛公园", "tipo": "Atracción", "horario": "Parque 6:00–22:00 · monumentos 8:00–17:30", "costeCny": 88, "visitaMin": 120, "amapKeyword": "天坛公园", "resumen": "Donde los emperadores Ming y Qing hacían el sacrificio anual por la buena cosecha (1420). El Salón de la Oración, circular y de triple tejado azul sobre terraza de mármol, es de los edificios más bonitos de China. Vale la pena el billete combinado (¥44/pers, ¥88 para 2). Por la mañana el parque se llena de vecinos haciendo taichí y cantando.", "notas": "Billete combinado · el parque abre mucho antes que los monumentos", "direccion": "No.1 Tiantan East Rd, Dongcheng", "direccionCn": "北京市东城区天坛东路1号"}, {"id": "p8", "kind": "place", "gcj": [116.42052, 39.88627], "nombre": "Hongqiao Market", "cn": "红桥市场", "tipo": "Mercado/Compras", "horario": "9:30–19:00", "costeCny": 0, "visitaMin": 60, "amapKeyword": "红桥市场", "resumen": "El 'mercado de las perlas', justo enfrente de la puerta este del Templo del Cielo. Cuatro plantas: electrónica y recuerdos abajo, perlas y joyería arriba. Los precios de salida son disparatados; se regatea hasta un tercio o menos.", "notas": "Regatear a un tercio del precio de salida", "direccion": "No.16 Hongqiao Rd, Dongcheng", "direccionCn": "北京市东城区红桥路16号"}, {"id": "p9", "kind": "place", "gcj": [116.43479, 39.88102], "nombre": "Lon mbinado", "direccion": "West St, Ancient City, Pingyao", "direccionCn": "山西省晋中市平遥县古城西大街"}, {"id": "p6", "kind": "place", "gcj": [112.18549, 37.20518], "nombre": "Museo Tianjixiang", "cn": "天吉祥博物馆", "tipo": "Atracción", "horario": "8:00–18:00", "costeCny": 0, "visitaMin": 20, "amapKeyword": "天吉祥博物馆", "resumen": "Antigua casa de banca reconvertida en museo, en la calle sur. Patios tradicionales y colección de enseres comerciales. Incluido en el combinado.", "notas": "Incluido en el billete combinado", "direccion": "South St, Ancient City, Pingyao", "direccionCn": "山西省晋中市平遥县古城南大街"}, {"id": "m_com", "kind": "meal", "label": "Comida", "min": 60}, {"id": "p7", "kind": "place", "gcj": [112.19068, 37.20724], "nombre": "Templo Qingxu", "cn": "清虚观", "tipo": "Atracción", "horario": "8:00–18:00", "costeCny": 0, "visitaMin": 20, "amapKeyword": "清虚观", "resumen": "El principal templo taoísta de Pingyao (s. VII, reformado en época Ming/Qing), en la calle este. Alberga el museo de historia local. Incluido en el combinado.", "notas": "Incluido en el billete combinado", "direccion": "East St, Ancient City, Pingyao", "direccionCn": "山西省晋中市平遥县古城东大街"}, {"id": "p8", "kind": "place", "gcj": [112.18607, 37.20233], "nombre": "Calle Sur (Nan Dajie)", "cn": "南大街", "tipo": "Atracción", "horario": "Zona abierta", "costeCny": 0, "visitaMin": 30, "amapKeyword": "平遥南大街", "resumen": "La 'calle mayor' de Pingyao, su eje comercial desde hace siglos: bancas históricas, tiendas de laca y vinagre, restaurantes. La arteria más animada.", "notas": "La arteria comercial del casco", "direccion": "South St, Ancient City, Pingyao", "direccionCn": "山西省晋中市平遥县古城南大街"}, {"id": "p9", "kind": "place", "gcj": [112.19017, 37.20119], "nombre": "Templo de Confucio de Pingyao", "cn": "平遥文庙", "tipo": "Atracción", "horario": "8:00–18:00", "costeCny": 0, "visitaMin": 25, "amapKeyword": "平遥文庙", "resumen": "El templo confuciano más antiguo que se conserva en China con estructura original (la sala Dacheng es de 1163). Grandes p 4.26906], [108.947, 34.26432], [108.94689, 34.26008], [108.94645, 34.25962], [108.94673, 34.25897], [108.94738, 34.25905], [108.94785, 34.25935], [108.95114, 34.25946], [108.95402, 34.25795], [108.95401, 34.25305], [108.95397, 34.25106], [108.95379, 34.24511], [108.95377, 34.24373]], "geomWalk": null}}}, {"id": "d6", "fecha": "04/08 mar", "diaSemana": "Martes", "ciudad": "Xi'an", "ciudades": ["Xi'an"], "horaInicio": "08:00", "nota": "Xi'an completo: por la mañana los Guerreros de Terracota (a ~40 km, en Lintong; se va pronto para evitar el gentío) y por la tarde el casco: Campanario, Tambor, Gran Mezquita, el barrio musulmán (Huimin) y la muralla al atardecer. El día empieza y acaba en el hotel.", "items": [{"id": "p0", "kind": "place", "gcj": [108.95349, 34.24373], "nombre": "Xingbo Hotel (Bell Tower · Yongningmen)", "cn": "星泊酒店(西安钟楼地铁站永宁门店)", "tipo": "Hotel", "horario": "Salida 08:00", "costeCny": 0, "visitaMin": 0, "amapKeyword": "星泊酒店 西安永宁门 文艺北路", "resumen": "Salida del hotel. Desayunar por la zona o de camino a los Guerreros.", "notas": "Desayunar por aquí", "direccion": "No.38 Wenyi North Rd, Beilin, Xi'an", "direccionCn": "西安市碑林区文艺北路38号"}, {"id": "m_des", "kind": "meal", "label": "Desayuno", "min": 30}, {"id": "p1", "kind": "place", "gcj": [109.28275, 34.386], "nombre": "Guerreros de Terracota", "cn": "秦始皇兵马俑博物馆", "tipo": "Atracción", "horario": "8:30–18:00 (últ. entrada 16:00)", "costeCny": 240, "visitaMin": 150, "amapKeyword": "秦始皇兵马俑博物馆", "resumen": "El ejército de terracota del primer emperador, Qin Shi Huang (s. III a.C.): más de 8.000 guerreros de tamaño real, cada uno con rostro distinto, en tres fosos. Patrimonio de la Humanidad y una de las grandes maravillas arqueológicas del mundo. Está a ~40 km al este, en Lintong: ir pronto. ¥120/pers (¥240 para 2).", "notas": "A ~40 km (Lintong) · ir pronto · foso 1 es el imprescindible", "direccion": "Lintong District, Xi'an", "direccionCn": "西安市临潼区秦始皇兵马俑博物馆"}, {"id": "p2", "kind": "place", "gcj": [108.947, 34.25943], "nombre": "Campanario de Xi'an", "cn": "西安钟楼", "tipo": "Atracción", "horario": "8:30–21:00 (últ. entrada 20:30)", "costeCny": 100, "visitaMin": 45, "amapKeyword": "西安钟楼", "resumen": "La torre de la campana (1384, Ming), en el centro exacto de la ciudad amurallada, sobre una gran base de ladrillo en mitad de una rotonda. Se sube a la galería y hay pases de música con instrumentos antiguos. Billete combinado con el Tambor: ¥50/pers (¥100 para 2).", "notas": "Billete combinado con el Tambor", "direccion": "City Center, Xi'an", "direccionCn": "西安市碑林区钟楼"}, {"id": "p3", "kind": "place", "gcj": [108.94349, 34.26017], "nombre": "Torre del Tambor", "cn": "西安鼓楼", "tipo": "Atracción", "horario": "8:30–21:00 (últ. entrada 20:30)", "costeCny": 0, "visitaMin": 30, "amapKeyword": "西安鼓楼", "resumen": "Frente al Campanario, la torre del tambor (1380) marca la entrada del barrio musulmán. Colección de tambores y buenas vistas de los tejados. Entrada incluida en el billete combinado con el Campanario.", "notas": "Incluido en el combinado con el Campanario", "direccion": "Beiyuanmen, Xi'an", "direccionCn": "西安市莲湖区北院门鼓楼"}, {"id": "p4", "kind": "place", "gcj": [108.94097, 34.26143], "nombre": "Gran Mezquita de Xi'an", "cn": "西安化觉巷清真大寺", "tipo": "Atracción", "horario": "8:00–19:00", "costeCny": 0, "visitaMin": 45, "amapKeyword": "西安化觉巷清真大寺", "resumen": "Una de las mezquitas más grandes y antiguas de China (fundada en 742), única por estar construida como un templo chino: patios, pabellones y un minarete con forma de pagoda, en vez de cúpulas. Escondida en los callejones del barrio musulmán. Muy tranquila.", "notas": "Vestir con respeto · en el barrio musulmán", "direccion": "Huajue Ln, Xi'an", "direccionCn": "西安市莲湖区化觉巷"}, {"id": "p5", "kind": "place", "gcj": [108.94358, 34.26178], "nombre": "Barrio Musulmán (Huimin Jie)", "cn": "回民街", "tipo": "Comida", "horario": "Todo el día, mejor tarde-noche", "costeCny": 0, "visitaMin": 60, "amapKeyword": "回民街", "resumen": "El barrio de la comu omen 8:30–10:00 · recinto grande", "direccion": "No.1375 Panda Rd, Chenghua, Chengdu", "direccionCn": "成都市成华区熊猫大道1375号"}, {"id": "p2", "kind": "place", "gcj": [104.07259, 30.67433], "nombre": "Monasterio Wenshu", "cn": "文殊院", "tipo": "Atracción", "horario": "8:00–17:00 · gratis", "costeCny": 0, "visitaMin": 60, "amapKeyword": "成都文殊院", "resumen": "El templo budista mejor conservado de Chengdu (dinastía Tang), sede de la Asociación Budista de Sichuan. Salas de incienso, un jardín de bambú y una célebre casa de té y comedor vegetariano en el recinto. Gratis y muy tranquilo. OJO: en Amap el primer resultado suele ser la PARADA DE METRO homónima, a 300 m; el templo es el recinto al norte.", "notas": "Gratis · casa de té y comedor vegetariano dentro", "direccion": "No.66 Wenshuyuan St, Qingyang, Chengdu", "direccionCn": "成都市青羊区文殊院街66号"}, {"id": "m_com", "kind": "meal", "label": "Comida", "min": 60}, {"id": "p3", "kind": "place", "gcj": [104.05374, 30.66375], "nombre": "Callejones Kuan y Zhai", "cn": "宽窄巷子", "tipo": "Atracción", "horario": "Zona abierta (locales ~10:00–22:00)", "costeCny": 0, "visitaMin": 90, "amapKeyword": "宽窄巷子", "resumen": "Tres callejones paralelos (el Ancho, el Estrecho y el del Pozo) de casas Qing restauradas: patios, casas de té, teatro de sombras, artesanía y comida callejera. Muy turístico pero bonito; buen sitio para tomar té, ver una función de 'cambio de caras' (变脸) o comer un tentempié. Gratis, se pasea.", "notas": "Casas de té · cambio de caras (变脸) · comida callejera", "direccion": "Kuanzhaixiangzi, Qingyang, Chengdu", "direccionCn": "成都市青羊区宽窄巷子"}, {"id": "p4", "kind": "place", "gcj": [104.05968, 30.62642], "nombre": "Mercado de Yulin", "cn": "玉林综合市场", "tipo": "Comida", "horario": "Barrio gastronómico · noche", "costeCny": 0, "visitaMin": 45, "amapKeyword": "玉林综合市场 成都", "resumen": "En pleno Yulin, el barrio de bares y comida más de moda de Chengdu. El mercado y las calles de alrededor son el sitio para cenar a la sichuanesa: brochetas (串串香),  (está aquí mismo) e ir hacia la estación para el tren a Chengdu.", "notas": "Recoger maletas en el hotel antes del tren", "direccion": "Baoguosi, Emeishan", "direccionCn": "峨眉山市黄湾镇报国寺"}, {"id": "p4", "kind": "place", "gcj": [103.4667, 29.57613], "nombre": "Estación de Emeishan", "cn": "峨眉山站", "tipo": "Tren/Transporte", "horario": "Tren a Chengdu · sale 18:49", "costeCny": 0, "visitaMin": 40, "amapKeyword": "峨眉山站", "resumen": "Estación de alta velocidad de Emeishan. Tren de vuelta a Chengdu Este (sale 18:49, llega 19:59). HORA FIJA: llegad con margen; si os sobra tiempo, esperáis aquí.", "notas": "Salida FIJA 18:49 · pasaporte = billete", "direccion": "Emeishan, Sichuan", "direccionCn": "峨眉山市峨眉山站"}, {"id": "p5", "kind": "place", "gcj": [104.14141, 30.62874], "nombre": "Estación de Chengdu Este", "cn": "成都东站", "tipo": "Tren/Transporte", "horario": "Llegada 19:59", "costeCny": 0, "visitaMin": 5, "amapKeyword": "成都东站", "resumen": "Vuelta a Chengdu (19:59). Metro (líneas 2 y 7) o Didi al hotel, en el centro junto a Taikoo Li (~25 min). Cenar por el centro al llegar.", "notas": "Metro L2/L7 o Didi al hotel (~25 min)", "direccion": "Chenghua District, Chengdu", "direccionCn": "成都市成华区成都东站"}, {"id": "m_cen", "kind": "meal", "label": "Cena", "min": 45}, {"id": "p6", "kind": "place", "gcj": [104.0719, 30.65704], "nombre": "Chupin Hotel (vuelta)", "cn": "初品·精选酒店(成都春熙路太古里店)", "tipo": "Hotel", "horario": "Fin del día", "costeCny": 0, "visitaMin": 0, "amapKeyword": "初品精选酒店 成都青年路67号", "resumen": "Vuelta al hotel de Chengdu (centro, junto a Taikoo Li).", "notas": "El día acaba en el hotel", "direccion": "No.67 Qingnian Rd, Jinjiang, Chengdu", "direccionCn": "成都市锦江区青年路67号"}], "legs": {"p0>p1": {"distKm": 1.0, "walkMin": 14, "transitMin": null, "didiMin": 3, "geomDrive": [[103.45264, 29.56736], [103.45218, 29.56724], [103.45181, 29.56714], [103.45138, 29.56702], [103.45098, 29.56692], [103.45059, 29.56684], [103.44954, 29.56661], [103.44676, 29.56591], [103.44666, 29.56595], [103.446 ha": "09/08 dom", "diaSemana": "Domingo", "ciudad": "Chengdu", "ciudades": ["Chengdu"], "horaInicio": "09:00", "nota": "Último día completo en Chengdu, a pie por el centro-oeste: la plaza Tianfu, el Parque del Pueblo (casas de té y limpieza de oídos), el barrio del templo Wuhou con la calle de tapas y la calle antigua de Jinli, el templo taoísta Qingyang con el Parque de la Cultura al lado, y de cena el mercado de Fuqin. El día empieza y acaba en el hotel.", "items": [{"id": "p0", "kind": "place", "gcj": [104.0719, 30.65704], "nombre": "Chupin Hotel (Chunxi · Taikoo Li)", "cn": "初品·精选酒店(成都春熙路太古里店)", "tipo": "Hotel", "horario": "Salida 09:00", "costeCny": 0, "visitaMin": 0, "amapKeyword": "初品精选酒店 成都青年路67号", "resumen": "Salida del hotel. Desayunar por la zona (centro, Chunxi Lu).", "notas": "Desayunar por aquí", "direccion": "No.67 Qingnian Rd, Jinjiang, Chengdu", "direccionCn": "成都市锦江区青年路67号"}, {"id": "m_des", "kind": "meal", "label": "Desayuno", "min": 30}, {"id": "p1", "kind": "place", "gcj": [104.06571, 30.65718], "nombre": "Plaza de Tianfu", "cn": "天府广场", "tipo": "Atracción", "horario": "Zona abierta", "costeCny": 0, "visitaMin": 30, "amapKeyword": "天府广场", "resumen": "La gran plaza central de Chengdu, con la estatua de Mao, las fuentes y, bajo tierra, el Museo de la Ciudad. Punto cero de la ciudad y arranque del paseo. Gratis, zona abierta.", "notas": "Centro de la ciudad · fuentes", "direccion": "Tianfu Square, Qingyang, Chengdu", "direccionCn": "成都市青羊区天府广场"}, {"id": "p2", "kind": "place", "gcj": [104.06028, 30.65638], "nombre": "Parque del Pueblo", "cn": "人民公园", "tipo": "Atracción", "horario": "6:30–22:00 · gratis", "costeCny": 0, "visitaMin": 75, "amapKeyword": "人民公园 成都", "resumen": "El parque más querido de Chengdu: lago con barcas, bonsáis y, sobre todo, la casa de té Heming al aire libre — el sitio clásico para tomar té, jugar al mahjong y que te limpien los oídos (采耳). Estampa de la vida local de fin de semana. Gratis.", "notas": "Casa de té Heming · limpieza de oídos (采耳) · té y mahjong", "direccion": "Shaocheng Rd, Qingyang, Chengdu", "direccionCn": "成都市青羊区少城路人民公园"}, {"id": "p3", "kind": "place", "gcj": [104.04702, 30.64296], "nombre": "Wuhouci Dong Jie", "cn": "武侯祠东街", "tipo": "Comida", "horario": "Comida · zona abierta", "costeCny": 0, "visitaMin": 40, "amapKeyword": "武侯祠东街", "resumen": "Calle al este del templo Wuhou, con restaurantes y puestos de tapas de Sichuan. Buen sitio para comer antes de entrar al templo y a Jinli. Aquí se come.", "notas": "Comer por aquí · tapas de Sichuan", "direccion": "Wuhouci East St, Wuhou, Chengdu", "direccionCn": "成都市武侯区武侯祠东街"}, {"id": "m_com", "kind": "meal", "label": "Comida", "min": 0}, {"id": "p4", "kind": "place", "gcj": [104.04759, 30.6445], "nombre": "Templo Wuhou", "cn": "武侯祠", "tipo": "Atracción", "horario": "8:00–18:00 · ¥50/pers", "costeCny": 100, "visitaMin": 90, "amapKeyword": "成都武侯祠", "resumen": "El santuario a Zhuge Liang y Liu Bei, dedicado a los héroes del reino de Shu (los Tres Reinos): el templo más importante de China sobre esa época, con estatuas, estelas y un jardín precioso. Comparte recinto con la tumba de Liu Bei. ¥50/pers (¥100 para 2). Se sale por el norte, directo a Jinli.", "notas": "Tres Reinos · Zhuge Liang · se sale hacia Jinli", "direccion": "No.231 Wuhouci Ave, Wuhou, Chengdu", "direccionCn": "成都市武侯区武侯祠大街231号"}, {"id": "p5", "kind": "place", "gcj": [104.04941, 30.64635], "nombre": "Calle antigua de Jinli", "cn": "锦里", "tipo": "Comida", "horario": "Zona abierta (~10:00–22:00)", "costeCny": 0, "visitaMin": 60, "amapKeyword": "锦里", "resumen": "La calle antigua pegada al templo Wuhou, de estilo Qing: farolillos rojos, artesanía, teatro de sombras y, sobre todo, comida callejera de Sichuan (三大炮, brochetas, tofu picante). Muy animada al caer la tarde. Gratis, se pasea y se pica.", "notas": "Comida callejera · farolillos · muy animada de tarde", "direccion": "Wuhouci Ave, Wuhou, Chengdu", "direccionCn": "成都市武侯区武侯祠大街锦里"}, {"id": "p6", "kind": "place", "gcj": [104.04129, 30.65984], "nombre": "Templo Qingyang", "cn": "青羊宫", "tipo": "Atracción", "horario": "8:00–18:00 · ¥10/pers", "costeCny": 20, "visitaMin": 45, "amapKeyword": "青羊宫 成都", "resumen": "El templo taoísta más antiguo y grande de Chengdu (dinastía Tang), dedicado a Laozi. Destaca el Pabellón de los Ocho Trigramas, octogonal, y los dos carneros de bronce (青羊 = 'carnero verde'). Tranquilo, con casa de té. ¥10/pers (¥20 para 2).", "notas": "Taoísmo · carneros de bronce · casa de té", "direccion": "No.9 Yihuan Rd W Sec 2, Qingyang, Chengdu", "direccionCn": "成都市青羊区一环路西二段9号"}, {"id": "p7", "kind": "place", "gcj": [104.04408, 30.66056], "nombre": "Parque de la Cultura", "cn": "成都文化公园", "tipo": "Atracción", "horario": "Zona abierta · gratis", "costeCny": 0, "visitaMin": 30, "amapKeyword": "成都文化公园", "resumen": "Parque pegado al templo Qingyang, con estanques, bambú y la Torre Zhihui. En primavera acoge la Feria de las Flores; el resto del año, un remanso tranquilo para pasear. Gratis.", "notas": "Pegado a Qingyang · tranquilo", "direccion": "Qintai Rd, Qingyang, Chengdu", "direccionCn": "成都市青羊区琴台路成都文化公园"}, {"id": "p8", "kind": "place", "gcj": [104.04034, 30.67974], "nombre": "Mercado de Fuqin", "cn": "抚琴综合市场", "tipo": "Comida", "horario": "Barrio local · noche", "costeCny": 0, "visitaMin": 40, "amapKeyword": "抚琴综合市场 成都", "resumen": "Mercado y calles de comida del barrio de Fuqin (Jinniu), muy popular entre los chengdaneses por sus tabernas y puestos baratos: olla picante, brochetas y guisos caseros. Poco turístico, ambiente local. Aquí se cena.", "notas": "Cenar por aquí · barrio local · poco turístico", "direccion": "Fuqin, Jinniu, Chengdu", "direccionCn": "成都市金牛区抚琴综合市场"}, {"id": "m_cen", "kind": "meal", "label": "Cena", "min": 0}, {"id": "p9", "kind": "place", "gcj": [104.0719, 30.65704], "nombre": "Chupin Hotel (vuelta)", "cn": "初品·精选酒店(成都春熙路太古里店)", "tipo": "Hotel", "horario": "Fin del día", "costeCny": 0, "visitaMin": 0, "amapKeyword": "初品精选酒店 成都青年路67号", "resume as nocturnas · la mejor panorámica · se sube en Didi", "direccion": "Nanshan, Nan'an, Chongqing", "direccionCn": "重庆市南岸区南山一棵树观景台"}, {"id": "p11", "kind": "place", "gcj": [106.57723, 29.55488], "nombre": "Mercado nocturno de Jiaochangkou", "cn": "较场口夜市", "tipo": "Comida", "horario": "Noche · ~18:00–2:00", "costeCny": 0, "visitaMin": 45, "amapKeyword": "较场口夜市 重庆", "resumen": "Mercado nocturno de comida en Jiaochangkou (cruce de Zhonghua Lu con Bayi Lu): olla picante, brochetas, marisco y cerveza fría hasta la madrugada, muy popular entre los locales. Aquí se cena, con ambiente de calle.", "notas": "Cenar por aquí · mercado nocturno · ambiente local", "direccion": "Zhonghua Rd × Bayi Rd, Yuzhong, Chongqing", "direccionCn": "重庆市渝中区中华路与八一路交叉口"}, {"id": "m_cen", "kind": "meal", "label": "Cena", "min": 0}, {"id": "p12", "kind": "place", "gcj": [106.57959, 29.55612], "nombre": "The Move Hotel (vuelta)", "cn": "TheMove江景酒店(重庆解放碑洪崖洞店)", "tipo": "Hotel", "horario": "Fin del día", "costeCny": 0, "visitaMin": 0, "amapKeyword": "TheMove江景酒店 重庆解放碑洪崖洞", "resumen": "Vuelta al hotel (Jiefangbei).", "notas": "El día acaba en el hotel", "direccion": "20F, Peninsula Intl Business Bldg, No.50 Zourong Rd, Yuzhong, Chongqing", "direccionCn": "重庆市渝中区邹容路50号半岛国际商务楼20层"}], "legs": {"p0>p1": {"distKm": 3.8, "walkMin": 8, "transitMin": 17, "didiMin": 7, "geomDrive": [[106.57952, 29.556], [106.5798, 29.55788], [106.58022, 29.55866], [106.58048, 29.55932], [106.58064, 29.56004], [106.58107, 29.56073], [106.58145, 29.56093], [106.5814, 29.56113], [106.58121, 29.56149], [106.58099, 29.56209], [106.58084, 29.56219], [106.58066, 29.56221], [106.58044, 29.56224], [106.58018, 29.56264], [106.57816, 29.56702], [106.57705, 29.56949], [106.57678, 29.56999], [106.57656, 29.57031], [106.57631, 29.57055], [106.57599, 29.57081], [106.57555, 29.57106], [106.57366, 29.57199], [106.57461, 29.57148], [106.57585, 29.57081], [106.57604, 29.5707], [106.57638, 29.5704], [106.57661, 29.57012], [106.57684, 29.56972], [1 ], [110.29803, 25.28492], [110.29814, 25.28498], [110.29826, 25.28507], [110.29888, 25.28489]]}}}, {"id": "d18", "fecha": "16/08 dom", "diaSemana": "Domingo", "ciudad": "Yangshuo", "ciudades": ["Guilin", "Yangshuo"], "horaInicio": "08:00", "nota": "Excursión de día completo a Yangshuo (阳朔), a ~65 km al sur de Guilin, el corazón del paisaje de picos kársticos del río Li. Traslado por carretera (Didi/bus) desde el centro de Guilin; en Yangshuo, la calle Oeste (西街), los embarcaderos del río Yulong (遇龙河) para las balsas de bambú, el puente antiguo de Fuli y otra vuelta por la calle Oeste al anochecer. Se vuelve a dormir a Guilin. Nota: el traslado ida/vuelta es largo; la app lo cuenta como Didi/bus.", "items": [{"id": "m_des", "kind": "meal", "label": "Desayuno", "min": 25}, {"id": "p0", "kind": "place", "gcj": [110.29887, 25.28487], "nombre": "Floral Hotel · Courtyard 8, Gonghou Lane", "cn": "花筑·贡后巷8号院(桂林两江四湖象鼻山店)", "tipo": "Hotel", "horario": "Salida 08:00", "costeCny": 0, "visitaMin": 0, "amapKeyword": "花筑贡后巷8号院 桂林象鼻山", "resumen": "Desayuno temprano y salida hacia Yangshuo. El traslado por carretera dura ~1h15.", "notas": "Desayuno · salida a Yangshuo", "direccion": "No.33-39 Fengbei Rd, Diecai, Guilin", "direccionCn": "桂林市叠彩区凤北路33-39号"}, {"id": "p1", "kind": "place", "gcj": [110.29479, 25.27462], "nombre": "Salida a Yangshuo (Shanhu)", "cn": "杉湖大酒店", "tipo": "Tren/Transporte", "horario": "Traslado ~1h15", "costeCny": 0, "visitaMin": 10, "amapKeyword": "桂林 杉湖大酒店", "resumen": "Punto de recogida para Yangshuo, junto al lago Shan (o similar, según el transporte contratado). De aquí sale el Didi/bus hacia el sur.", "notas": "Recogida junto al lago Shan (o similar)", "direccion": "Shanhu, Guilin", "direccionCn": "桂林市杉湖大酒店"}, {"id": "p2", "kind": "place", "gcj": [110.49611, 24.77462], "nombre": "Llegada a Yangshuo (Rongshi)", "cn": "阳朔荣氏工艺品批发", "tipo": "Tren/Transporte", "horario": "Llegada ~9:15", "costeCny": 0, "visitaMin": 10, "amapKeyword": "阳朔 荣氏工艺品", "resumen": "Llegada a Yangshuo, junto a la calle Oeste. Desde aquí el día es a pie y en balsa por la zona del río Yulong.", "notas": "Llegada a Yangshuo · aprox.", "direccion": "Yangshuo, Guilin", "direccionCn": "桂林市阳朔县荣氏工艺品批发"}, {"id": "p3", "kind": "place", "gcj": [110.49508, 24.77529], "nombre": "Calle Oeste (West Street)", "cn": "阳朔西街", "tipo": "Atracción", "horario": "Abierto todo el día", "costeCny": 0, "visitaMin": 45, "amapKeyword": "阳朔西街", "resumen": "La 西街 de Yangshuo, la calle peatonal más famosa del karst: casas antiguas con cafés, bares y tiendas, muy animada. Se pasa por la mañana y se vuelve de noche.", "notas": "Calle turística peatonal", "direccion": "Yangshuo, Guilin", "direccionCn": "桂林市阳朔县西街"}, {"id": "p4", "kind": "place", "gcj": [110.44972, 24.77224], "nombre": "Embarcadero Jima", "cn": "骥马码头", "tipo": "Atracción", "horario": "Balsas ~9:00–17:00", "costeCny": 0, "visitaMin": 30, "amapKeyword": "阳朔 遇龙河 骥马码头", "resumen": "Uno de los embarcaderos del río Yulong (遇龙河, al oeste del pueblo) donde se cogen las balsas de bambú a remo que bajan entre los picos. Tramo tranquilo del río.", "notas": "Embarcadero de balsas de bambú · aprox. (sobre el Yulong)", "direccion": "Yangshuo, Guilin", "direccionCn": "桂林市阳朔县遇龙河骥马码头"}, {"id": "p5", "kind": "place", "gcj": [110.47467, 24.75918], "nombre": "Embarcadero Chaoyang", "cn": "朝阳码头", "tipo": "Atracción", "horario": "Balsas ~9:00–17:00", "costeCny": 280, "visitaMin": 90, "amapKeyword": "阳朔 遇龙河 朝阳码头", "resumen": "Embarcadero muy popular del río Yulong para las balsas de bambú. El paseo en balsa (≈¥150–300 según tramo) es lo destacado del día: agua verde, búfalos y picos. ≈¥280 para 2 (aprox., según tramo y regateo).", "notas": "Balsa de bambú por el Yulong · coste aprox. 2 pers.", "direccion": "Yangshuo, Guilin", "direccionCn": "桂林市阳朔县遇龙河朝阳码头"}, {"id": "p6", "kind": "place", "gcj": [110.48664, 24.74514], "nombre": "Embarcadero Xiatang", "cn": "下塘码头", "tipo": "Atracción", "horario": "Balsas ~9:00–17:00", "costeCny": 0, "visitaMi // Día que toca HOY: se abre por el día cuya fecha coincide con la de hoy (o el último ya pasado).
// El viaje es de julio-agosto de 2026, así que el año se fija a 2026. Antes de empezar el viaje
// (o si hoy no cae en ningún día montado) cae al día 1. `current` no se persiste: cada vez que se
// abre la app se recalcula, así que siempre arranca en el día correcto.
function diaDeHoy(){const n=new Date();const hoy=n.getFullYear()*10000+(n.getMonth()+1)*100+n.getDate();
  let best=-1;VIAJE.dias.forEach((d,i)=>{const m=/^(\d{1,2})\/(\d{1,2})/.exec(d.fecha||"");if(!m)return;
    const val=2026*10000+(+m[2])*100+(+m[1]);if(val<=hoy)best=i;});return best<0?0:best;}

/* geo */
function outChina(lng,lat){return!(lng>73.66&&lng<135.05&&lat>3.86&&lat<53.55);}
function tLat(x,y){var r=-100+2*x+3*y+0.2*y*y+0.1*x*y+0.2*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*Math.PI)+20*Math.sin(2*x*Math.PI))*2/3;r+=(20*Math.sin(y*Math.PI)+40*Math.sin(y/3*Math.PI))*2/3;r+=(160*Math.sin(y/12*Math.PI)+320*Math.sin(y*Math.PI/30))*2/3;return r;}
function tLng(x,y){var r=300+x+2*y+0.1*x*x+0.1*x*y+0.1*Math.sqrt(Math.abs(x));r+=(20*Math.sin(6*x*Math.PI)+20*Math.sin(2*x*Math.PI))*2/3;r+=(20*Math.sin(x*Math.PI)+40*Math.sin(x/3*Math.PI))*2/3;r+=(150*Math.sin(x/12*Math.PI)+300*Math.sin(x/30*Math.PI))*2/3;return r;}
function wgs2gcj(lng,lat){if(outChina(lng,lat))return[lng,lat];var a=6378245,ee=0.00669342162296594323;var dLat=tLat(lng-105,lat-35),dLng=tLng(lng-105,lat-35);var rl=lat/180*Math.PI,m=Math.sin(rl);m=1-ee*m*m;var sm=Math.sqrt(m);dLat=dLat*180/((a*(1-ee))/(m*sm)*Math.PI);dLng=dLng*180/(a/sm*Math.cos(rl)*Math.PI);return[lng+dLng,lat+dLat];}
function haversine(a,b){var R=6371,dl=(b[1]-a[1])*Math.PI/180,dn=(b[0]-a[0])*Math.PI/180,la1=a[1]*Math.PI/180,la2=b[1]*Math.PI/180;var x=Math.sin(dl/2)**2+Math.cos(la1)*Math.cos(la2)*Math.sin(dn/2)**2;return 2*R*Math.asin(Math.sqrt(x));}

/* items/legs/schedule */
function orderedIds(day){const d=ds(day.id);if(d.order&&d.order.length===day.items.length)return d.order.slice();return day.items.map(it=>it.id);}
function itemById(day,id){return day.items.find(it=>it.id===id);}
function visitMin(day,it){const d=ds(day.id);return d.visitas[it.id]!=null?d.visitas[it.id]:(it.kind==="meal"?it.min:it.visitaMin);}
function legData(day,aId,bId){const key=aId+">"+bId,pre=day.legs[key];if(pre)return Object.assign({key:key,est:false},pre);
  const a=itemById(day,aId),b=itemById(day,bId),road=haversine(a.gcj,b.gcj)*1.3;
  return {key:key,est:true,distKm:Math.round(road*10)/10,walkMin:road<3?Math.round(road/4.6*60):null,didiMin:Math.max(3,Math.round(road/22*60+7)),transitMin:road<1.2?null:Math.round(2*road+15),geomDrive:[a.gcj,b.gcj],geomWalk:null};}
function legMode(day,L){const d=ds(day.id);let m=d.modos[L.key];if(!m)m=(L.walkMin!=null&&L.distKm<1.6)?"walk":"didi";if(L[m+"Min"]==null){for(const x of["didi","transit","walk"])if(L[x+"Min"]!=null){m=x;break;}}return m;}
function legVal(day,L){const d=ds(day.id),m=legMode(day,L);return d.tiempos[L.key]!=null?d.tiempos[L.key]:L[m+"Min"];}
function visibleSeq(day){const d=ds(day.id);return orderedIds(day).map(id=>itemById(day,id)).filter(it=>it&&!d.hidden[it.id]).map(it=>({it,isLoc:it.kind!=="meal"||!!it.gcj}));}
function schedule(day){let t=toMin(ds(day.id).start||day.horaInicio),prev=null;const out={};
  visibleSeq(day).forEach(({it,isLoc})=>{if(isLoc&&prev){const L=legData(day,prev.id,it.id);t+=legVal(day,L);}out[it.id]={arr:t,dep:t+visitMin(day,it)};t+=visitMin(day,it);if(isLoc)prev=it;});return out;}

function legGastos(day,key){return ds(day.id).gastos[key]||[];}

function tripSummary(){const days=[];const byCat={entradas:0,comidas:0,transporte:0,extras:0};
  VIAJE.dias.forEach(day=>{const d=ds(day.id);let dt={entradas:0,comidas:0,transporte:0,extras:0};
    const seq=visibleSeq(day);let prev=null;
    seq.forEach(({it,isLoc})=>{gastosOf(day,it).forEach(g=>{dt[g.cat||catDe(it)]+=(+g.amount||0);});
      if(isLoc&&prev){legGastos(day,prev.id+">"+it.id).forEach(g=>{dt[g.cat||"transporte"]+=(+g.amount||0);});}if(isLoc)prev=it;});
    (d.extras||[]).forEach(g=>{dt[g.cat||"extras"]+=(+g.amount||0);});
    const tot=dt.entradas+dt.comidas+dt.transporte+dt.extras;
    for(const c in byCat)byCat[c]+=dt[c];
    days.push({id:day.id,fecha:day.fecha,ciudad:day.ciudad,dt,tot});});
  const total=byCat.entradas+byCat.comidas+byCat.transporte+byCat.extras;
  return {days,byCat,total};}

/* ---------- AVISO DE VERSIÓN NUEVA ----------
   Pregunta por un fichero de 3 bytes, no recarga nada. Si hay versión nueva avisa y deja
   que el usuario decida: recargar solo le cortaría a media edición. */
const VER="v46";
let updVista=false;
/* Lo lanza SOLO el usuario, desde el botón del pie. Sin comprobaciones automáticas: él sabe
   cuándo se ha publicado algo, y así nada le interrumpe por su cuenta. */
async function chkVer(){
  if(updVista)return;
  const b=document.getElementById("verBtn");
  if(!navigator.onLine){toast("Sin conexión");return;}
  if(b)b.classList.add("busy");
  try{
    const r=await fetch("version.txt?t="+Date.now(),{cache:"no-store"});
    if(!r.ok)throw new Error(r.status);
    const v=(await r.text()).trim();
    if(v&&v!==VER){updVista=true;barraUpd(v);}
    else toast("Ya tienes la última versión ("+VER+")");
  }catch(e){toast("No se pudo comprobar");}
  if(b)b.classList.remove("busy");}
function barraUpd(v){
  if(document.getElementById("updbar"))return;
  const b=document.createElement("div");b.id="updbar";b.className="updbar";
  b.innerHTML='<span>'+ic("refresh-cw")+'Versión nueva '+esc(v)+'</span><button id="updGo">Actualizar</button>';
  document.body.appendChild(b);
  /* por duplicado a propósito: si el rAF no dispara, la barra se quedaría fuera de pantalla */
  const ver=()=>b.classList.add("show");
  requestAnimationFrame(ver);setTimeout(ver,60);
  b.querySelector("#updGo").onclick=async()=>{
    b.querySelector("#updGo").textContent="…";
    /* subimos lo pendiente antes de recargar, para no dejarlo colgado */
    try{if(sb&&navigator.onLine)await doSync(true);}catch(e){}
    try{if(navigator.serviceWorker){const r=await navigator.serviceWorker.getRegistration();if(r)await r.update();}}catch(e){}
    location.reload();};}

/* ---------- SYNC ----------
   Cada dato modificado es una entrada independiente con su clave y su marca de tiempo.
   Los gastos llevan id propio: si los dos móviles añaden gastos a la vez, se suman los dos.
   Si se edita el MISMO dato en ambos, gana la marca de tiempo más reciente. */
const CFG="viajeChina.sb", SK="viajeChina.sync";
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
let sb=(function(){try{return JSON.parse(localStorage.getItem(CFG))||null}catch(e){return null}})();
let sync=(function(){try{return JSON.parse(localStorage.getItem(SK))||{}}catch(e){return{}}})();

function sbFetch(path,opt){opt=opt||{};

/* estado local -> entradas planas */
function exportEntries(){const e={};
  VIAJE.dias.forEach(day=>{const d=state[day.id];if(!d)return;const P=day.id+".";
    if(d.start)e[P+"start"]=d.start;
    if(d.order)e[P+"order"]=d.order;
    for(const k in d.hidden)if(d.hidden[k])e[P+"hid."+k]=1;
    for(const k in d.visitas)if(d.visitas[k]!=null)e[P+"vis."+k]=d.visitas[k];
    for(const k in d.done)if(d.done[k])e[P+"don."+k]=1;
    for(const k in d.ticket)if(d.ticket[k])e[P+"tik."+k]=1;
    for(const k in d.modos)if(d.modos[k])e[P+"mod."+k]=d.modos[k];
    for(const k in d.tiempos)if(d.tiempos[k]!=null)e[P+"tim."+k]=d.tiempos[k];
    /* qué se comió en cada hueco. La FOTO no entra aquí: viaja solo el id, el jpeg se queda
       en IndexedDB de cada móvil (ver §fotos). Meter base64 en las entradas de sync haría
       que cada foto viajase entera en cada push. */
    for(const k in d.comidas)if(d.comidas[k])e[P+"com."+k]=d.comidas[k];
    /* nota escrita por nosotros en cada sitio. Texto plano; el prefijo "not." no choca con
       "com" (comidas) ni con "notas" del dato del lugar (que es fijo y no viaja). */
    for(const k in d.nota)if(d.nota[k])e[P+"not."+k]=d.nota[k];
    /* etiqueta de horario editada (hora fija del tren, apertura…). Prefijo "hor." (no choca). */
    for(const k in d.horarios)if(d.horarios[k]!=null)e[P+"hor."+k]=d.horarios[k];
    for(const slot in d.gastos){e[P+"gm."+slot]=1;
      d.gastos[slot].forEach(g=>{if(!g.id)g.id=gid();e[P+"g."+g.id]={s:slot,l:g.label,a:g.amount,c:g.cat};});}
    (d.extras||[]).forEach(g=>{if(!g.id)g.id=gid();e[P+"g."+g.id]={s:"_x",l:g.label,a:g.amount,c:g.cat};});
  });return e;}

/* entradas -> estado local (los gastos se reconstruyen enteros desde las entradas) */
function applySnap(){
  VIAJE.dias.forEach(day=>{const d=ds(day.id);
    d.hidden={};d.visitas={};d.modos={};d.tiempos={};d.gastos={};d.extras=[];d.comidas={};d.nota={};d.horarios={};d.done={};d.ticket={};delete d.order;delete d.start;});
  const gs={};
  for(const k in sync.snap){const e=sync.snap[k];if(e.v==null)continue;
    const i=k.indexOf(".");if(i<0)continue;
    const dayId=k.slice(0,i),rest=k.slice(i+1);
    if(!VIAJE.dias.some(x=>x.id===dayId))continue;
    const d=ds(dayId);
    if(rest==="start"){d.start=e.v;continue;}
    if(rest==="order"){d.order=e.v;continue;}
    const j=rest.indexOf(".");if(j<0)continue;
    const t=rest.slice(0,j),id=rest.slice(j+1);
    if(t==="hid")d.hidden[id]=true;
    else if(t==="don")d.done[id]=true;
    else if(t==="tik")d.ticket[id]=true;
    else if(t==="vis")d.visitas[id]=e.v;
    else if(t==="mod")d.modos[id]=e.v;
    else if(t==="tim")d.tiempos[id]=e.v;
    else if(t==="com")d.comidas[id]=e.v;
    else if(t==="not")d.nota[id]=e.v;
    else if(t==="hor")d.horarios[id]=e.v;
    else if(t==="gm"){d.gastos[id]=d.gastos[id]||[];}
    else if(t==="g"&&e.v&&e.v.s)(gs[dayId]=gs[dayId]||[]).push({id:id,s:e.v.s,l:e.v.l,a:e.v.a,c:e.v.c});}
  for(const dayId in gs){const d=ds(dayId);
    gs[dayId].sort((a,b)=>a.id<b.id?-1:a.id>b.id?1:0);
    gs[dayId].forEach(x=>{const o={id:x.id,label:x.l,amount:x.a};if(x.c)o.cat=x.c;
      if(x.s==="_x")d.extras.push(o);else (d.gastos[x.s]=d.gastos[x.s]||[]).push(o);});}
  saveLocal();}

/* marca con la hora actual todo lo que haya cambiado desde la última vez */
function stampChanges(){const cur=exportEntries(),sn=sync.snap,now=Date.now();let n=0;
  for(const k in cur){const j=JSON.stringify(cur[k]);
    if(!sn[k]||sn[k].j!==j){sn[k]={j:j,v:cur[k],ts:now,dv:sync.dev,d:1};n++;}}
  for(const k in sn){if(!(k in cur)&&sn[k].v!==null){sn[k]={j:"null",v:null,ts:now,dv:sync.dev,d:1};n++;}}
  if(n){saveSync();if(syncState==="ok")setSync("idle");}
  return n;}

function pendientes(){let n=0;for(const k in sync.snap)if(sync.snap[k].d)n++;return n;}

function paintSync(){const b=document.getElementById("syncBtn");if(!b)return;

    busy:["refresh-cw","busy","Subiendo"],ok:["cloud","ok","Al día"],err:["triangle-alert","err","Error"]};
  const m=map[syncState]||map.idle;

async function pull(){
  const r=await sbFetch("/rest/v1/cambios?select=k,v,ts,dev&ts=gt."+(sync.pull||0)+"&order=ts.asc&limit=10000",{});
  if(!r.ok)throw new Error("HTTP "+r.status);
  const rows=await r.json();let n=0,max=sync.pull||0;
  rows.forEach(row=>{if(row.ts>max)max=row.ts;
    const cur=sync.snap[row.k];
    /* gana la marca más reciente; si empatan al milisegundo, desempata el id de móvil
       (siempre igual en los dos, para que acaben viendo lo mismo) */
    if(cur&&(cur.ts>row.ts||(cur.ts===row.ts&&(cur.dv||"")>=(row.dev||""))))return;
    sync.snap[row.k]={j:JSON.stringify(row.v),v:row.v,ts:row.ts,dv:row.dev};n++;});
  sync.pull=max;
  if(n)applySnap();
  saveSync();return n;}

async function push(){const rows=[];
  for(const k in sync.snap){const s=sync.snap[k];if(s.d)rows.push({k:k,v:s.v,ts:s.ts,dev:sync.dev});}
  if(!rows.length)return 0;
  for(let i=0;i<rows.length;i+=200){
    const r=await sbFetch("/rest/v1/cambios?on_conflict=k",{method:"POST",
      headers:{"Content-Type":"application/json","Prefer":"resolution=merge-duplicates"},
      body:JSON.stringify(rows.slice(i,i+200))});
    if(!r.ok)throw new Error("HTTP "+r.status);}
  rows.forEach(x=>{const s=sync.snap[x.k];if(s&&s.ts===x.ts)delete s.d;});
  saveSync();return rows.length;}

let syncing=false;
async function doSync(silent){
  if(!sb||syncing)return;
  if(!navigator.onLine){if(!silent)toast("Sin conexión · se sincronizará al volver");setSync("idle");return;}
  syncing=true;setSync("busy");
  try{
    const got=await pull();     /* primero traer: si el otro móvil es más nuevo, gana él */
    stampChanges();
    const sent=await push();
    setSync("ok");
    if(got){render();if(!silent)toast("Actualizado ("+got+" cambio"+(got>1?"s":"")+")");}
    else if(!silent)toast(sent?"Enviado":"Todo al día");
  }catch(e){setSync("err",String(e.message||e));if(!silent)toast("Error al sincronizar: "+(e.message||e));}
  syncing=false;paintSync();}

function queuePush(){paintSync();if(!sb)return;clearTimeout(pushT);pushT=setTimeout(()=>doSync(true),3000);}

function syncDialog(){
  const ov=document.createElement("div");ov.className="ov";
  ov.innerHTML='<div class="dlg"><h4>'+ic("cloud")+'Sincronizar entre móviles</h4>'
    +'<p class="dlgnote">Pega aquí los datos de Supabase. Se guardan solo en este móvil.</p>'
    +'<label>URL del proyecto</label><input id="sbU" type="url" autocomplete="off" spellcheck="false" placeholder="https://xxxx.supabase.co" value="'+esc(sb&&sb.url)+'">'
    +'<label>Clave anon</label><input id="sbK" type="text" autocomplete="off" spellcheck="false" placeholder="eyJhbGciOi…" value="'+esc(sb&&sb.key)+'">'
    +'<div class="btns"><button id="sbC">Cancelar</button>'+(sb?'<button id="sbD">Desconectar</button>':'')+'<button class="ok" id="sbOK">Conectar</button></div></div>';
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  ov.querySelector("#sbC").onclick=close;
  ov.addEventListener("click",e=>{if(e.target===ov)close();});
  if(sb)ov.querySelector("#sbD").onclick=()=>{close();sb=null;localStorage.removeItem(CFG);setSync("off");toast("Sincronización desactivada");};
  ov.querySelector("#sbOK").onclick=()=>{
    const u=(ov.querySelector("#sbU").value||"").trim(),k=(ov.querySelector("#sbK").value||"").trim();
    if(!/^https:\/\/.+/.test(u)||k.length<40){toast("Revisa la URL y la clave");return;}
    close();sb={url:u,key:k};try{localStorage.setItem(CFG,JSON.stringify(sb))}catch(e){}
    setSync("idle");doSync();};}

const CIUDADES=Object.keys(COMER);
let comerCiudad=null;   /* null = la del día actual */

/* Días de TRÁNSITO: tocan más de una ciudad y a la hora de comer importa dónde estás.
   Criterio del usuario (21/07):
     - Ciudad de LLEGADA (donde se duerme): sus restaurantes SIEMPRE, sea el día que sea.
     - Ciudad de la que se SALE: solo si la salida es a mediodía (si se sale de mañana, no da
       tiempo a comer allí y no interesa).
   Se declara a mano por día porque el dato que decide (hora de salida de la 1ª ciudad, p.ej.
   Xi'an 12:35 vs Pekín 7:12) está en la nota del día, no en horaInicio. Orden: LLEGADA primero
   (es el destino de esa noche → chip por defecto). Se listan aunque la ciudad aún no esté
   activada en COMER; el helper filtra las que no existen todavía, así queda listo para Chengdu.
   AL MONTAR un día de tránsito nuevo, añadirlo aquí (ver §5-nonies de PROYECTO.md). */
const COMER_DIAS={
  "d5":["Xi'an","Pingyao"],       /* 03/08: sale de Pekín de mañana (no); mediodía en Pingyao; duerme en Xi'an */
  "d7":["Chengdu","Xi'an"],       /* 05/08: mañana en Xi'an, tren 12:35 (mediodía sí); duerme en Chengdu */
  "d10":["Chengdu"],              /* 08/08: Emeishan sin restaurantes en el Excel; cena en Chengdu (sin esto caería al fallback CIUDADES[0]) */
  "d17":["Guilin","Fenghuang"],   /* 15/08: mañana en Fenghuang (mediodía sí); duerme en Guilin */
  "d18":["Yangshuo","Guilin"]     /* 16/08: excursión de día completo a Yangshuo, cena de vuelta en Guilin */
};
/* d12 (tren 8:10) y d14 (tren 8:08) salen de mañana -> solo la ciudad de llegada (default);
   d16 default Fenghuang ya incluye Furong (sus sitios van bajo Fenghuang). */
/* ciudades con restaurantes para ese día, ya filtradas a las que existen en COMER */
function ciudadesDelDia(day){
  const base=(day&&COMER_DIAS[day.id])||(day?[day.ciudad]:[]);
  const out=base.filter(c=>COMER[c]);
  return out.length?out:(day&&COMER[day.ciudad]?[day.ciudad]:(CIUDADES[0]?[CIUDADES[0]]:[]));
}
function diaActual(){return VIAJE.dias[current>=0?current:ultimoDia]||null;}
function ciudadDelDia(){const cs=ciudadesDelDia(diaActual());return cs[0]||CIUDADES[0];}
function restsDe(c){return c==="__todas__"?CIUDADES.flatMap(x=>COMER[x].map(r=>({...r,_c:x}))):(COMER[c]||[]).map(r=>({...r,_c:c}));}
function restById(id){for(const c of CIUDADES){const r=COMER[c].find(x=>x.id===id);if(r)return {...r,_c:c};}return null;}
function amapUrl(r){return "https://uri.amap.com/search?keyword="+encodeURIComponent(r.cn||r.nombre)
  +(r.gcj?"&center="+r.gcj[0]+","+r.gcj[1]:"")+"&coordinate=gaode&callnative=1";}
/* Abrir en la APP nativa de Amap si está instalada, con respaldo a la web. En el iPhone,
   uri.amap.com se suele quedar en la web; el esquema iosamap:// salta directo a la app. Si la
   app no está (seguimos aquí tras ~1 s), abrimos la web. dev=0 = coordenadas en GCJ/gaode. */
function amapWebUrl(kw,gcj){return "https://uri.amap.com/search?keyword="+encodeURIComponent(kw||"")
  +(gcj?"&center="+gcj[0]+","+gcj[1]:"")+"&src=viajechina&coordinate=gaode&callnative=1";}
function abrirAmap(kw,gcj,nombre){   // OJO: gcj = [lng, lat] (igual que it.gcj del build)
  const web=amapWebUrl(kw,gcj);
  if(!gcj){location.href=web;return;}
  const ios=/iP(hone|ad|od)/.test(navigator.userAgent);
  const app=(ios?"iosamap":"androidamap")+"://viewMap?sourceApplication=viajechina&poiname="
    +encodeURIComponent(nombre||kw||"")+"&lat="+gcj[1]+"&lon="+gcj[0]+"&dev=0";
  let saltado=false;const cancelar=()=>{saltado=true;};
  window.addEventListener("pagehide",cancelar,{once:true});
  window.addEventListener("blur",cancelar,{once:true});
  setTimeout(()=>{if(!saltado)location.href=web;},1100);
  location.href=app;
}

function fmtDist(m){return m==null?"":(m<1000?m+" m":(m/1000).toFixed(1).replace(".",",")+" km");}
function tarjetaRest(r){

    +'<span class="rmeta">';

  if(r.cerca)t+='<span class="tag cerca'+(r.gris?"":" ok")+'">'+ic("route")+fmtDist(r.cerca.m)+'</span>';
  if(r.pins&&r.pins.length>1)t+='<span class="tag">'+r.pins.length+' sucursales</span>';

  t+='</span></span><span class="rarrow">'+ic("chevron-down")+'</span></button>';

}

function renderComer(){

  const cAct=comerCiudad||hoy[0];

  if(hoy.length>1)h+='<div class="comerhint">'+ic("info")+' Hoy es día de tránsito: tienes '
    +hoy.map(esc).join(' y ')+'. Elige según la hora a la que vayas a comer.</div>';
  h+='<div class="chips">';
  /* las ciudades de hoy van primero y marcadas "· hoy"; la de llegada (hoy[0]) es la de por defecto */
  hoy.forEach((c,i)=>{const sel=(comerCiudad===null&&i===0)||comerCiudad===c;
    h+='<button class="'+(sel?"on":"")+'" data-c="'+esc(c)+'">'+esc(c)+' · hoy</button>';});
  CIUDADES.forEach(c=>{if(hoy.indexOf(c)<0)h+='<button class="'+(comerCiudad===c?"on":"")+'" data-c="'+esc(c)+'">'+esc(c)+'</button>';});
  h+='<button class="'+(comerCiudad==="__todas__"?"on":"")+'" data-c="__todas__">Todas</button></div>';
  const lista=restsDe(cAct);
  if(!lista.length)h+='<div class="gsub">No hay sitios guardados para esta ciudad.</div>';
  const cats=[...new Set(lista.map(r=>r.cat))];
  cats.forEach(cat=>{
    h+='<h3 style="margin:14px 0 9px;font:700 14px \'Sora\'">'+esc(cat)+'</h3>';
    /* dentro de cada categoría, primero lo que pilla más cerca de la ruta del viaje;
       lo que no tiene ubicación se va al final, no arriba (un 0 lo colaría el primero) */
    lista.filter(r=>r.cat===cat)
      .sort((a,b)=>((a.cerca&&a.cerca.m)!=null?a.cerca.m:1e9)-((b.cerca&&b.cerca.m)!=null?b.cerca.m:1e9))
      .forEach(r=>{h+=tarjetaRest(r);});});
  h+='<div class="endday">Toca un sitio para ver su ficha, copiar el nombre y la dirección en chino, y abrirlo en Amap.</div>';
  const main=document.getElementById("main");main.innerHTML=h;
  main.querySelectorAll("[data-c]").forEach(b=>b.onclick=()=>{comerCiudad=b.dataset.c||null;renderComer();});
  main.querySelectorAll("[data-ficha]").forEach(b=>b.onclick=()=>fichaRest(restById(b.dataset.ficha)));
}

/* ---------- FOTOS DEL LOCAL (IndexedDB) ----------
   Por qué IndexedDB y no localStorage: localStorage son ~5 MB para TODO el estado, y una
   foto del iPhone en crudo son 3-5 MB. Una sola foto reventaría la app entera.
   Por eso toda foto pasa SIEMPRE por resizeFoto() antes de guardarse: 1280 px de lado mayor
   y JPEG 0.72 la dejan en ~120-200 KB, que es de sobra para recordar el local.
   NO se sincronizan entre los dos móviles (ver exportEntries): el jpeg se queda en el
   teléfono que hizo la foto. */
let _fdb=null;
function fotoDB(){return new Promise((res,rej)=>{
  if(_fdb)return res(_fdb);
  if(!window.indexedDB)return rej(new Error("sin indexedDB"));
  const rq=indexedDB.open("viajeChinaFotos",1);
  rq.onupgradeneeded=()=>{rq.result.createObjectStore("fotos");};
  rq.onsuccess=()=>{_fdb=rq.result;res(_fdb);};
  rq.onerror=()=>rej(rq.error);});}
async function fotoSet(id,data){const db=await fotoDB();return new Promise((res,rej)=>{
  const t=db.transaction("fotos","readwrite");t.objectStore("fotos").put(data,id);
  t.oncomplete=()=>res();t.onerror=()=>rej(t.error);});}
async function fotoGet(id){let db;try{db=await fotoDB();}catch(e){return null;}
  return new Promise(res=>{
  const t=db.transaction("fotos","readonly"),r=t.objectStore("fotos").get(id);
  r.onsuccess=()=>res(r.result||null);r.onerror=()=>res(null);});}
async function fotoDel(id){try{const db=await fotoDB();return new Promise(res=>{
  const t=db.transaction("fotos","readwrite");t.objectStore("fotos").delete(id);
  t.oncomplete=()=>res();t.onerror=()=>res();});}catch(e){}}

/* Reduce la foto en el propio móvil antes de guardarla. iOS entrega los HEIC ya convertidos
   a JPEG cuando vienen de <input type="file" accept="image/*">, así que no hay que decodificar
   HEIC a mano. */
function resizeFoto(file,cb){
  const url=URL.createObjectURL(file),img=new Image();
  img.onload=()=>{
    const MAX=1280;let w=img.naturalWidth,h=img.naturalHeight;
    const f=Math.min(1,MAX/Math.max(w,h));w=Math.max(1,Math.round(w*f));h=Math.max(1,Math.round(h*f));
    const cv=document.createElement("canvas");cv.width=w;cv.height=h;
    cv.getContext("2d").drawImage(img,0,0,w,h);
    URL.revokeObjectURL(url);
    try{cb(cv.toDataURL("image/jpeg",0.72));}catch(e){cb(null);}
  };
  img.onerror=()=>{URL.revokeObjectURL(url);cb(null);};
  img.src=url;}

/* pinta las miniaturas que estén en pantalla (la lectura de IndexedDB es asíncrona) */
function pintaFotos(root){(root||document).querySelectorAll("[data-foto]").forEach(el=>{
  if(el._f)return;el._f=1;
  fotoGet(el.dataset.foto).then(d=>{if(d)el.innerHTML='<img src="'+d+'" alt="Foto del local">';});});}

/* ---------- QUÉ HEMOS COMIDO ----------
   Cada hueco de comida guarda o un id de la lista (`rid`) o un sitio escrito a mano
   (`nuevo`). El id de la lista es estable (sale del nombre, no del orden del Excel),
   así que añadir sitios al Excel no reasigna lo ya guardado. */
function comidaDe(day,it){return ds(day.id).comidas[it.id]||null;}
function comidaNombre(day,it){const c=comidaDe(day,it);if(!c)return null;
  if(c.rid){const r=restById(c.rid);return r?r.nombre:"(sitio ya no está en la lista)";}
  return c.nuevo?c.nuevo.nombre:null;}

function comidaBlock(day,it){
  const c=comidaDe(day,it),cities=ciudadesDelDia(day),multi=cities.length>1;
  const opt=r=>'<option value="'+r.id+'"'+(c&&c.rid===r.id?" selected":"")+'>'+esc(r.nombre)+(r.cn?" · "+esc(r.cn):"")+'</option>';
  let h='<div class="comida"><div class="glabel">'+ic("utensils")+' ¿Dónde hemos comido?</div>';
  h+='<select class="comsel" data-comsel="'+it.id+'">';
  h+='<option value=""'+(!c?" selected":"")+'>— Sin elegir —</option>';
  /* en un día de tránsito el desplegable ofrece las dos ciudades, agrupadas por ciudad */
  cities.forEach(cc=>{const lista=COMER[cc]||[],rst=lista.filter(r=>!r.cafe),caf=lista.filter(r=>r.cafe);
    const suf=multi?" · "+cc:"";
    if(rst.length)h+='<optgroup label="Restaurantes'+esc(suf)+'">'+rst.map(opt).join("")+'</optgroup>';
    if(caf.length)h+='<optgroup label="Cafeterías'+esc(suf)+'">'+caf.map(opt).join("")+'</optgroup>';});
  if(c&&c.nuevo)h+='<optgroup label="Añadido por vosotros"><option value="__mantener__" selected>'+esc(c.nuevo.nombre)+'</option></optgroup>';
  h+='<option value="__nuevo__">＋ Otro sitio (escribirlo yo)…</option>';
  h+='</select>';
  if(c){
    if(c.rid){const r=restById(c.rid);
      if(r){const p=r.precioReal!=null?r.precioReal:r.precio;
        h+='<div class="comsel-det"><div class="cd-n">'+ic(r.cafe?"coffee":"utensils")+esc(r.nombre)+'</div>'
          +'<div class="cd-m">'+esc(r.tipo)+(p!=null?' · ¥'+p+'/pers':'')+'</div>'
          +'<button class="cd-b" data-comficha="'+r.id+'">'+ic("info")+'Ver ficha</button></div>';}
    } else if(c.nuevo){
      h+='<div class="comsel-det"><div class="cd-n">'+ic("map-pin")+esc(c.nuevo.nombre)+'</div>';
      const m=[c.nuevo.tipo,c.nuevo.precio!=null?"¥"+c.nuevo.precio+"/pers":""].filter(Boolean).join(" · ");
      if(m)h+='<div class="cd-m">'+esc(m)+'</div>';
      if(c.nuevo.foto)h+='<div class="cd-foto" data-foto="'+esc(c.nuevo.foto)+'"></div>';
      h+='<button class="cd-b" data-comedit="'+it.id+'">'+ic("pencil")+'Editar</button></div>';}
  }
  return h+'</div>';}

    const o={nombre:nom};if(t)o.tipo=t;if(!isNaN(pv))o.precio=pv;if(fotoId)o.foto=fotoId;
