/* ---------- RENDER ---------- */
/* indice del dia del viaje que es HOY en la realidad (-1 si hoy no es un dia del viaje) */
function hoyIdx(){const t=new Date(),dd=t.getDate(),mm=t.getMonth()+1;
  return VIAJE.dias.findIndex(d=>{const m=/^(\d{1,2})\/(\d{1,2})/.exec(d.fecha||"");return m&&+m[1]===dd&&+m[2]===mm;});}
function renderNav(){document.getElementById("brandIcon").innerHTML=ic("map-pin");const nav=document.getElementById("daynav");nav.innerHTML="";
  const g=document.createElement("button");g.className="gastos"+(current===-1?" active":"");g.innerHTML=ic("wallet")+" Gastos";g.onclick=()=>{current=-1;render();};nav.appendChild(g);
  const co=document.createElement("button");co.className="gastos"+(current===-2?" active":"");co.innerHTML=ic("utensils")+" Comer";co.onclick=()=>{current=-2;comerCiudad=null;render();};nav.appendChild(co);
  const hoy=hoyIdx();
  VIAJE.dias.forEach((d,i)=>{const b=document.createElement("button");b.textContent="Día "+(i+1)+" · "+d.fecha;
    b.className=(i===current?"active ":"")+(i===hoy?"today":"");
    b.onclick=()=>{current=i;ultimoDia=i;render();};nav.appendChild(b);});
  /* centrar en la tira el dia que se esta viendo (p.ej. al saltar desde el calendario) */
  const act=nav.querySelector("button.active");
  if(act)nav.scrollLeft=Math.max(0,act.offsetLeft-(nav.clientWidth-act.offsetWidth)/2);}
function render(){renderNav();if(current===-1)renderGastos();else if(current===-2)renderComer();else renderDay();}

function renderDay(){
  const day=VIAJE.dias[current],d=ds(day.id),sched=schedule(day);
  const ciuTit=(day.ciudades&&day.ciudades.length?day.ciudades:[day.ciudad]).join(" · ");
  let h='<div class="dayhead"><div class="date">'+day.fecha+' · '+day.diaSemana+'</div><div class="city disp">'+ciuTit+'</div></div>';
  h+='<div class="startedit">'+ic("clock","g")+' Empieza el día a las <input id="startInput" type="time" value="'+(d.start||day.horaInicio)+'"></div>';
  if(day.nota)h+='<div class="note">'+ic("info","g")+'<span>'+day.nota+'</span></div>';
  h+='<button class="mapbtn" id="mapToggle">'+ic("map","g")+' Ver mapa del día · ruta numerada</button>';
  h+='<div class="mapwrap" id="mapWrap"><div id="mapCanvas"></div><div class="maphint">Mapa Amap (con conexión) · arrastra o pellizca · toca un pin para ver info</div>'
    +'<div class="mapbar"><button id="zin">'+ic("plus")+'</button><button id="zout">'+ic("minus")+'</button><button id="zfit">'+ic("route")+'</button><button class="locate" id="locBtn">'+ic("locate-fixed")+' Mi ubicación</button></div></div>';
  h+='<div id="list">';
  const order=orderedIds(day);let n=0,prev=null;
  // Hoteles de inicio y fin del día (primer y último lugar no-comida): sin checks. Los hoteles
  // intermedios (check-in) llevan solo "Visitado". "Entrada" solo en lo que no es hotel.
  const placeIds=order.filter(id=>{const x=itemById(day,id);return x&&x.kind!=="meal";});
  const firstPlace=placeIds[0],lastPlace=placeIds[placeIds.length-1];
  order.forEach(id=>{const it=itemById(day,id);if(!it)return;const hid=!!d.hidden[id],meal=it.kind==="meal"&&!it.gcj,s=sched[id];
    if(!hid&&!meal&&prev!=null){const L=legData(day,prev,id),m=legMode(day,L),val=legVal(day,L);
      let seg="";["walk","transit","didi"].forEach(mk=>{const v=L[mk+"Min"],na=v==null,on=(mk===m&&!na);seg+='<button class="'+(on?"on":"")+' '+(na?"na":"")+'" data-m="'+mk+'" '+(na?"disabled":'data-legk="'+L.key+'"')+' title="'+MODES[mk].lb+(na?"":" · "+v+" min")+'">'+ic(MODES[mk].ic)+'</button>';});
      const a=itemById(day,prev),gc=sum(legGastos(day,L.key));
      const rurl="https://uri.amap.com/navigation?from="+a.gcj[0]+","+a.gcj[1]+","+encodeURIComponent(a.nombre)+"&to="+it.gcj[0]+","+it.gcj[1]+","+encodeURIComponent(it.nombre)+"&mode=bus&coordinate=gaode&callnative=1";
      h+='<div class="leg">'
        +'<button class="legcost'+(gc?"":" empty")+'" data-legcost="'+L.key+'" title="Coste del trayecto">'+ic("wallet")+(gc?"¥"+num(gc):"+")+'</button>'
        +'<span class="legdist'+(L.est?' est':'')+'">'+ic("route")+L.distKm+' km'+(L.est?'*':'')+'</span>'
        +'<div class="seg">'+seg+'</div><button class="legtime" data-editleg="'+L.key+'">'+val+"<small>′</small></button>"
        +'<a class="legroute" href="'+rurl+'" title="Cómo llegar (Amap: metro/bus)">'+ic("navigation")+'</a></div>';}
    const op=d._open[id]?" open":"";
    if(meal){const gt=sum(gastosOf(day,it)),cn=comidaNombre(day,it);
      h+='<div class="item meal'+(hid?" hidden":"")+op+'" data-id="'+id+'"><div class="head" data-id="'+id+'"><div class="num mealnum">'+ic(MEAL_IC[it.label]||"utensils")+'</div>'
        +'<div class="pmain"><div class="pname">'+it.label+'</div>'+(cn?'<div class="pcomida">'+ic("utensils")+esc(cn)+'</div>':'')
        +'<div class="ptags"><span class="tag dur" data-editvisit="'+id+'">'+ic("clock")+fmtDur(visitMin(day,it))+'</span>'+(gt?'<span class="tag cost">'+ic("wallet")+'¥'+num(gt)+'</span>':'')+'</div></div>'
        +'<div class="rcol"><button class="eye" data-hide="'+id+'">'+ic(hid?"eye":"eye-off")+'</button><div class="times"><div class="tarr">'+(hid?"—":toHHMM(s.arr))+'</div></div><span class="chev">'+ic("chevron-down")+'</span></div></div>'
        +'<div class="body">'+comidaBlock(day,it)+gastosBlock(day,it)+dragHint()+'</div></div>';
    } else {if(!hid)n++;const free=!(it.costeCny>0),gt=sum(gastosOf(day,it));
      const isDone=!!d.done[id],isTik=!!d.ticket[id];
      const isHotel=it.tipo==="Hotel",isBookend=(id===firstPlace||id===lastPlace);
      // Checks en la cabecera (se pulsan sin abrir la ficha, stopPropagation en bindDay):
      //  - hotel de inicio/fin del día: NINGÚN check.
      //  - hotel intermedio (check-in): solo "Visitado".
      //  - resto: "Visitado" (verde) + "Entrada comprada" (azul).
      let checks="";
      if(!(isHotel&&isBookend)){
        checks='<button class="chk done'+(isDone?" on":"")+'" data-done="'+id+'" title="Marcar como visitado">'+ic(isDone?"circle-check":"check")+'<span>'+(isDone?"Visitado":"Visitar")+'</span></button>';
        if(!isHotel)checks+='<button class="chk tik'+(isTik?" on":"")+'" data-ticket="'+id+'" title="Marcar entrada comprada">'+ic("ticket")+'<span>'+(isTik?"Entrada ✓":"Entrada")+'</span></button>';
      }
      let tags='<span class="tag">'+ic(TIPO_IC[it.tipo]||"map-pin")+it.tipo+'</span>';
      const hor=d.horarios[id]!=null?d.horarios[id]:it.horario;
      // Solo las paradas de tipo Transporte llevan el horario editable (como la etiqueta de
      // tiempo de visita: mismo aspecto, se pulsa y se edita). El resto va estático como siempre.
      if(hor){const trans=it.tipo&&it.tipo.indexOf("Transporte")>=0;
        tags+='<span class="tag hours"'+(trans?' data-edithorario="'+id+'"':'')+'>'+ic("clock")+esc(hor)+'</span>';}
      if(gt)tags+='<span class="tag cost">'+ic("wallet")+'¥'+num(gt)+' · 2p</span>';

/* tap = expandir · long-press = arrastrar */
function attachHead(day,head){const d=ds(day.id),item=head.parentElement,id=head.dataset.id;let timer=null,startY=0,dragging=false,moved=false;
  head.addEventListener("pointerdown",e=>{if(e.target.closest("button")||e.target.closest("[data-copy]"))return;startY=e.clientY;moved=false;
    timer=setTimeout(()=>{dragging=true;beginDrag(day,item,e.clientY);},380);});

/* Drag&drop */
let drag=null;
function beginDrag(day,item,y){document.body.classList.add("dragging");
  const line=document.createElement("div");line.className="dropline";
  drag={day,item,id:item.dataset.id,y0:y,dy:0,line:line,target:null};
  item.classList.add("drag");item.after(line);
  if(navigator.vibrate)navigator.vibrate(15);}
function dragMove(y){if(!drag)return;drag.dy=y-drag.y0;drag.item.style.transform="translateY("+drag.dy+"px)";
  const list=document.getElementById("list");if(!list)return;
  const items=[...list.querySelectorAll(".item")].filter(el=>el!==drag.item);
  let target=null;
  for(const el of items){const r=el.getBoundingClientRect();if(y<r.top+r.height/2){target=el;break;}}
  drag.target=target;
  // mover la línea indicadora a la posición de destino
  if(target)list.insertBefore(drag.line,target);else list.appendChild(drag.line);}
function endDrag(day){document.body.classList.remove("dragging");if(!drag)return;
  if(drag.line&&drag.line.parentElement)drag.line.remove();
  drag.item.style.transform="";drag.item.classList.remove("drag");
  const d=ds(day.id),ord=orderedIds(day),from=ord.indexOf(drag.id);
  if(from>=0)ord.splice(from,1);
  if(drag.target){const ti=ord.indexOf(drag.target.dataset.id);ord.splice(ti<0?ord.length:ti,0,drag.id);}else ord.push(drag.id);
  d.order=ord;save();drag=null;renderDay();}

/* ---------- MAPA ---------- */
function project(lng,lat,z){var s=256*Math.pow(2,z);var x=(lng+180)/360*s;var sl=Math.sin(lat*Math.PI/180);var y=(0.5-Math.log((1+sl)/(1-sl))/(4*Math.PI))*s;return[x,y];}
function locSeq(day){return visibleSeq(day).filter(o=>o.isLoc).map(o=>o.it);}
function fitZoom(pts,W,H){for(var z=17;z>=3;z--){var xs=[],ys=[];pts.forEach(p=>{var xy=project(p[0],p[1],z);xs.push(xy[0]);ys.push(xy[1]);});if(Math.max.apply(0,xs)-Math.min.apply(0,xs)<=W-60&&Math.max.apply(0,ys)-Math.min.apply(0,ys)<=H-84)return z;}return 3;}
function initMap(day,W,H){const pts=locSeq(day).map(it=>it.gcj),z=fitZoom(pts,W,H),xs=[],ys=[];pts.forEach(p=>{const xy=project(p[0],p[1],z);xs.push(xy[0]);ys.push(xy[1]);});mapState[day.id]={z,cx:(Math.min.apply(0,xs)+Math.max.apply(0,xs))/2,cy:(Math.min.apply(0,ys)+Math.max.apply(0,ys))/2};}
function drawMap(day){const cv=document.getElementById("mapCanvas");if(!cv)return;const W=cv.clientWidth,H=cv.clientHeight;if(!W)return;if(!mapState[day.id])initMap(day,W,H);
  const ms=mapState[day.id],z=ms.z,n=Math.pow(2,z),left=ms.cx-W/2,top=ms.cy-H/2,P=(lng,lat)=>{const xy=project(lng,lat,z);return[xy[0]-left,xy[1]-top];};
  let html="";const tx0=Math.floor(left/256),tx1=Math.floor((left+W)/256),ty0=Math.floor(top/256),ty1=Math.floor((top+H)/256);
  for(let tx=tx0;tx<=tx1;tx++)for(let ty=ty0;ty<=ty1;ty++){if(ty<0||ty>=n)continue;const wx=((tx%n)+n)%n;html+='<img class="tile" style="left:'+(tx*256-left)+'px;top:'+(ty*256-top)+'px" src="https://webrd0'+((wx%4)+1)+'.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x='+wx+'&y='+ty+'&z='+z+'">';}
  const acc=getComputedStyle(document.body).getPropertyValue('--accent').trim()||'#a5282a';const seq=locSeq(day);let paths="";
  for(let i=0;i<seq.length-1;i++){const L=legData(day,seq[i].id,seq[i+1].id),g=(legMode(day,L)==="walk"&&L.geomWalk)?L.geomWalk:(L.geomDrive||[seq[i].gcj,seq[i+1].gcj]);
    /* Proyecta la geometría completa (pin origen + tramo + pin destino). Si la ruta de OSRM da
       muchas más vueltas que la recta (datos de conducción malos en ciudades montañosas como
       Chongqing: 200 m que se van por 4 km de puentes), la sustituye por una línea recta entre
       los dos pines. El mapa es esquemático — para navegar de verdad está el botón de Amap. */
    const full=[seq[i].gcj].concat(g,[seq[i+1].gcj]).map(c=>P(c[0],c[1]));
    let plen=0;for(let k=1;k<full.length;k++)plen+=Math.hypot(full[k][0]-full[k-1][0],full[k][1]-full[k-1][1]);
    const recta=Math.hypot(full[full.length-1][0]-full[0][0],full[full.length-1][1]-full[0][1]);
    const usar=(recta>10&&plen>recta*2.6)?[full[0],full[full.length-1]]:full;
    let pts="";usar.forEach(s=>{pts+=s[0].toFixed(1)+","+s[1].toFixed(1)+" ";});
    paths+='<polyline points="'+pts+'" fill="none" stroke="'+acc+'" stroke-width="4" stroke-opacity="0.85" stroke-linecap="round" stroke-linejoin="round"/>';}
  html+='<svg class="route" width="'+W+'" height="'+H+'">'+paths+'</svg>';
  seq.forEach((it,i)=>{const s=P(it.gcj[0],it.gcj[1]);html+='<div class="pin" data-pin="'+i+'" style="left:'+s[0]+'px;top:'+s[1]+'px"><svg width="27" height="27" viewBox="0 0 27 27"><path d="M13.5 1C7.7 1 3 5.7 3 11.5 3 19 13.5 26 13.5 26S24 19 24 11.5C24 5.7 19.3 1 13.5 1z" fill="'+acc+'"/></svg><b>'+(i+1)+'</b></div>';});
  /* restaurantes de la ciudad del día, en color distinto al de la ruta */
  const food=getComputedStyle(document.body).getPropertyValue('--food').trim()||'#0f7b6c';
  const cafe=getComputedStyle(document.body).getPropertyValue('--cafe').trim()||'#b5651d';
  const gold=getComputedStyle(document.body).getPropertyValue('--gold').trim()||'#a9803a';
  const muted=getComputedStyle(document.body).getPropertyValue('--muted').trim()||'#8c8377';
  /* Un sitio puede tener VARIAS chinchetas: las sucursales de una cadena que caen dentro del
     radio (regla del usuario). Se aplana a una lista de {restaurante, sucursal, índice} y la
     selección del mapa guarda "id|índice", no solo el id. */
  const rests=[];
  /* en un día de tránsito el mapa abarca las dos ciudades (van lejos), así que se pintan las
     chinchetas de todas las ciudades del día; cada restaurante ya trae su distancia a SU ciudad */
  ciudadesDelDia(day).forEach(cc=>{(COMER[cc]||[]).forEach(r=>{(r.pins||[]).forEach((pn,i)=>rests.push({r:r,pn:pn,k:r.id+"|"+i}));});});
  /* Cafetería y restaurante se distinguen por DOS cosas a la vez, color y forma del hueco
     blanco (taza alta / círculo), porque a 23 px y en el móvil al sol el color solo no basta.
     Los imprescindibles llevan además aro dorado y una estrella, y salen más grandes. */
  rests.forEach(o=>{const r=o.r,s=P(o.pn.gcj[0],o.pn.gcj[1]);
    const col=o.pn.gris?muted:(r.cafe?cafe:food);
    const imp=!!r.imp,z=imp?27:23;
    const glifo=r.cafe?'<rect x="10.5" y="8" width="6" height="7" rx="1.4" fill="#fff"/><rect x="16.6" y="9.6" width="2.6" height="3.4" rx="1.3" fill="#fff"/>'
                     :'<circle cx="13.5" cy="11.5" r="4" fill="#fff"/>';
    const aro=imp?'<path d="M13.5 1C7.7 1 3 5.7 3 11.5 3 19 13.5 26 13.5 26S24 19 24 11.5C24 5.7 19.3 1 13.5 1z" fill="none" stroke="'+gold+'" stroke-width="2.4"/>':'';
    const estrella=imp?'<path d="M21.5 3.2l1 2.1 2.3.3-1.7 1.6.4 2.3-2-1.1-2 1.1.4-2.3-1.7-1.6 2.3-.3z" fill="'+gold+'" stroke="#fff" stroke-width=".7"/>':'';
    html+='<div class="rpin'+(r.cafe?" cafe":"")+(imp?" imp":"")+(o.pn.gris?" gris":"")+'" data-rpin="'+o.k+'" style="left:'+s[0]+'px;top:'+s[1]+'px">'
      +'<svg width="'+z+'" height="'+z+'" viewBox="0 0 27 27"><path d="M13.5 1C7.7 1 3 5.7 3 11.5 3 19 13.5 26 13.5 26S24 19 24 11.5C24 5.7 19.3 1 13.5 1z" fill="'+col+'"/>'+glifo+aro+estrella+'</svg></div>';});
  if(rests.length)html+='<div class="maplegend">'
    +'<span><i style="background:'+food+'"></i>Restaurante</span>'
    +(rests.some(o=>o.r.cafe)?'<span><i class="sq" style="background:'+cafe+'"></i>Cafetería</span>':'')
    +(rests.some(o=>o.r.imp)?'<span><i class="ring" style="border-color:'+gold+'"></i>Imprescindible</span>':'')
    +(rests.some(o=>o.pn.gris)?'<span><i style="background:'+muted+'"></i>Lejos de la ruta</span>':'')+'</div>';
  if(mapSelR){const o=rests.find(x=>x.k===mapSelR);
    if(o){const r=o.r,s=P(o.pn.gcj[0],o.pn.gcj[1]);const p=r.precioReal!=null?r.precioReal:r.precio;
      const nsuc=(r.pins||[]).length;
      html+='<div class="bubble" style="left:'+s[0]+'px;top:'+s[1]+'px"><span class="x" data-closebubble="1">'+ic("x")+'</span>'
        +(r.imp?'<div class="bimp">'+ic("star")+'Imprescindible</div>':'')
        +'<b>'+esc(r.nombre)+'</b><div style="opacity:.7">'+esc(r.cn)+'</div>'
        +'<div style="opacity:.7">'+esc(r.cafe?"Cafetería":"Restaurante")+' · '+esc(r.tipo)+'</div>'
        +(p!=null?'<div class="bprecio">'+ic("wallet")+'¥'+p+' por persona<small>'+(r.precioReal!=null?" (real)":" (estimado)")+'</small></div>':'')
        +(r.nota!=null?'<div style="opacity:.7">★ '+r.nota+' sobre 5</div>':'')
        +(o.pn.m!=null?'<div style="opacity:.7">'+(o.pn.gris?"A "+fmtDist(o.pn.m)+", fuera del radio":fmtDist(o.pn.m)+" de "+esc(o.pn.parada))+'</div>':'')
        +(nsuc>1?'<div style="opacity:.7">Sucursal '+(rests.filter(x=>x.r.id===r.id).indexOf(o)+1)+' de '+nsuc+'</div>':'')
        +'<button class="verficha" data-verficha="'+r.id+'">'+ic("info")+'Ver ficha</button></div>';}}
  if(userGCJ){const s=P(userGCJ[0],userGCJ[1]);html+='<div class="me" style="left:'+s[0]+'px;top:'+s[1]+'px"></div>';}
  if(mapSel!=null&&seq[mapSel]){const it=seq[mapSel],s=P(it.gcj[0],it.gcj[1]);let info="";if(it.horario)info+='<div>'+it.horario+'</div>';const gt=sum(gastosOf(day,it));if(gt)info+='<div>Entrada ¥'+num(gt)+'</div>';
    html+='<div class="bubble" style="left:'+s[0]+'px;top:'+s[1]+'px"><span class="x" data-closebubble="1">'+ic("x")+'</span><b>'+(mapSel+1)+'. '+it.nombre+'</b>'+(it.cn?'<div style="opacity:.7">'+it.cn+'</div>':'')+'<div style="opacity:.7">'+it.tipo+'</div>'+info+'</div>';}
  cv.innerHTML=html;
  cv.querySelectorAll(".pin").forEach(p=>p.addEventListener("click",e=>{e.stopPropagation();mapSel=+p.dataset.pin;mapSelR=null;drawMap(day);}));
  cv.querySelectorAll(".rpin").forEach(p=>p.addEventListener("click",e=>{e.stopPropagation();mapSelR=p.dataset.rpin;mapSel=null;drawMap(day);}));
  const vf=cv.querySelector("[data-verficha]");if(vf)vf.addEventListener("click",e=>{e.stopPropagation();fichaRest(restById(vf.dataset.verficha));});
  const xb=cv.querySelector("[data-closebubble]");if(xb)xb.addEventListener("click",e=>{e.stopPropagation();mapSel=null;mapSelR=null;drawMap(day);});
}
function mapZoom(day,dz){const ms=mapState[day.id];if(!ms)return;const nz=Math.max(4,Math.min(18,ms.z+dz)),f=Math.pow(2,nz-ms.z);ms.cx*=f;ms.cy*=f;ms.z=nz;drawMap(day);}
function bindMap(day){const cv=document.getElementById("mapCanvas");if(!cv||cv._b)return;cv._b=1;const ptrs=new Map();let dr=null,pinch=null;
  cv.addEventListener("pointerdown",e=>{ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});cv.setPointerCapture(e.pointerId);if(ptrs.size===2){const v=[...ptrs.values()],ms=mapState[day.id];pinch={d:Math.hypot(v[0].x-v[1].x,v[0].y-v[1].y),z:ms.z,cx:ms.cx,cy:ms.cy};dr=null;}else{dr={x:e.clientX,y:e.clientY};cv.style.cursor="grabbing";}});
  cv.addEventListener("pointermove",e=>{if(!ptrs.has(e.pointerId))return;ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});const ms=mapState[day.id];if(ptrs.size>=2&&pinch){const v=[...ptrs.values()],dd=Math.hypot(v[0].x-v[1].x,v[0].y-v[1].y),nz=Math.max(4,Math.min(18,Math.round(pinch.z+Math.log(dd/pinch.d)/Math.LN2)));if(nz!==ms.z){const f=Math.pow(2,nz-pinch.z);ms.z=nz;ms.cx=pinch.cx*f;ms.cy=pinch.cy*f;drawMap(day);}}else if(dr){ms.cx-=e.clientX-dr.x;ms.cy-=e.clientY-dr.y;dr={x:e.clientX,y:e.clientY};drawMap(day);}});
  const end=e=>{ptrs.delete(e.pointerId);if(ptrs.size<2)pinch=null;if(ptrs.size===0){dr=null;cv.style.cursor="grab";}};
  cv.addEventListener("pointerup",end);cv.addEventListener("pointercancel",end);}
function locate(day){if(!navigator.geolocation){toast("GPS no disponible");return;}toast("Buscando ubicación…");navigator.geolocation.getCurrentPosition(p=>{userGCJ=wgs2gcj(p.coords.longitude,p.coords.latitude);const ms=mapState[day.id];if(ms){const xy=project(userGCJ[0],userGCJ[1],ms.z);ms.cx=xy[0];ms.cy=xy[1];}drawMap(day);toast("Ubicación encontrada");},e=>toast("No se pudo obtener el GPS"),{enableHighAccuracy:true,timeout:10000});}

/* ── Buscador general: busca entre TODAS las actividades de todos los días y lleva a su día ── */
function normTxt(s){return (s||"").toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");}
let SEARCH_IDX=null;
function buildSearchIndex(){const idx=[];VIAJE.dias.forEach((day,di)=>{
  const ciu=(day.ciudades&&day.ciudades.length?day.ciudades:[day.ciudad]).join(" · ");
  day.items.forEach(it=>{if(it.kind==="meal"||!it.nombre)return;
    idx.push({di:di,fecha:day.fecha,num:di+1,id:it.id,nombre:it.nombre,cn:it.cn||"",ciu:ciu,
      hay:normTxt(it.nombre+" "+(it.cn||"")+" "+(it.tipo||"")+" "+(it.notas||"")+" "+ciu)});});});return idx;}
function runSearch(q){const res=document.getElementById("searchRes");if(!res)return;
  q=normTxt(q).trim();
  if(!q){res.className="searchres";res.innerHTML="";return;}
  if(!SEARCH_IDX)SEARCH_IDX=buildSearchIndex();
  const terms=q.split(/\s+/);
  const hits=SEARCH_IDX.filter(x=>terms.every(t=>x.hay.indexOf(t)>=0)).slice(0,30);
  if(!hits.length){res.className="searchres open";res.innerHTML='<div class="sr-empty">Sin resultados</div>';return;}
  res.className="searchres open";
  res.innerHTML=hits.map(x=>'<div class="sr" data-di="'+x.di+'" data-iid="'+esc(x.id)+'">'+ic("map-pin")
    +'<div class="sr-main"><div class="sr-n">'+esc(x.nombre)+(x.cn?' · '+esc(x.cn):'')+'</div>'
    +'<div class="sr-d">Día '+x.num+' · '+esc(x.fecha)+' · '+esc(x.ciu)+'</div></div></div>').join("");
  res.querySelectorAll(".sr").forEach(r=>r.addEventListener("click",()=>searchGo(+r.dataset.di,r.dataset.iid)));}
function searchGo(di,iid){const day=VIAJE.dias[di];current=di;ultimoDia=di;ds(day.id)._open[iid]=true;
  const inp=document.getElementById("searchInput");if(inp)inp.value="";
  const row=document.getElementById("searchRow");if(row)row.classList.remove("has","show");
  const sBtn=document.getElementById("searchBtn");if(sBtn)sBtn.classList.remove("on");
  const res=document.getElementById("searchRes");if(res){res.className="searchres";res.innerHTML="";}
  render();
  setTimeout(()=>{const el=document.querySelector('.item[data-id="'+iid+'"]');if(el)el.scrollIntoView({behavior:"smooth",block:"center"});},80);}
function setupSearch(){const inp=document.getElementById("searchInput"),row=document.getElementById("searchRow"),
  clr=document.getElementById("searchClear"),ico=document.getElementById("searchIco"),
  sBtn=document.getElementById("searchBtn"),calB=document.getElementById("calBtn");
  if(ico)ico.innerHTML=ic("search");if(clr)clr.innerHTML=ic("x");
  if(sBtn){sBtn.innerHTML=ic("search");
    sBtn.onclick=()=>{const open=row.classList.toggle("show");sBtn.classList.toggle("on",open);
      if(open){setTimeout(()=>inp&&inp.focus(),40);}
      else{if(inp)inp.value="";row.classList.remove("has");runSearch("");}};}
  if(calB){calB.innerHTML=ic("calendar");calB.onclick=openCal;}
  if(!inp)return;
  inp.addEventListener("input",()=>{row.classList.toggle("has",!!inp.value);runSearch(inp.value);});
  clr.addEventListener("click",()=>{inp.value="";row.classList.remove("has");runSearch("");inp.focus();});}

/* Calendario para saltar de día. Cada día trae fecha "dd/mm xxx"; se dibuja un grid mensual
   real (semana empezando en lunes) con los días del viaje resaltados y pulsables. */
function openCal(){
  const MES=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  const DOW=["L","M","X","J","V","S","D"];
  // fecha -> indice de dia del viaje (dd, mm 1-based). Año 2026 (viaje jul-ago 2026).
  const AÑO=2026, porMes={};
  VIAJE.dias.forEach((d,i)=>{const m=/^(\d{1,2})\/(\d{1,2})/.exec(d.fecha||"");if(!m)return;
    const dd=+m[1],mm=+m[2];(porMes[mm]=porMes[mm]||{})[dd]=i;});
  const meses=Object.keys(porMes).map(Number).sort((a,b)=>a-b);
  const t=new Date(),hoyDD=t.getDate(),hoyMM=t.getMonth()+1;   // hoy real (tambien fuera del viaje)
  let body="";
  meses.forEach(mm=>{
    const dim=new Date(AÑO,mm,0).getDate();               // dias del mes
    let off=(new Date(AÑO,mm-1,1).getDay()+6)%7;          // lunes=0
    let cells="";
    DOW.forEach(w=>cells+='<div class="caldow">'+w+'</div>');
    for(let k=0;k<off;k++)cells+='<div class="calcell off"></div>';
    for(let dd=1;dd<=dim;dd++){
      const di=porMes[mm][dd],hoy=(dd===hoyDD&&mm===hoyMM)?" today":"";
      if(di==null){cells+='<div class="calcell off'+hoy+'">'+dd+'</div>';}
      else{cells+='<div class="calcell trip'+(di===current?" now":"")+hoy+'" data-di="'+di+'">'+dd+'</div>';}
    }
    body+='<div class="calmonth"><div class="calmt">'+MES[mm-1]+' '+AÑO+'</div><div class="calgrid">'+cells+'</div></div>';
  });
  body+='<div class="callegend"><span><i class="lg-now"></i> viendo</span><span><i class="lg-hoy"></i> hoy</span></div>';
  const ov=document.createElement("div");ov.className="ov";
  ov.innerHTML='<div class="dlg cal"><h4>'+ic("calendar")+'Ir a un día</h4>'+body
    +'<div class="calquick"><button data-go="-1">'+ic("wallet")+'Gastos</button><button data-go="-2">'+ic("utensils")+'Comer</button></div>'
    +'<div class="btns"><button id="calX">Cerrar</button></div></div>';
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  ov.querySelector("#calX").onclick=close;
  ov.addEventListener("click",e=>{if(e.target===ov)close();});
  ov.querySelectorAll(".calcell.trip").forEach(c=>c.onclick=()=>{current=+c.dataset.di;ultimoDia=current;close();render();window.scrollTo(0,0);});
  ov.querySelectorAll(".calquick button").forEach(b=>b.onclick=()=>{current=+b.dataset.go;if(current===-2)comerCiudad=null;close();render();window.scrollTo(0,0);});
}

render();
setupSearch();
/* lo que ya hubiera guardado en este móvil entra en el registro antes de traer nada de fuera */
stampChanges();
document.getElementById("syncBtn").onclick=()=>{if(!sb)syncDialog();else doSync();};
document.getElementById("syncBtn").addEventListener("contextmenu",e=>{e.preventDefault();syncDialog();});
paintSync();
if(sb)doSync(true);
window.addEventListener("online",()=>{if(sb)doSync(true);});
document.addEventListener("visibilitychange",()=>{if(!document.hidden&&sb)doSync(true);});
document.getElementById("verBtn").onclick=()=>chkVer();
if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(()=>{});}
</script>
