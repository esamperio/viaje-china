  @media (prefers-color-scheme: dark){:root{--bg:#15120e;--card:#1e1a15;--ink:#ece6db;--muted:#9a9184;--line:#2d2820;--accent:#e26a5f;--accent-soft:#2c1815;--gold:#cda45f;--ok:#4fb37a;--shadow:0 4px 20px rgba(0,0,0,.4);--walk:#4fb37a;--transit:#5fa0e0;--didi:#e0ad55;--meal:#d3a45e;--food:#35b6a0;--cafe:#e09a4e;}}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  /* 'clip' y no 'hidden': hidden crea un contenedor de scroll y rompe el position:sticky de la cabecera */
  html,body{max-width:100%;overflow-x:clip}
  /* franja opaca bajo la hora y la cobertura: nada de la app pasa por debajo */
  .statusbar{position:fixed;top:0;left:0;right:0;height:env(safe-area-inset-top);background:var(--bg);z-index:30}
  /* iOS Safari hace zoom al enfocar cualquier campo de menos de 16px y NO lo deshace */
  input,textarea,select{font-size:16px}
  body{margin:0;background:var(--bg);color:var(--ink);font:15.5px/1.5 'Nunito Sans',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
  body.dragging{touch-action:none;user-select:none}
  .disp{font-family:'Sora','Nunito Sans',-apple-system,sans-serif}
  svg.ic{width:1em;height:1em;vertical-align:-.14em;flex:0 0 auto}
  button{font-family:inherit}
  header{position:sticky;top:env(safe-area-inset-top);z-index:20;background:color-mix(in srgb,var(--card) 90%,transparent);-webkit-backdrop-filter:saturate(140%) blur(12px);backdrop-filter:saturate(140%) blur(12px);border-bottom:1px solid var(--line);padding:11px 16px 9px}
  .brand{display:flex;align-items:center;gap:8px;font-size:11.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:700}
  .brand .g{color:var(--accent);font-size:15px;display:inline-flex}
  .daynav{display:flex;gap:7px;margin-top:9px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
  .daynav::-webkit-scrollbar{display:none}
  .daynav button{flex:0 0 auto;border:1px solid var(--line);background:transparent;color:var(--muted);padding:6px 13px;border-radius:999px;font-size:13px;font-weight:700;display:inline-flex;align-items:center;gap:5px}
  .daynav button.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(165,40,42,.3)}
  .daynav button.gastos.active{background:var(--gold);border-color:var(--gold);box-shadow:0 2px 8px rgba(169,128,58,.3)}
  main{max-width:660px;margin:0 auto;padding:16px 14px 90px}
  .dayhead{margin:6px 4px 15px}
  .dayhead .date{color:var(--gold);font-size:12.5px;font-weight:800;text-transform:uppercase;letter-spacing:.11em;margin-bottom:3px}
  .dayhead .city{font-size:31px;font-weight:700;letter-spacing:-.2px;line-height:1.05}
  .startedit{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:11px;font-size:14px;box-shadow:var(--shadow)}
  .startedit .g{color:var(--accent)}
  .startedit input{font:inherit;font-family:'Sora',sans-serif;font-size:16px;font-weight:700;color:var(--ink);background:transparent;border:none;border-bottom:2px dotted var(--accent);padding:2px;margin-left:auto;width:82px}
  .note{background:var(--accent-soft);border-radius:12px;padding:11px 13px;font-size:12.5px;margin-bottom:14px;display:flex;gap:10px;line-height:1.45}
  .note .g{color:var(--accent);margin-top:1px;flex:0 0 auto}
  .mapbtn{width:100%;display:flex;align-items:center;justify-content:center;gap:9px;background:var(--card);border:1px solid var(--line);color:var(--ink);font-weight:700;font-size:14px;padding:13px;border-radius:14px;margin-bottom:16px;box-shadow:var(--shadow)}
  .mapbtn .g{color:var(--accent)}
  .mapwrap{display:none;margin-bottom:16px;border-radius:16px;overflow:hidden;border:1px solid var(--line);box-shadow:var(--shadow)}
  .mapwrap.open{display:block}
  #mapCanvas{position:relative;width:100%;height:340px;background:#e4ddd0;overflow:hidden;touch-action:none;cursor:grab}
  @media (prefers-color-scheme: dark){#mapCanvas{background:#221d16}}
  #mapCanvas img.tile{position:absolute;width:256px;height:256px;-webkit-user-drag:none;pointer-events:none}
  #mapCanvas svg.route{position:absolute;inset:0;pointer-events:none;z-index:2;overflow:visible}
  #mapCanvas .pin{position:absolute;z-index:3;width:27px;height:27px;margin:-27px 0 0 -13.5px;cursor:pointer}
  #mapCanvas .pin svg{filter:drop-shadow(0 2px 3px rgba(0,0,0,.45));pointer-events:none}
  #mapCanvas .pin b{position:absolute;top:3px;left:0;width:27px;text-align:center;color:#fff;font:800 12.5px 'Sora',sans-serif;pointer-events:none}
  #mapCanvas .me{position:absolute;z-index:4;width:18px;height:18px;margin:-9px 0 0 -9px;border-radius:50%;background:#1a73e8;border:2.5px solid #fff;box-shadow:0 0 0 4px rgba(26,115,232,.3),0 1px 4px rgba(0,0,0,.4)}
  #mapCanvas .bubble{position:absolute;z-index:6;transform:translate(-50%,-100%);margin-top:-32px;background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:12px;padding:9px 11px;width:190px;box-shadow:0 6px 20px rgba(0,0,0,.3);font-size:12.5px}
  #mapCanvas .bubble b{font-family:'Sora';display:block;margin-bottom:2px}
  #mapCanvas .bubble .x{position:absolute;top:5px;right:7px;color:var(--muted)}
  #mapCanvas .bubble:after{content:"";position:absolute;left:50%;bottom:-7px;transform:translateX(-50%);border:7px solid transparent;border-top-color:var(--card);border-bottom:0}
  .maphint{background:var(--card);color:var(--muted);font-size:11px;text-align:center;padding:7px}
  .mapbar{display:flex;gap:8px;padding:9px 11px;background:var(--card);align-items:center;border-top:1px solid var(--line)}
  .mapbar button{border:1px solid var(--line);background:transparent;color:var(--ink);width:38px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px}
  .mapbar .locate{margin-left:auto;width:auto;padding:0 12px;gap:6px;color:var(--transit);font-weight:700;font-size:13px}

  .item{position:relative;background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);margin-bottom:8px;overflow:hidden}
  .item.open{border-color:color-mix(in srgb,var(--accent) 35%,var(--line))}
  .item.hidden{opacity:.5}
  .item.meal{background:color-mix(in srgb,var(--meal) 7%,var(--card))}
  .item.drag{opacity:.9;box-shadow:0 12px 30px rgba(0,0,0,.35);position:relative;z-index:30;border-color:var(--accent)}
  .item.gap{margin-top:44px}
  .head{display:flex;gap:12px;padding:13px 14px;align-items:flex-start;cursor:pointer;touch-action:pan-y}
  .num{flex:0 0 auto;width:31px;height:31px;border-radius:10px;background:var(--accent);color:#fff;font:700 14px 'Sora',sans-serif;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 7px rgba(165,40,42,.28)}
  .num.free{background:var(--card);color:var(--muted);border:1.5px solid var(--line);box-shadow:none}
  .num.mealnum{background:var(--meal);box-shadow:none;font-size:13px}
  .pmain{flex:1;min-width:0}
  .pname{font-weight:700;font-size:15.5px;letter-spacing:.1px}
  .cnrow{display:flex;align-items:center;gap:6px;margin-top:2px}
  .pcn{color:var(--muted);font-size:12.5px}
  .cpy{border:none;background:var(--bg);color:var(--muted);border-radius:6px;padding:2px 6px;display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700}
  .ptags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;align-items:center}
  .tag{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:7px;background:var(--bg);color:var(--muted);display:inline-flex;align-items:center;gap:5px}
  .tag.cost{color:var(--ok);background:color-mix(in srgb,var(--ok) 12%,transparent)}
  .tag.hours{color:var(--transit);background:color-mix(in srgb,var(--transit) 12%,transparent)}
  .tag.dur{color:var(--gold);background:color-mix(in srgb,var(--gold) 14%,transparent)}
  .rcol{flex:0 0 auto;display:flex;gap:7px;align-items:flex-start}
  .eye{border:none;background:transparent;color:var(--muted);padding:2px;font-size:14px;opacity:.55}
  .times{text-align:right;font-variant-numeric:tabular-nums}
  .tarr{font:700 16px 'Sora',sans-serif}
  .tdep{color:var(--muted);font-size:11.5px;margin-top:1px}
  .chev{color:var(--muted);font-size:14px;transition:transform .22s;margin-top:3px}
  .item.open .chev{transform:rotate(180deg)}
  .body{display:none;padding:0 14px 14px 57px;font-size:13.7px;line-height:1.55}
  .item.open .body{display:block}
  .addr{margin-top:9px;font-size:12.5px;color:var(--muted);display:flex;flex-direction:column;gap:5px}
  .addr .line{display:flex;align-items:center;gap:7px}.addr .line span{flex:1}
  .notas{margin-top:9px;color:var(--gold);font-size:12.5px;display:flex;gap:7px;align-items:baseline}
  .gastos{margin-top:11px;border-top:1px dashed var(--line);padding-top:9px}
  .gastos .glabel{font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:5px}
  .grow{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:13px}
  .grow .gc{flex:1}
  .grow .ga{font-family:'Sora';font-weight:700;color:var(--ok)}
  .grow .gx{border:none;background:transparent;color:var(--muted);padding:2px}
  .gadd{margin-top:4px;border:1px dashed var(--line);background:transparent;color:var(--gold);border-radius:8px;padding:6px 10px;font-size:12.5px;font-weight:700;display:inline-flex;align-items:center;gap:6px}
  .miniact{margin-top:11px;display:flex;gap:8px;align-items:center}
  .amap{display:inline-flex;align-items:center;gap:6px;text-decoration:none;font-weight:700;font-size:12.5px;background:#2f8f4e;color:#fff;padding:7px 12px;border-radius:9px}
  .draghint{margin-left:auto;color:var(--muted);font-size:11px;display:inline-flex;align-items:center;gap:5px}

  .leg{display:flex;align-items:center;gap:8px;padding:7px 14px 7px 57px}
  .legdist{font-size:11.5px;color:var(--gold);font-weight:800;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
  .legdist.est{color:var(--muted)}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;margin-left:auto;background:var(--card)}
  .seg button{border:none;background:transparent;color:var(--muted);width:36px;height:30px;font-size:15px;display:flex;align-items:center;justify-content:center;border-right:1px solid var(--line)}
  .seg button:last-child{border-right:none}
  .seg button.na{opacity:.28}
  .seg button.on[data-m="walk"]{background:var(--walk);color:#fff}
  .seg button.on[data-m="transit"]{background:var(--transit);color:#fff}
  .seg button.on[data-m="didi"]{background:var(--didi);color:#fff}
  .legtime{background:none;border:none;color:var(--ink);font:700 13px 'Sora',sans-serif;min-width:30px;text-align:right;font-variant-numeric:tabular-nums;padding:0}
  .legtime small{color:var(--muted);font-weight:400}
  .legcost{border:1px solid var(--line);background:var(--card);color:var(--ok);font:700 13px 'Sora',sans-serif;padding:6px 11px;border-radius:10px;display:inline-flex;align-items:center;gap:6px}
  .legcost svg.ic{width:1.15em;height:1.15em}
  .legcost.empty{color:var(--muted);opacity:.8}
  .legroute{color:var(--transit);text-decoration:none;font-size:16px;display:inline-flex;padding:2px}

  .extras{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);margin:10px 0 4px;padding:13px 15px}
  .extras h3{margin:0 0 8px;font:700 14px 'Sora';display:flex;align-items:center;gap:7px}
  .endday{text-align:center;color:var(--muted);font-size:12px;margin-top:16px}
  footer{max-width:660px;margin:0 auto;padding:8px 16px 40px;color:var(--muted);font-size:11px;text-align:center;line-height:1.6}
  .toast{position:fixed;left:50%;bottom:calc(24px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--bg);padding:10px 18px;border-radius:12px;font-size:13px;font-weight:700;opacity:0;transition:.25s;pointer-events:none;z-index:50}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* diálogo de gasto */
  .ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
  .dlg{background:var(--card);border-radius:18px;padding:18px;width:100%;max-width:360px;box-shadow:0 20px 50px rgba(0,0,0,.45)}
  .dlg h4{margin:0 0 6px;font:700 16px 'Sora';display:flex;align-items:center;gap:8px}
  .dlg label{display:block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin:12px 0 5px}
  .dlg input{width:100%;font:inherit;font-size:16px;padding:11px 12px;border:1px solid var(--line);border-radius:11px;background:var(--bg);color:var(--ink)}
  .dlg input.amt{font-family:'Sora';font-weight:700;font-size:17px}
  .dlg .btns{display:flex;gap:9px;margin-top:17px}
  .dlg .btns button{flex:1;padding:11px;border-radius:11px;font-weight:700;font-size:14px;border:1px solid var(--line);background:transparent;color:var(--ink)}
  .dlg .btns .ok{background:var(--accent);border-color:var(--accent);color:#fff}
  .dlg .dlgnote{margin:2px 0 0;font-size:12.5px;line-height:1.45;color:var(--muted);text-transform:none;letter-spacing:0}
  .brand .btxt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
  .syncbtn{margin-left:auto;flex:0 0 auto;display:inline-flex;align-items:center;gap:5px;padding:5px 9px;border-radius:999px;
    border:1px solid var(--line);background:transparent;color:var(--muted);font:inherit;font-size:10.5px;
    font-weight:700;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
  .syncbtn .ic{width:13px;height:13px}
  .syncbtn.ok{color:#3c7a54;border-color:#3c7a5455}
  .syncbtn.pend{color:#c9871f;border-color:#c9871f55}
  .syncbtn.err{color:var(--accent);border-color:#a5282a66}
  .syncbtn.busy{color:var(--muted)}
  .syncbtn.busy .ic{animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media(max-width:400px){.syncbtn span{display:none}}
  /* feedback de arrastre */
  .dropline{height:4px;border-radius:3px;background:var(--accent);margin:7px 0;box-shadow:0 0 10px color-mix(in srgb,var(--accent) 70%,transparent);position:relative}
  .dropline:before{content:"";position:absolute;left:-3px;top:-3px;width:10px;height:10px;border-radius:50%;background:var(--accent)}
  /* filtros de la vista gastos */
  .filters{display:flex;gap:7px;overflow-x:auto;margin-bottom:14px;padding-bottom:2px;scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .filters button{flex:0 0 auto;border:1px solid var(--line);background:var(--card);color:var(--muted);padding:7px 13px;border-radius:999px;font-size:12.5px;font-weight:700}
  .filters button.on{background:var(--gold);border-color:var(--gold);color:#fff}
  .grow2{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line)}
  .grow2:first-of-type{border-top:none}
  .grow2 .dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto}
  .grow2 .c1{flex:1;min-width:0}
  .grow2 .c1 b{display:block;font-weight:700;font-size:13.5px}
  .grow2 .c1 span{font-size:11.5px;color:var(--muted)}
  .grow2 .amt2{font:700 14px 'Sora';white-space:nowrap}
  .gsub{font-size:12px;color:var(--muted);margin:-4px 0 10px}
  /* vista gastos */
  .gtot{background:linear-gradient(135deg,var(--accent),#7d1c17);color:#fff;border-radius:18px;padding:20px;text-align:center;margin-bottom:16px;box-shadow:var(--shadow)}
  .gtot .n{font:800 40px 'Sora';line-height:1}
  .gtot .l{opacity:.85;font-size:12px;text-transform:uppercase;letter-spacing:.12em;margin-top:6px}
  .gcard{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);margin-bottom:12px;padding:15px 16px}
  .gcard h3{margin:0 0 12px;font:700 15px 'Sora';display:flex;align-items:center;gap:8px}
  .gbar{display:flex;align-items:center;gap:10px;margin:9px 0}
  .gbar .ico{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;flex:0 0 auto}
  .gbar .txt{flex:1;min-width:0}
  .gbar .track{height:7px;background:var(--bg);border-radius:5px;margin-top:4px;overflow:hidden}
  .gbar .fill{height:100%;border-radius:5px}
  .gbar .amt{font:700 14px 'Sora';white-space:nowrap}
  .gday{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-top:1px solid var(--line);font-size:14px}
  .gday:first-of-type{border-top:none}
  .gday b{font-family:'Sora'}
  .dday{padding:10px 0;border-top:1px solid var(--line)}
  .dday:first-of-type{border-top:none;padding-top:2px}
  .dday .top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;font-size:13.5px}
  .dday .top span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .dday .top b{font:700 14px 'Sora';white-space:nowrap}
  .dday .stack{display:flex;height:10px;background:var(--bg);border-radius:5px;overflow:hidden;margin-top:6px}
  .dday .stack i{display:block;height:100%}
  .dday.zero .stack{opacity:.45}
  .glegend{display:flex;flex-wrap:wrap;gap:10px 14px;margin-top:14px;padding-top:12px;border-top:1px solid var(--line)}
  .glegend span{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted);font-weight:700}
  .glegend i{width:9px;height:9px;border-radius:3px;flex:0 0 auto}
  .verbtn{margin-top:9px;border:1px solid var(--line);background:transparent;color:var(--muted);
    font:inherit;font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;
    padding:7px 14px;border-radius:999px}
  .verbtn.busy{opacity:.5}
  /* ---- Comer ---- */
  .chips{display:flex;gap:7px;overflow-x:auto;padding:2px 0 12px;-webkit-overflow-scrolling:touch}
  .chips button{flex:0 0 auto;border:1px solid var(--line);background:transparent;color:var(--muted);
    padding:7px 14px;border-radius:999px;font:inherit;font-size:12.5px;font-weight:700}
  .chips button.on{background:var(--food);border-color:var(--food);color:#fff}
  .rcard{background:var(--card);border:1px solid var(--line);border-radius:15px;box-shadow:var(--shadow);
    margin-bottom:10px;padding:13px 14px;display:flex;gap:11px;align-items:flex-start;width:100%;text-align:left;font:inherit;color:var(--ink)}
  .rcard .ric{width:34px;height:34px;border-radius:10px;background:var(--food);color:#fff;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center}
  .rcard .rb{flex:1;min-width:0}
  .rcard .rn{font:700 15px 'Sora';display:block}
  .rcard .rcn{font-size:13px;color:var(--muted)}
  .rcard .rmeta{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px}
  .tag{font-size:11px;font-weight:700;padding:3px 8px;border-radius:7px;background:var(--bg);color:var(--muted)}
  .tag.pr{background:var(--accent-soft);color:var(--accent)}
  .tag.nota{background:#f2b21422;color:var(--gold)}
  .rcard .ric.cafe{background:var(--cafe)}
  /* --- qué hemos comido --- */
  .pcomida{display:flex;align-items:center;gap:5px;font-size:12.5px;font-weight:700;color:var(--food);margin-top:2px}
  .pcomida svg{width:13px;height:13px}
  .comida{margin-top:10px;padding:11px 12px;border:1px solid var(--line);border-radius:12px;background:var(--bg)}
  .comida .glabel{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:800;color:var(--muted);margin-bottom:8px}
  /* 16px obligatorio: por debajo, Safari hace zoom al enfocar y no lo deshace (ronda 11) */
  .comsel{width:100%;font-size:16px;font-family:inherit;padding:10px 11px;border-radius:10px;
    border:1px solid var(--line);background:var(--card);color:var(--ink)}
  .comsel-det{display:flex;flex-direction:column;gap:5px;margin-top:9px;padding:10px 11px;
    border-radius:10px;background:var(--card);border:1px solid var(--line)}
  .comsel-det .cd-n{display:flex;align-items:center;gap:6px;font:700 14px 'Sora'}
  .comsel-det .cd-n svg{width:15px;height:15px;color:var(--food)}
  .comsel-det .cd-m{font-size:12.5px;color:var(--muted)}
  .comsel-det .cd-foto img{width:100%;border-radius:9px;display:block;margin-top:3px}
  .comsel-det .cd-b{align-self:flex-start;display:inline-flex;align-items:center;gap:5px;margin-top:3px;
    background:transparent;border:1px solid var(--line);color:var(--food);font:inherit;font-size:12px;
    font-weight:700;padding:6px 11px;border-radius:9px}
  /* --- diálogo de sitio nuevo --- */
  .fld{margin-bottom:13px}
  .fld label{display:block;font-size:12px;font-weight:800;color:var(--muted);margin-bottom:5px}
  .fld input{width:100%;font-size:16px;font-family:inherit;padding:11px;border-radius:10px;
    border:1px solid var(--line);background:var(--bg);color:var(--ink)}
  .fotobox:empty{display:none}
  .fotobox img{width:100%;border-radius:10px;display:block;margin-bottom:8px}
  .fotoact{display:flex;gap:8px;flex-wrap:wrap}
  .fbtn{display:inline-flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--line);
    color:var(--ink);font:inherit;font-size:13px;font-weight:700;padding:9px 13px;border-radius:10px;cursor:pointer}
  .fbtn.del{color:var(--accent)}
  .fbtn.wide{width:100%;justify-content:center;margin-top:10px}

ada 16:00) · CERRADO LUNES", "costeCny": 120, "visitaMin": 180, "amapKeyword": "故宫博物院", "resumen": "El palacio imperial de las dinastías Ming y Qing (1420), 980 edificios y 72 ha; el conjunto de madera antigua más grande del mundo. Se entra SOLO por la Puerta del Meridiano (午门, al sur, desde Tiananmén) y se sale por el norte (神武门), que deja justo enfrente de Jingshan. Reserva online obligatoria con pasaporte, se agota con días de antelación. ¥60/pers en temporada alta (¥120 para 2).", "notas": "Reservar online con pasaporte · se entra por el sur y se sale por el norte", "direccion": "No.4 Jingshan Front St, Dongcheng", "direccionCn": "北京市东城区景山前街4号"}, {"id": "p3", "kind": "place", "gcj": [116.39676, 39.92344], "nombre": "Parque Jingshan", "cn": "景山公园", "tipo": "Atracción", "horario": "6:30–21:00", "costeCny": 36, "visitaMin": 60, "amapKeyword": "景山公园", "resumen": "Colina artificial hecha con la tierra excavada del foso de la Ciudad Prohibida. Desde el pabellón Wanchun, en lo alto, está LA vista clásica de los tejados dorados del palacio: es la foto que todo el mundo busca de Pekín. Subida corta pero con escaleras. Mejor al atardecer.", "notas": "La mejor vista de la Ciudad Prohibida · entrar por la puerta sur", "direccion": "No.44 Jingshan West St, Xicheng", "direccionCn": "北京市西城区景山西街44号"}, {"id": "p4", "kind": "place", "gcj": [116.39108, 39.92588], "nombre": "Parque Beihai", "cn": "北海公园", "tipo": "Atracción", "horario": "6:30–20:00", "costeCny": 20, "visitaMin": 90, "amapKeyword": "北海公园", "resumen": "Jardín imperial de 69 ha alrededor de un lago, uno de los más antiguos que se conservan (s. XI). La Dagoba Blanca sobre la Isla de Jade preside la vista; abajo, barcas de remos, el Muro de los Nueve Dragones y galerías cubiertas. ¥10/pers (¥20 para 2), con suplemento si se entra a la dagoba.", "notas": "", "direccion": "No.1 Wenjin St, Xicheng", "direccionCn": "北京市西城区文津街1号"}, {"id": "p5", "kind": "place", "gcj": [116.39599, 39.94075], "nombre": "Torres de la Campana y el Tambor", "cn": "钟鼓楼", "tipo": "Atracción", "horario": "9:00–17:00 (últ. entrada 16:30)", "costeCny": 60, "visitaMin": 60, "amapKeyword": "钟鼓楼", "resumen": "Las dos torres que daban la hora a la ciudad imperial, en el extremo norte del eje central. En la del Tambor hay pases de percusión cada media hora; desde arriba se ven los tejados grises de los hutongs. Escaleras muy empinadas. Entrada combinada ¥30/pers (¥60 para 2).", "notas": "Escaleras empinadas · pases de tambor cada media hora", "direccion": "Gulou East St, Dongcheng", "direccionCn": "北京市东城区鼓楼东大街"}, {"id": "p6", "kind": "place", "gcj": [116.40774, 39.94543], "nombre": "Mr. Shi's Dumplings", "cn": "老石饺子馆", "tipo": "Comida", "horario": "11:00–22:00", "costeCny": 0, "visitaMin": 60, "amapKeyword": "老石饺子馆 宝钞胡同", "resumen": "Local pequeño y muy conocido de jiaozi (empanadillas) en un hutong junto a la Torre del Tambor. Carta en inglés, raciones generosas y precio bajo. Suele haber cola: se apunta uno y espera en la calle.", "notas": "Comer por aquí · suele haber cola", "direccion": "No.74 Baochao Hutong, Dongcheng", "direccionCn": "北京市东城区宝钞胡同74号"}, {"id": "p7", "kind": "place", "gcj": [116.41459, 39.94553], "nombre": "Templo de Confucio", "cn": "北京孔庙", "tipo": "Atracción", "horario": "8:30–17:00 (últ. entrada 16:30)", "costeCny": 60, "visitaMin": 60, "amapKeyword": "北京孔庙 国子监", "resumen": "Segundo templo confuciano más grande de China (1302). Patios con cipreses centenarios y 198 estelas de piedra con los nombres de más de 50.000 licenciados de los exámenes imperiales. La entrada incluye el Guozijian (Colegio Imperial), justo al lado. Mucho más tranquilo que el resto de la ciudad.", "notas": "Entrada combinada con el Guozijian", "direccion": "No.13 Guozijian St, Dongcheng", "direccionCn": "北京市东城区国子监街13号"}, {"id": "p8", "kind": "place", "gcj": [116.41771, 39.94506], "nombre": "Templo de los Lamas (Yonghegong)", "cn": "雍和宫", "tipo": "Atracción", "horario": "9:00–16:30 (últ. entrada 16:00)", "costeCny": 50, "visitaMin": 60, "amapKeyword": "雍和宫", "resumen": "El templo budista tibetano más importante de Pekín, antigua residencia del emperador Yongzheng (1694). Cinco patios en fila; al fondo, un Buda Maitreya de 18 m tallado en un solo tronco de sándalo. Sigue en culto: huele a incienso y hay monjes y fieles. ¥25/pers (¥50 para 2).", "notas": "Templo en culto · vestir con respeto", "direccion": "No.12 Yonghegong St, Dongcheng", "direccionCn": "北京市东城区雍和宫大街12号"}, {"id": "p9", "kind": "place", "gcj": [116.45438, 39.93491], "nombre": "Sanlitun", "cn": "三里屯太古里", "tipo": "Atracción", "horario": "10:00–22:00 (zona abierta)", "costeCny": 0, "visitaMin": 60, "amapKeyword": "三里屯太古里", "resumen": "El barrio moderno de Pekín: Taikoo Li, un complejo abierto de tiendas, terrazas y restaurantes, y la zona de bares alrededor. Contraste total con la mañana imperial. Ambiente a partir del atardecer.", "notas": "", "direccion": "No.19 Sanlitun Rd, Chaoyang", "direccionCn": "北京市朝阳区三里屯路19号"}, {"id": "p10", "kind": "place", "gcj": [116.44883, 39.91959], "nombre": "Beijing Parkview Green", "cn": "侨福芳草地", "tipo": "Mercado/Compras", "horario": "10:00–22:00", "costeCny": 0, "visitaMin": 60, "amapKeyword": "侨福芳草地", "resumen": "Centro comercial dentro de una pirámide de vidrio bioclimática, con más de 500 obras de arte contemporáneo repartidas por los pasillos (varios Dalí incluidos). Se puede recorrer solo por verlo, sin comprar. Aire acondicionado, que en agosto no sobra.", "notas": "Es medio museo de arte contemporáneo · gratis entrar", "direccion": "No.9 Dongdaqiao Rd, Chaoyang", "direccionCn": "北京市朝阳区东大桥路9号"}, {"id": "p11", "kind": "place", "gcj": [116.44969, 39.90949], "nombre": "Silk Street", "cn": "秀水街", "tipo": "Mercado/Compras", "horario": "9:30–21:00", "costeCny": 0, "visitaMin": 75, "amapKeyword": "秀水街", "resumen": "Mercado cubierto de seis plantas famoso por las imitaciones: ropa, bolsos, electrónica, seda y sastrería a medida. Se regatea SIEMPRE, y fuerte: se empieza por un 20-30% de lo que pidan. Arriba hay puestos de comida para cenar.", "notas": "Cenar por aquí · regatear fuerte (empezar por el 20-30%)", "direccion": "No.8 Xiushui East St, Chaoyang", "direccionCn": "北京市朝阳区秀水东街8号"}, {"id": "p12", "kind": "place", "gcj": [116.45203, 39.86987], "nombre": "Beijing Suwen Hotel (vuelta)", "cn": "北京素问酒店", "tipo": "Hotel", "horario": "Fin del día", "costeCny": 0, "visitaMin": 0, "amapKeyword": "北京素问酒店 华威南路", "resumen": "Vuelta al hotel para terminar el día.", "notas": "El día empieza y acaba en el hotel", "direccion": "Building 404, Hongshan Jiayuan, No.42 Huawei South Rd, Chaoyang", "direccionCn": "北京市朝阳区华威南路42号红山嘉园404楼"}], "legs": {"p0>p1": {"distKm": 8.2, "walkMin": null, "transitMin": 24, "didiMin": 12, "geomDrive": [[116.4525, 39.86986], [116.45087, 39.87149], [116.44435, 39.8731], [116.44471, 39.87469], [116.44514, 39.87584], [116.44605, 39.8777], [116.44638, 39.87881], [116.446, 39.88115], [116.4453, 39.88581], [116.44433, 39.89267], [116.44411, 39.89722], [116.44384, 39.898], [116.44272, 39.89881], [116.4401, 39.89947], [116.43911, 39.90058], [116.4387, 39.90101], [116.43805, 39.90108], [116.43573, 39.90092], [116.43322, 39.90085], [116.42765, 39.9007], [116.42718, 39.90069], [116.42131, 39.90056], [116.42044, 39.90074], [116.4198, 39.90096], [116.41964, 39.90114], [116.41944, 39.90124], [116.4188, 39.90119], [116.4182, 39.90119], [116.41504, 39.90109], [116.41313, 39.90103], [116.41177, 39.90098], [116.40912, 39.9009], [116.40712, 39.90086], [116.40586, 39.90082], [116.40474, 39.90079], [116.40225, 39.90066], [116.3997, 39.90028], [116.39954, 39.9033], [116.39952, 39.90381]], "geomWalk": null}, "p1>p2": {"distKm": 2.8, "walkMin": 36, "transitMin": 18, "didiMin": 7, "geomDrive": [[116.39952, 39.90381], [116.39945, 39.90521], [116.39934, 39.90724], [116.39932, 39.90753], [116.40128, 39.90759], [116.40293, 39.90765], [116.40338, 39.90772], [116.40371, 39.90775], [116.40627, 39.90784], [116.4068, 39.90785], [116.40666, 39.90821], [116.40667, 39.90866], 28, 39.91319], "nombre": "Beijing Department Store", "cn": "北京市百货大楼", "tipo": "Mercado/Compras", "horario": "9:30–21:30", "costeCny": 0, "visitaMin": 45, "amapKeyword": "北京市百货大楼", "resumen": "Los grandes almacenes históricos de Wangfujing (1955). Lo que hay que ver está en la planta -2: una reconstrucción de las calles del viejo Pekín con puestos de comida y tiendas de época, la llamada 'ciudad subterránea'.", "notas": "Bajar a la planta -2 (ciudad subterránea)", "direccion": "No.253 Wangfujing St, Dongcheng", "direccionCn": "北京市东城区王府井大街253号"}, {"id": "p4", "kind": "place", "gcj": [116.40051, 39.90525], "nombre": "Museo Nacional de China", "cn": "中国国家博物馆", "tipo": "Atracción", "horario": "9:00–17:00 (últ. entrada 16:00) · CERRADO LUNES", "costeCny": 0, "visitaMin": 120, "amapKeyword": "中国国家博物馆", "resumen": "El museo más visitado del mundo y el mejor resumen de 5.000 años de historia china: bronces Shang, el traje funerario de jade, cerámica y la exposición del Rejuvenecimiento Nacional. Está en el lado este de Tiananmén y se entra por el oeste. GRATIS, pero la reserva online se abre 7 días antes y se agota en minutos: hay que estar pendiente.", "notas": "GRATIS pero HAY QUE RESERVAR 7 DÍAS ANTES · se agota en minutos · pasaporte", "direccion": "No.16 East Chang'an Ave, Dongcheng", "direccionCn": "北京市东城区东长安街16号"}, {"id": "p5", "kind": "place", "gcj": [116.3935, 39.89969], "nombre": "Lao She's Teahouse", "cn": "老舍茶馆", "tipo": "Comida", "horario": "9:00–21:30", "costeCny": 0, "visitaMin": 90, "amapKeyword": "老舍茶馆", "resumen": "Casa de té clásica abierta en 1988 y bautizada por el dramaturgo Lao She. Sirve té y aperitivos pekineses, y por la tarde-noche hay espectáculo: ópera de Pekín, acrobacia, cambios de máscara y cuentacuentos. El pase con espectáculo se paga aparte y conviene reservar.", "notas": "El espectáculo se paga aparte · conviene reservar", "direccion": "No.3 Qianmen West St, Xicheng", "direccionCn": "北京市西城区前门西大街3号"}, {"id": "p6", "kind": "place", "gcj": [116.39817, 39.89511], "nombre": "Qian Men Da Jie", "cn": "前门大街", "tipo": "Atracción", "horario": "Zona abierta", "costeCny": 0, "visitaMin": 45, "amapKeyword": "前门大街", "resumen": "Repetido desde el 01/08: aquí queda de paso entre la casa de té y el Templo del Cielo. Si ya lo recorristeis, ocultadlo y la app recalcula el día.", "notas": "Repetido del 01/08 · queda de paso", "direccion": "Qianmen Ave, Dongcheng", "direccionCn": "北京市东城区前门大街"}, {"id": "p7", "kind": "place", "gcj": [116.41264, 39.88781], "nombre": "Templo del Cielo", "cn": "天坛公园", "tipo": "Atracción", "horario": "Parque 6:00–22:00 · monumentos 8:00–17:30", "costeCny": 88, "visitaMin": 120, "amapKeyword": "天坛公园", "resumen": "Donde los emperadores Ming y Qing hacían el sacrificio anual por la buena cosecha (1420). El Salón de la Oración, circular y de triple tejado azul sobre terraza de mármol, es de los edificios más bonitos de China. Vale la pena el billete combinado (¥44/pers, ¥88 para 2). Por la mañana el parque se llena de vecinos haciendo taichí y cantando.", "notas": "Billete combinado · el parque abre mucho antes que los monumentos", "direccion": "No.1 Tiantan East Rd, Dongcheng", "direccionCn": "北京市东城区天坛东路1号"}, {"id": "p8", "kind": "place", "gcj": [116.42052, 39.88627], "nombre": "Hongqiao Market", "cn": "红桥市场", "tipo": "Mercado/Compras", "horario": "9:30–19:00", "costeCny": 0, "visitaMin": 60, "amapKeyword": "红桥市场", "resumen": "El 'mercado de las perlas', justo enfrente de la puerta este del Templo del Cielo. Cuatro plantas: electrónica y recuerdos abajo, perlas y joyería arriba. Los precios de salida son disparatados; se regatea hasta un tercio o menos.", "notas": "Regatear a un tercio del precio de salida", "direccion": "No.16 Hongqiao Rd, Dongcheng", "direccionCn": "北京市东城区红桥路16号"}, {"id": "p9", "kind": "place", "gcj": [116.43479, 39.88102], "nombre": "Longtan Lake Park", "cn": "龙潭公园", "tipo": "Atracción", "horario": "6:00–21:30", "costeCny": 0, "visitaMin": 60, "amapKeyword": "龙潭公园", "resumen": function orderedIds(day){const d=ds(day.id);if(d.order&&d.order.length===day.items.length)return d.order.slice();return day.items.map(it=>it.id);}

    seq.forEach(({it,isLoc})=>{const g=sum(gastosOf(day,it));if(it.kind==="meal")dt.comidas+=g;else dt.entradas+=g;
      if(isLoc&&prev){dt.transporte+=sum(legGastos(day,prev.id+">"+it.id));}if(isLoc)prev=it;});

/* ---------- AVISO DE VERSIÓN NUEVA ----------
   Pregunta por un fichero de 3 bytes, no recarga nada. Si hay versión nueva avisa y deja
   que el usuario decida: recargar solo le cortaría a media edición. */
const VER="v21";
let updVista=false;
/* Lo lanza SOLO el usuario, desde el botón del pie. Sin comprobaciones automáticas: él sabe
   cuándo se ha publicado algo, y así nada le interrumpe por su cuenta. */
async function chkVer(){
  if(updVista)return;
  const b=document.getElementById("verBtn");
  if(!navigator.onLine){toast("Sin conexión");return;}
  if(b)b.classList.add("busy");
  try{
    const r=await fetch("version.txt?t="+Date.now(),{cache:"no-store"});
    if(!r.ok)throw new Error(r.status);
    const v=(await r.text()).trim();
    if(v&&v!==VER){updVista=true;barraUpd(v);}
    else toast("Ya tienes la última versión ("+VER+")");
  }catch(e){toast("No se pudo comprobar");}
  if(b)b.classList.remove("busy");}
function barraUpd(v){
  if(document.getElementById("updbar"))return;
  const b=document.createElement("div");b.id="updbar";b.className="updbar";
  b.innerHTML='<span>'+ic("refresh-cw")+'Versión nueva '+esc(v)+'</span><button id="updGo">Actualizar</button>';
  document.body.appendChild(b);
  /* por duplicado a propósito: si el rAF no dispara, la barra se quedaría fuera de pantalla */
  const ver=()=>b.classList.add("show");
  requestAnimationFrame(ver);setTimeout(ver,60);
  b.querySelector("#updGo").onclick=async()=>{
    b.querySelector("#updGo").textContent="…";
    /* subimos lo pendiente antes de recargar, para no dejarlo colgado */
    try{if(sb&&navigator.onLine)await doSync(true);}catch(e){}
    try{if(navigator.serviceWorker){const r=await navigator.serviceWorker.getRegistration();if(r)await r.update();}}catch(e){}
    location.reload();};}

/* ---------- SYNC ----------
   Cada dato modificado es una entrada independiente con su clave y su marca de tiempo.
   Los gastos llevan id propio: si los dos móviles añaden gastos a la vez, se suman los dos.
   Si se edita el MISMO dato en ambos, gana la marca de tiempo más reciente. */
const CFG="viajeChina.sb", SK="viajeChina.sync";
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
let sb=(function(){try{return JSON.parse(localStorage.getItem(CFG))||null}catch(e){return null}})();
let sync=(function(){try{return JSON.parse(localStorage.getItem(SK))||{}}catch(e){return{}}})();
sync.snap=sync.snap||{}; sync.pull=sync.pull||0; sync.dev=sync.dev||("m"+Math.random().toString(36).slice(2,6));
function saveSync(){try{localStorage.setItem(SK,JSON.stringify(sync))}catch(e){}}
let syncState=sb?"idle":"off", syncMsg="", pushT=null;

function sbFetch(path,opt){opt=opt||{};
  opt.headers=Object.assign({apikey:sb.key,Authorization:"Bearer "+sb.key},opt.headers||{});
  return fetch(sb.url.replace(/\/+$/,"")+path,opt);}

/* estado local -> entradas planas */
function exportEntries(){const e={};
  VIAJE.dias.forEach(day=>{const d=state[day.id];if(!d)return;const P=day.id+".";
    if(d.start)e[P+"start"]=d.start;
    if(d.order)e[P+"order"]=d.order;
    for(const k in d.hidden)if(d.hidden[k])e[P+"hid."+k]=1;
    for(const k in d.visitas)if(d.visitas[k]!=null)e[P+"vis."+k]=d.visitas[k];
    for(const k in d.modos)if(d.modos[k])e[P+"mod."+k]=d.modos[k];
    for(const k in d.tiempos)if(d.tiempos[k]!=null)e[P+"tim."+k]=d.tiempos[k];
    /* qué se comió en cada hueco. La FOTO no entra aquí: viaja solo el id, el jpeg se queda
       en IndexedDB de cada móvil (ver §fotos). Meter base64 en las entradas de sync haría
       que cada foto viajase entera en cada push. */
    for(const k in d.comidas)if(d.comidas[k])e[P+"com."+k]=d.comidas[k];
    for(const slot in d.gastos){e[P+"gm."+slot]=1;
      d.gastos[slot].forEach(g=>{if(!g.id)g.id=gid();e[P+"g."+g.id]={s:slot,l:g.label,a:g.amount};});}
    (d.extras||[]).forEach(g=>{if(!g.id)g.id=gid();e[P+"g."+g.id]={s:"_x",l:g.label,a:g.amount};});
  });return e;}

/* entradas -> estado local (los gastos se reconstruyen enteros desde las entradas) */
function applySnap(){
  VIAJE.dias.forEach(day=>{const d=ds(day.id);
    d.hidden={};d.visitas={};d.modos={};d.tiempos={};d.gastos={};d.extras=[];d.comidas={};delete d.order;delete d.start;});
  const gs={};
  for(const k in sync.snap){const e=sync.snap[k];if(e.v==null)continue;
    const i=k.indexOf(".");if(i<0)continue;
    const dayId=k.slice(0,i),rest=k.slice(i+1);
    if(!VIAJE.dias.some(x=>x.id===dayId))continue;
    const d=ds(dayId);
    if(rest==="start"){d.start=e.v;continue;}
    if(rest==="order"){d.order=e.v;continue;}
    const j=rest.indexOf(".");if(j<0)continue;
    const t=rest.slice(0,j),id=rest.slice(j+1);
    if(t==="hid")d.hidden[id]=true;
    else if(t==="vis")d.visitas[id]=e.v;
    else if(t==="mod")d.modos[id]=e.v;
    else if(t==="tim")d.tiempos[id]=e.v;
    else if(t==="com")d.comidas[id]=e.v;
    else if(t==="gm"){d.gastos[id]=d.gastos[id]||[];}
    else if(t==="g"&&e.v&&e.v.s)(gs[dayId]=gs[dayId]||[]).push({id:id,s:e.v.s,l:e.v.l,a:e.v.a});}
  for(const dayId in gs){const d=ds(dayId);
    gs[dayId].sort((a,b)=>a.id<b.id?-1:a.id>b.id?1:0);
    gs[dayId].forEach(x=>{const o={id:x.id,label:x.l,amount:x.a};
      if(x.s==="_x")d.extras.push(o);else (d.gastos[x.s]=d.gastos[x.s]||[]).push(o);});}
  saveLocal();}

/* marca con la hora actual todo lo que haya cambiado desde la última vez */
function stampChanges(){const cur=exportEntries(),sn=sync.snap,now=Date.now();let n=0;
  for(const k in cur){const j=JSON.stringify(cur[k]);
    if(!sn[k]||sn[k].j!==j){sn[k]={j:j,v:cur[k],ts:now,dv:sync.dev,d:1};n++;}}
  for(const k in sn){if(!(k in cur)&&sn[k].v!==null){sn[k]={j:"null",v:null,ts:now,dv:sync.dev,d:1};n++;}}
  if(n){saveSync();if(syncState==="ok")setSync("idle");}
  return n;}

function pendientes(){let n=0;for(const k in sync.snap)if(sync.snap[k].d)n++;return n;}

function setSync(s,m){syncState=s;syncMsg=m||"";paintSync();}
function paintSync(){const b=document.getElementById("syncBtn");if(!b)return;
  const p=pendientes();
  const map={off:["cloud-off","","Conectar"],idle:["cloud",p?"pend":"",p?p+" sin subir":"Sincronizar"],
    busy:["refresh-cw","busy","Subiendo"],ok:["cloud","ok","Al día"],err:["triangle-alert","err","Error"]};
  const m=map[syncState]||map.idle;
  b.className="syncbtn "+m[1];b.innerHTML=ic(m[0])+'<span>'+m[2]+'</span>';b.title=syncMsg||m[2];}

async function pull(){
  const r=await sbFetch("/rest/v1/cambios?select=k,v,ts,dev&ts=gt."+(sync.pull||0)+"&order=ts.asc&limit=10000",{});
  if(!r.ok)throw new Error("HTTP "+r.status);
  const rows=await r.json();let n=0,max=sync.pull||0;
  rows.forEach(row=>{if(row.ts>max)max=row.ts;
    const cur=sync.snap[row.k];
    /* gana la marca más reciente; si empatan al milisegundo, desempata el id de móvil
       (siempre igual en los dos, para que acaben viendo lo mismo) */
    if(cur&&(cur.ts>row.ts||(cur.ts===row.ts&&(cur.dv||"")>=(row.dev||""))))return;
    sync.snap[row.k]={j:JSON.stringify(row.v),v:row.v,ts:row.ts,dv:row.dev};n++;});
  sync.pull=max;
  if(n)applySnap();
  saveSync();return n;}

async function push(){const rows=[];
  for(const k in sync.snap){const s=sync.snap[k];if(s.d)rows.push({k:k,v:s.v,ts:s.ts,dev:sync.dev});}
  if(!rows.length)return 0;
  for(let i=0;i<rows.length;i+=200){
    const r=await sbFetch("/rest/v1/cambios?on_conflict=k",{method:"POST",
      headers:{"Content-Type":"application/json","Prefer":"resolution=merge-duplicates"},
      body:JSON.stringify(rows.slice(i,i+200))});
    if(!r.ok)throw new Error("HTTP "+r.status);}
  rows.forEach(x=>{const s=sync.snap[x.k];if(s&&s.ts===x.ts)delete s.d;});
  saveSync();return rows.length;}

let syncing=false;
async function doSync(silent){
  if(!sb||syncing)return;
  if(!navigator.onLine){if(!silent)toast("Sin conexión · se sincronizará al volver");setSync("idle");return;}
  syncing=true;setSync("busy");
  try{
    const got=await pull();     /* primero traer: si el otro móvil es más nuevo, gana él */
    stampChanges();
    const sent=await push();
    setSync("ok");
    if(got){render();if(!silent)toast("Actualizado ("+got+" cambio"+(got>1?"s":"")+")");}
    else if(!silent)toast(sent?"Enviado":"Todo al día");
  }catch(e){setSync("err",String(e.message||e));if(!silent)toast("Error al sincronizar: "+(e.message||e));}
  syncing=false;paintSync();}

function queuePush(){paintSync();if(!sb)return;clearTimeout(pushT);pushT=setTimeout(()=>doSync(true),3000);}

const CIUDADES=Object.keys(COMER);
let comerCiudad=null;   /* null = la del día actual */
function ciudadDelDia(){const d=VIAJE.dias[current>=0?current:ultimoDia];return d?d.ciudad:CIUDADES[0];}
function restsDe(c){return c==="__todas__"?CIUDADES.flatMap(x=>COMER[x].map(r=>({...r,_c:x}))):(COMER[c]||[]).map(r=>({...r,_c:c}));}
function restById(id){for(const c of CIUDADES){const r=COMER[c].find(x=>x.id===id);if(r)return {...r,_c:c};}return null;}
function amapUrl(r){return "https://uri.amap.com/search?keyword="+encodeURIComponent(r.cn||r.nombre)
  +(r.gcj?"&center="+r.gcj[0]+","+r.gcj[1]:"")+"&coordinate=gaode&callnative=1";}

/* ---------- FOTOS DEL LOCAL (IndexedDB) ----------
   Por qué IndexedDB y no localStorage: localStorage son ~5 MB para TODO el estado, y una
   foto del iPhone en crudo son 3-5 MB. Una sola foto reventaría la app entera.
   Por eso toda foto pasa SIEMPRE por resizeFoto() antes de guardarse: 1280 px de lado mayor
   y JPEG 0.72 la dejan en ~120-200 KB, que es de sobra para recordar el local.
   NO se sincronizan entre los dos móviles (ver exportEntries): el jpeg se queda en el
   teléfono que hizo la foto. */
let _fdb=null;
function fotoDB(){return new Promise((res,rej)=>{
  if(_fdb)return res(_fdb);
  if(!window.indexedDB)return rej(new Error("sin indexedDB"));
  const rq=indexedDB.open("viajeChinaFotos",1);
  rq.onupgradeneeded=()=>{rq.result.createObjectStore("fotos");};
  rq.onsuccess=()=>{_fdb=rq.result;res(_fdb);};
  rq.onerror=()=>rej(rq.error);});}
async function fotoSet(id,data){const db=await fotoDB();return new Promise((res,rej)=>{
  const t=db.transaction("fotos","readwrite");t.objectStore("fotos").put(data,id);
  t.oncomplete=()=>res();t.onerror=()=>rej(t.error);});}
async function fotoGet(id){let db;try{db=await fotoDB();}catch(e){return null;}
  return new Promise(res=>{
  const t=db.transaction("fotos","readonly"),r=t.objectStore("fotos").get(id);
  r.onsuccess=()=>res(r.result||null);r.onerror=()=>res(null);});}
async function fotoDel(id){try{const db=await fotoDB();return new Promise(res=>{
  const t=db.transaction("fotos","readwrite");t.objectStore("fotos").delete(id);
  t.oncomplete=()=>res();t.onerror=()=>res();});}catch(e){}}

/* Reduce la foto en el propio móvil antes de guardarla. iOS entrega los HEIC ya convertidos
   a JPEG cuando vienen de <input type="file" accept="image/*">, así que no hay que decodificar
   HEIC a mano. */
function resizeFoto(file,cb){
  const url=URL.createObjectURL(file),img=new Image();
  img.onload=()=>{
    const MAX=1280;let w=img.naturalWidth,h=img.naturalHeight;
    const f=Math.min(1,MAX/Math.max(w,h));w=Math.max(1,Math.round(w*f));h=Math.max(1,Math.round(h*f));
    const cv=document.createElement("canvas");cv.width=w;cv.height=h;
    cv.getContext("2d").drawImage(img,0,0,w,h);
    URL.revokeObjectURL(url);
    try{cb(cv.toDataURL("image/jpeg",0.72));}catch(e){cb(null);}
  };
  img.onerror=()=>{URL.revokeObjectURL(url);cb(null);};
  img.src=url;}

/* pinta las miniaturas que estén en pantalla (la lectura de IndexedDB es asíncrona) */
function pintaFotos(root){(root||document).querySelectorAll("[data-foto]").forEach(el=>{
  if(el._f)return;el._f=1;
  fotoGet(el.dataset.foto).then(d=>{if(d)el.innerHTML='<img src="'+d+'" alt="Foto del local">';});});}

/* ---------- QUÉ HEMOS COMIDO ----------
   Cada hueco de comida guarda o un id de la lista (`rid`) o un sitio escrito a mano
   (`nuevo`). El id de la lista es estable (sale del nombre, no del orden del Excel),
   así que añadir sitios al Excel no reasigna lo ya guardado. */
function comidaDe(day,it){return ds(day.id).comidas[it.id]||null;}
function comidaNombre(day,it){const c=comidaDe(day,it);if(!c)return null;
  if(c.rid){const r=restById(c.rid);return r?r.nombre:"(sitio ya no está en la lista)";}
  return c.nuevo?c.nuevo.nombre:null;}

function comidaBlock(day,it){
  const c=comidaDe(day,it),lista=(COMER[day.ciudad]||[]);
  const rst=lista.filter(r=>!r.cafe),caf=lista.filter(r=>r.cafe);
  const opt=r=>'<option value="'+r.id+'"'+(c&&c.rid===r.id?" selected":"")+'>'+esc(r.nombre)+(r.cn?" · "+esc(r.cn):"")+'</option>';
  let h='<div class="comida"><div class="glabel">'+ic("utensils")+' ¿Dónde hemos comido?</div>';
  h+='<select class="comsel" data-comsel="'+it.id+'">';
  h+='<option value=""'+(!c?" selected":"")+'>— Sin elegir —</option>';
  if(rst.length){h+='<optgroup label="Restaurantes">'+rst.map(opt).join("")+'</optgroup>';}
  if(caf.length){h+='<optgroup label="Cafeterías">'+caf.map(opt).join("")+'</optgroup>';}
  if(c&&c.nuevo)h+='<optgroup label="Añadido por vosotros"><option value="__mantener__" selected>'+esc(c.nuevo.nombre)+'</option></optgroup>';
  h+='<option value="__nuevo__">＋ Otro sitio (escribirlo yo)…</option>';
  h+='</select>';
  if(c){
    if(c.rid){const r=restById(c.rid);
      if(r){const p=r.precioReal!=null?r.precioReal:r.precio;
        h+='<div class="comsel-det"><div class="cd-n">'+ic(r.cafe?"coffee":"utensils")+esc(r.nombre)+'</div>'
          +'<div class="cd-m">'+esc(r.tipo)+(p!=null?' · ¥'+p+'/pers':'')+'</div>'
          +'<button class="cd-b" data-comficha="'+r.id+'">'+ic("info")+'Ver ficha</button></div>';}
    } else if(c.nuevo){
      h+='<div class="comsel-det"><div class="cd-n">'+ic("map-pin")+esc(c.nuevo.nombre)+'</div>';
      const m=[c.nuevo.tipo,c.nuevo.precio!=null?"¥"+c.nuevo.precio+"/pers":""].filter(Boolean).join(" · ");
      if(m)h+='<div class="cd-m">'+esc(m)+'</div>';
      if(c.nuevo.foto)h+='<div class="cd-foto" data-foto="'+esc(c.nuevo.foto)+'"></div>';
      h+='<button class="cd-b" data-comedit="'+it.id+'">'+ic("pencil")+'Editar</button></div>';}
  }
  return h+'</div>';}

/* Modal para un sitio que no está en la lista. La foto es opcional. */
function dlgNuevoSitio(day,it){
  const c=comidaDe(day,it),n=(c&&c.nuevo)||{};
  const ov=document.createElement("div");ov.className="ov";
  ov.innerHTML='<div class="ficha"><div class="fh"><span class="x" data-cerrar="1">'+ic("x")+'</span>'
    +'<h3>'+(n.nombre?"Editar sitio":"Sitio nuevo")+'</h3><div class="cn">'+esc(it.label)+' · '+esc(day.fecha)+'</div></div>'
    +'<div class="fb"><div class="fld"><label>Nombre del local</label>'
    +'<input id="nsN" type="text" placeholder="Como lo quieras recordar" value="'+esc(n.nombre||"")+'"></div>'
    +'<div class="fld"><label>Tipo (opcional)</label>'
    +'<input id="nsT" type="text" placeholder="Fideos, cafetería, puesto callejero…" value="'+esc(n.tipo||"")+'"></div>'
    +'<div class="fld"><label>Precio por persona en ¥ (opcional)</label>'
    +'<input id="nsP" type="number" inputmode="decimal" placeholder="0" value="'+(n.precio!=null?n.precio:"")+'"></div>'
    +'<div class="fld"><label>Foto del local (opcional)</label>'
    +'<div class="fotobox" id="nsFB"'+(n.foto?' data-foto="'+esc(n.foto)+'"':'')+'></div>'
    +'<div class="fotoact"><label class="fbtn">'+ic("camera")+'Hacer o elegir foto<input id="nsF" type="file" accept="image/*" hidden></label>'
    +'<button class="fbtn del" id="nsFX"'+(n.foto?"":' style="display:none"')+'>'+ic("x")+'Quitar</button></div>'
    +'<div class="fhint">Se guarda reducida (~150 KB) en este móvil. No se sincroniza con el otro teléfono.</div></div>'
    +'<button class="amap" id="nsOK">'+ic("check")+'Guardar</button>'
    +(c?'<button class="fbtn del wide" id="nsDEL">'+ic("x")+'Quitar lo guardado en este hueco</button>':'')
    +'</div></div>';
  document.body.appendChild(ov);pintaFotos(ov);
  const cerrar=()=>ov.remove();
  ov.querySelector("[data-cerrar]").onclick=cerrar;
  ov.addEventListener("click",e=>{if(e.target===ov)cerrar();});
  let fotoId=n.foto||null,fotoNueva=null;
  const fb=ov.querySelector("#nsFB"),fx=ov.querySelector("#nsFX");
  ov.querySelector("#nsF").onchange=e=>{
    const f=e.target.files&&e.target.files[0];if(!f)return;
    toast("Preparando la foto…");
    resizeFoto(f,d=>{
      if(!d){toast("No se pudo leer esa foto");return;}
      fotoNueva=d;fb.innerHTML='<img src="'+d+'" alt="Foto del local">';fx.style.display="";
      toast("Foto lista ("+Math.round(d.length*0.75/1024)+" KB)");});};
  fx.onclick=()=>{fotoNueva=null;if(fotoId){fotoDel(fotoId);fotoId=null;}fb.innerHTML="";fx.style.display="none";};
  const del=ov.querySelector("#nsDEL");
  if(del)del.onclick=async()=>{if(fotoId)await fotoDel(fotoId);
    delete ds(day.id).comidas[it.id];save();cerrar();renderDay();};
  ov.querySelector("#nsOK").onclick=async()=>{
    const nom=(ov.querySelector("#nsN").value||"").trim();
    if(!nom){toast("Ponle un nombre al sitio");return;}
    const t=(ov.querySelector("#nsT").value||"").trim();
    const pv=parseFloat(ov.querySelector("#nsP").value);
    if(fotoNueva){fotoId=fotoId||("f"+Date.now().toString(36)+Math.random().toString(36).slice(2,6));
      try{await fotoSet(fotoId,fotoNueva);}catch(e){fotoId=null;toast("No se pudo guardar la foto");}}
    const o={nombre:nom};if(t)o.tipo=t;if(!isNaN(pv))o.precio=pv;if(fotoId)o.foto=fotoId;
    ds(day.id).comidas[it.id]={nuevo:o};save();cerrar();renderDay();};}

  const g=document.createElement("button");g.className="gastos"+(current===-1?" active":"");g.innerHTML=ic("wallet")+" Gastos";g.onclick=()=>{current=-1;render();};nav.appendChild(g);
  const co=document.createElement("button");co.className="gastos"+(current===-2?" active":"");co.innerHTML=ic("utensils")+" Comer";co.onclick=()=>{current=-2;comerCiudad=null;render();};nav.appendChild(co);
  VIAJE.dias.forEach((d,i)=>{const b=document.createElement("button");b.textContent="Día "+(i+1)+" · "+d.fecha;if(i===current)b.className="active";b.onclick=()=>{current=i;ultimoDia=i;render();};nav.appendChild(b);});}

function gastosBlock(day,it){let h='<div class="gastos"><div class="glabel">'+ic("wallet")+' Gastos</div>';

function dragHint(){return '<div class="miniact"><span class="draghint">'+ic("grip-vertical")+' mantén pulsado para mover</span></div>';}

let gFilter="todos";
function allExpenses(){const out=[];
  VIAJE.dias.forEach((day,di)=>{const d=ds(day.id);const seq=visibleSeq(day);let prev=null;
    seq.forEach(({it,isLoc})=>{
      gastosOf(day,it).forEach(g=>out.push({di,fecha:day.fecha,ciudad:day.ciudad,cat:(it.kind==="meal"?"comidas":"entradas"),src:(it.nombre||it.label),label:g.label,amount:+g.amount||0}));
      if(isLoc&&prev)legGastos(day,prev.id+">"+it.id).forEach(g=>out.push({di,fecha:day.fecha,ciudad:day.ciudad,cat:"transporte",src:(prev.nombre||prev.label)+" → "+(it.nombre||it.label),label:g.label,amount:+g.amount||0}));
      if(isLoc)prev=it;});
    d.extras.forEach(g=>out.push({di,fecha:day.fecha,ciudad:day.ciudad,cat:"extras",src:"Extra del día",label:g.label,amount:+g.amount||0}));});
  return out;}
function catBars(byCat){let h="";const max=Math.max(1,...Object.keys(CATS).map(c=>byCat[c]||0));
  for(const c in CATS){const v=byCat[c]||0;h+='<div class="gbar"><div class="ico" style="background:'+CATS[c].col+'">'+ic(CATS[c].ic)+'</div><div class="txt"><div>'+CATS[c].lb+'</div><div class="track"><div class="fill" style="width:'+(v/max*100)+'%;background:'+CATS[c].col+'"></div></div></div><div class="amt">¥'+num(v)+'</div></div>';}
  return h;}
function renderGastos(){const S=tripSummary(),E=allExpenses();
  let h='<div class="dayhead"><div class="date">Todo el viaje</div><div class="city disp">Gastos</div></div>';
  h+='<div class="gtot"><div class="n">¥'+num(S.total)+'</div><div class="l">Total estimado · 2 personas</div></div>';
  const F=[["todos","Todos"],["dias","Por día"],["tipo","Por tipo"],["diatipo","Día y tipo"]];
  h+='<div class="filters">'+F.map(f=>'<button class="'+(gFilter===f[0]?"on":"")+'" data-f="'+f[0]+'">'+f[1]+'</button>').join("")+'</div>';

  if(gFilter==="todos"){
    h+='<div class="gcard"><h3>'+ic("wallet")+' Todos los gastos</h3><div class="gsub">'+E.length+' apuntes · ordenados por día</div>';
    if(!E.length)h+='<div class="gsub">Todavía no hay gastos. Añádelos en cada sitio, tramo o comida.</div>';
    E.sort((a,b)=>a.di-b.di).forEach(e=>{h+='<div class="grow2"><span class="dot" style="background:'+CATS[e.cat].col+'"></span><div class="c1"><b>'+e.label+'</b><span>Día '+(e.di+1)+' · '+e.src+'</span></div><span class="amt2">¥'+num(e.amount)+'</span></div>';});
    h+='</div>';
  } else if(gFilter==="tipo"){
    h+='<div class="gcard"><h3>'+ic("chart-pie")+' Todo el viaje por tipo</h3>'+catBars(S.byCat)+'</div>';
  } else if(gFilter==="dias"){
    h+='<div class="gcard"><h3>'+ic("calendar")+' Todo el viaje por días</h3>';
    /* todas las barras se miden contra el día más caro, para que sean comparables entre sí */
    const maxD=Math.max(1,...S.days.map(d=>d.tot));
    S.days.forEach((d,i)=>{
      h+='<div class="dday'+(d.tot?"":" zero")+'"><div class="top"><span>Día '+(i+1)+' · '+d.fecha+' · '+d.ciudad+'</span><b>¥'+num(d.tot)+'</b></div>'
        +'<div class="stack" style="width:'+(d.tot?Math.max(2,d.tot/maxD*100):100)+'%">';
      if(d.tot)for(const c in CATS){const v=d.dt[c]||0;if(v>0)
        h+='<i style="width:'+(v/d.tot*100)+'%;background:'+CATS[c].col+'" title="'+CATS[c].lb+': ¥'+num(v)+'"></i>';}
      h+='</div></div>';});
    h+='<div class="glegend">';
    for(const c in CATS)h+='<span><i style="background:'+CATS[c].col+'"></i>'+CATS[c].lb+'</span>';
    h+='</div></div>';
  } else {
    S.days.forEach((d,i)=>{h+='<div class="gcard"><h3>'+ic("calendar")+' Día '+(i+1)+' · '+d.fecha+' · '+d.ciudad+'</h3><div class="gsub">Total del día: ¥'+num(d.tot)+'</div>'+catBars(d.dt)+'</div>';});
  }
  h+='<div class="endday">Los gastos se editan en cada sitio, tramo o comida, y en "Gastos extra del día".</div>';
  const main=document.getElementById("main");main.innerHTML=h;
  main.querySelectorAll("[data-f]").forEach(b=>b.addEventListener("click",()=>{gFilter=b.dataset.f;renderGastos();}));
}

/* ---------- BIND (día) ---------- */
function bindDay(day){const d=ds(day.id),main=document.getElementById("main");
  document.getElementById("startInput").addEventListener("change",e=>{d.start=e.target.value;save();renderDay();});
  main.querySelectorAll(".head").forEach(el=>attachHead(day,el));
  main.querySelectorAll("[data-copy]").forEach(b=>b.addEventListener("click",e=>{e.stopPropagation();copy(decodeURIComponent(b.dataset.copy));}));
  main.querySelectorAll("[data-editvisit]").forEach(b=>b.addEventListener("click",e=>{e.stopPropagation();const it=itemById(day,b.dataset.editvisit),v=prompt("Minutos en "+(it.nombre||it.label)+":",visitMin(day,it));if(v===null)return;const n=parseInt(v,10);if(isNaN(n))delete d.visitas[it.id];else d.visitas[it.id]=n;save();renderDay();}));
  main.querySelectorAll("[data-hide]").forEach(b=>b.addEventListener("click",e=>{e.stopPropagation();const id=b.dataset.hide;if(d.hidden[id])delete d.hidden[id];else d.hidden[id]=true;save();renderDay();}));
  main.querySelectorAll("[data-legk]").forEach(b=>b.addEventListener("click",()=>{d.modos[b.dataset.legk]=b.dataset.m;save();renderDay();if(document.getElementById("mapWrap").classList.contains("open"))drawMap(day);}));
  main.querySelectorAll("[data-editleg]").forEach(b=>b.addEventListener("click",()=>{const k=b.dataset.editleg,v=prompt("Minutos de este tramo:",b.textContent.replace(/\D/g,""));if(v===null)return;const n=parseInt(v,10);if(isNaN(n))delete d.tiempos[k];else d.tiempos[k]=n;save();renderDay();}));
  main.querySelectorAll("[data-legcost]").forEach(b=>b.addEventListener("click",()=>{const k=b.dataset.legcost,arr=d.gastos[k]||[],cur=arr[0]||{label:"Trayecto",amount:null};
    gastoDialog("Coste del trayecto",cur,g=>{d.gastos[k]=[g];save();renderDay();},arr.length?()=>{delete d.gastos[k];save();renderDay();}:null);}));
  main.querySelectorAll("[data-gadd]").forEach(b=>b.addEventListener("click",()=>{const it=itemById(day,b.dataset.gadd);
    gastoDialog("Nuevo gasto",null,g=>{materialG(day,it).push(g);save();renderDay();});}));
  main.querySelectorAll("[data-gedit]").forEach(b=>b.addEventListener("click",()=>{const p=b.dataset.gedit.split("|"),arr=materialG(day,itemById(day,p[0])),i=+p[1],g=arr[i];
    gastoDialog("Editar gasto",g,ng=>{arr[i]=ng;save();renderDay();},()=>{arr.splice(i,1);save();renderDay();});}));
  main.querySelectorAll("[data-gdel]").forEach(b=>b.addEventListener("click",()=>{const p=b.dataset.gdel.split("|"),arr=materialG(day,itemById(day,p[0]));arr.splice(+p[1],1);save();renderDay();}));
  main.querySelectorAll("[data-addextra]").forEach(b=>b.addEventListener("click",()=>{gastoDialog("Gasto extra del día",null,g=>{d.extras.push(g);save();renderDay();});}));
  main.querySelectorAll("[data-editextra]").forEach(b=>b.addEventListener("click",()=>{const i=+b.dataset.editextra,g=d.extras[i];
    gastoDialog("Editar gasto extra",g,ng=>{d.extras[i]=ng;save();renderDay();},()=>{d.extras.splice(i,1);save();renderDay();});}));
  main.querySelectorAll("[data-delextra]").forEach(b=>b.addEventListener("click",()=>{d.extras.splice(+b.dataset.delextra,1);save();renderDay();}));
  /* selector de "qué hemos comido". El click se para aquí para que no cierre la tarjeta. */
  main.querySelectorAll("[data-comsel]").forEach(sel=>{
    sel.addEventListener("click",e=>e.stopPropagation());
    sel.addEventListener("change",async e=>{
      const it=itemById(day,sel.dataset.comsel),v=sel.value,prev=d.comidas[it.id];
      if(v==="__mantener__")return;
      if(v==="__nuevo__"){dlgNuevoSitio(day,it);return;}
      /* si se abandona un sitio propio, su foto se va con él: si no, quedaría huérfana
         ocupando sitio en IndexedDB para siempre */
      if(prev&&prev.nuevo&&prev.nuevo.foto)await fotoDel(prev.nuevo.foto);
      if(!v)delete d.comidas[it.id];else d.comidas[it.id]={rid:v};
      save();renderDay();});});
  main.querySelectorAll("[data-comficha]").forEach(b=>b.addEventListener("click",e=>{e.stopPropagation();fichaRest(restById(b.dataset.comficha));}));
  main.querySelectorAll("[data-comedit]").forEach(b=>b.addEventListener("click",e=>{e.stopPropagation();dlgNuevoSitio(day,itemById(day,b.dataset.comedit));}));
  pintaFotos(main);
  const wrap=document.getElementById("mapWrap");
  document.getElementById("mapToggle").addEventListener("click",()=>{wrap.classList.toggle("open");if(wrap.classList.contains("open"))requestAnimationFrame(()=>{drawMap(day);bindMap(day);});});
  document.getElementById("zin").addEventListener("click",()=>mapZoom(day,1));
  document.getElementById("zout").addEventListener("click",()=>mapZoom(day,-1));
  document.getElementById("zfit").addEventListener("click",()=>{delete mapState[day.id];mapSel=null;drawMap(day);});
  document.getElementById("locBtn").addEventListener("click",()=>locate(day));
}
/* tap = expandir · long-press = arrastrar */
function attachHead(day,head){const d=ds(day.id),item=head.parentElement,id=head.dataset.id;let timer=null,startY=0,dragging=false,moved=false;
  head.addEventListener("pointerdown",e=>{if(e.target.closest("button")||e.target.closest("[data-copy]"))return;startY=e.clientY;moved=false;
    timer=setTimeout(()=>{dragging=true;beginDrag(day,item,e.clientY);},380);});
  head.addEventListener("pointermove",e=>{if(dragging){dragMove(e.clientY);return;}if(Math.abs(e.clientY-startY)>8){moved=true;clearTimeout(timer);}});
  head.addEventListener("pointerup",e=>{clearTimeout(timer);if(dragging){dragging=false;endDrag(day);return;}if(!moved&&!e.target.closest("button")){d._open[id]=!d._open[id];item.classList.toggle("open");}});
  head.addEventListener("pointercancel",()=>{clearTimeout(timer);if(dragging){dragging=false;endDrag(day);}});
}
/* Drag&drop */
let drag=null;
function beginDrag(day,item,y){document.body.classList.add("dragging");
  const line=document.createElement("div");line.className="dropline";
  drag={day,item,id:item.dataset.id,y0:y,dy:0,line:line,target:null};
  item.classList.add("drag");item.after(line);
  if(navigator.vibrate)navigator.vibrate(15);}
function dragMove(y){if(!drag)return;drag.dy=y-drag.y0;drag.item.style.transform="translateY("+drag.dy+"px)";
  const list=document.getElementById("list");if(!list)return;
  const items=[...list.querySelectorAll(".item")].filter(el=>el!==drag.item);
  let target=null;
  for(const el of items){const r=el.getBoundingClientRect();if(y<r.top+r.height/2){target=el;break;}}
  drag.target=target;
  // mover la línea indicadora a la posición de destino
  if(target)list.insertBefore(drag.line,target);else list.appendChild(drag.line);}
function endDrag(day){document.body.classList.remove("dragging");if(!drag)return;
  if(drag.line&&drag.line.parentElement)drag.line.remove();
  drag.item.style.transform="";drag.item.classList.remove("drag");
  const d=ds(day.id),ord=orderedIds(day),from=ord.indexOf(drag.id);
  if(from>=0)ord.splice(from,1);
  if(drag.target){const ti=ord.indexOf(drag.target.dataset.id);ord.splice(ti<0?ord.length:ti,0,drag.id);}else ord.push(drag.id);
  d.order=ord;save();drag=null;renderDay();}

/* ---------- MAPA ---------- */
function project(lng,lat,z){var s=256*Math.pow(2,z);var x=(lng+180)/360*s;var sl=Math.sin(lat*Math.PI/180);var y=(0.5-Math.log((1+sl)/(1-sl))/(4*Math.PI))*s;return[x,y];}
function locSeq(day){return visibleSeq(day).filter(o=>o.isLoc).map(o=>o.it);}
function fitZoom(pts,W,H){for(var z=17;z>=3;z--){var xs=[],ys=[];pts.forEach(p=>{var xy=project(p[0],p[1],z);xs.push(xy[0]);ys.push(xy[1]);});if(Math.max.apply(0,xs)-Math.min.apply(0,xs)<=W-60&&Math.max.apply(0,ys)-Math.min.apply(0,ys)<=H-84)return z;}return 3;}
function initMap(day,W,H){const pts=locSeq(day).map(it=>it.gcj),z=fitZoom(pts,W,H),xs=[],ys=[];pts.forEach(p=>{const xy=project(p[0],p[1],z);xs.push(xy[0]);ys.push(xy[1]);});mapState[day.id]={z,cx:(Math.min.apply(0,xs)+Math.max.apply(0,xs))/2,cy:(Math.min.apply(0,ys)+Math.max.apply(0,ys))/2};}
function drawMap(day){const cv=document.getElementById("mapCanvas");if(!cv)return;const W=cv.clientWidth,H=cv.clientHeight;if(!W)return;if(!mapState[day.id])initMap(day,W,H);
  const ms=mapState[day.id],z=ms.z,n=Math.pow(2,z),left=ms.cx-W/2,top=ms.cy-H/2,P=(lng,lat)=>{const xy=project(lng,lat,z);return[xy[0]-left,xy[1]-top];};
  let html="";const tx0=Math.floor(left/256),tx1=Math.floor((left+W)/256),ty0=Math.floor(top/256),ty1=Math.floor((top+H)/256);
  for(let tx=tx0;tx<=tx1;tx++)for(let ty=ty0;ty<=ty1;ty++){if(ty<0||ty>=n)continue;const wx=((tx%n)+n)%n;html+='<img class="tile" style="left:'+(tx*256-left)+'px;top:'+(ty*256-top)+'px" src="https://webrd0'+((wx%4)+1)+'.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x='+wx+'&y='+ty+'&z='+z+'">';}
  const acc=getComputedStyle(document.body).getPropertyValue('--accent').trim()||'#a5282a';const seq=locSeq(day);let paths="";
  for(let i=0;i<seq.length-1;i++){const L=legData(day,seq[i].id,seq[i+1].id),g=(legMode(day,L)==="walk"&&L.geomWalk)?L.geomWalk:(L.geomDrive||[seq[i].gcj,seq[i+1].gcj]);let pts="";[seq[i].gcj].concat(g,[seq[i+1].gcj]).forEach(c=>{const s=P(c[0],c[1]);pts+=s[0].toFixed(1)+","+s[1].toFixed(1)+" ";});paths+='<polyline points="'+pts+'" fill="none" stroke="'+acc+'" stroke-width="4" stroke-opacity="0.85" stroke-linecap="round" stroke-linejoin="round"/>';}
  html+='<svg class="route" width="'+W+'" height="'+H+'">'+paths+'</svg>';
  seq.forEach((it,i)=>{const s=P(it.gcj[0],it.gcj[1]);html+='<div class="pin" data-pin="'+i+'" style="left:'+s[0]+'px;top:'+s[1]+'px"><svg width="27" height="27" viewBox="0 0 27 27"><path d="M13.5 1C7.7 1 3 5.7 3 11.5 3 19 13.5 26 13.5 26S24 19 24 11.5C24 5.7 19.3 1 13.5 1z" fill="'+acc+'"/></svg><b>'+(i+1)+'</b></div>';});
  /* restaurantes de la ciudad del día, en color distinto al de la ruta */
  const food=getComputedStyle(document.body).getPropertyValue('--food').trim()||'#0f7b6c';
  const cafe=getComputedStyle(document.body).getPropertyValue('--cafe').trim()||'#b5651d';
  const rests=(COMER[day.ciudad]||[]).filter(r=>r.gcj);
  /* Cafetería y restaurante se distinguen por DOS cosas a la vez, color y forma del hueco
     blanco (taza alta / círculo), porque a 23 px y en el móvil al sol el color solo no basta. */
  rests.forEach(r=>{const s=P(r.gcj[0],r.gcj[1]);
    const col=r.cafe?cafe:food;
    const glifo=r.cafe?'<rect x="10.5" y="8" width="6" height="7" rx="1.4" fill="#fff"/><rect x="16.6" y="9.6" width="2.6" height="3.4" rx="1.3" fill="#fff"/>'
                     :'<circle cx="13.5" cy="11.5" r="4" fill="#fff"/>';
    html+='<div class="rpin'+(r.cafe?" cafe":"")+'" data-rpin="'+r.id+'" style="left:'+s[0]+'px;top:'+s[1]+'px"><svg width="23" height="23" viewBox="0 0 27 27"><path d="M13.5 1C7.7 1 3 5.7 3 11.5 3 19 13.5 26 13.5 26S24 19 24 11.5C24 5.7 19.3 1 13.5 1z" fill="'+col+'"/>'+glifo+'</svg></div>';});
  if(rests.length)html+='<div class="maplegend">'
    +'<span><i style="background:'+food+'"></i>Restaurante</span>'
    +(rests.some(r=>r.cafe)?'<span><i class="sq" style="background:'+cafe+'"></i>Cafetería</span>':'')+'</div>';
  if(mapSelR){const r=rests.find(x=>x.id===mapSelR);
    if(r){const s=P(r.gcj[0],r.gcj[1]);const p=r.precioReal!=null?r.precioReal:r.precio;
      html+='<div class="bubble" style="left:'+s[0]+'px;top:'+s[1]+'px"><span class="x" data-closebubble="1">'+ic("x")+'</span>'
        +'<b>'+esc(r.nombre)+'</b><div style="opacity:.7">'+esc(r.cn)+'</div>'
        +'<div style="opacity:.7">'+esc(r.cafe?"Cafetería":"Restaurante")+' · '+esc(r.tipo)+'</div>'
        +(p!=null?'<div class="bprecio">'+ic("wallet")+'¥'+p+' por persona<small>'+(r.precioReal!=null?" (real)":" (estimado)")+'</small></div>':'')
        +(r.nota!=null?'<div style="opacity:.7">★ '+r.nota+' sobre 5</div>':'')
        +'<button class="verficha" data-verficha="'+r.id+'">'+ic("info")+'Ver ficha</button></div>';}}
  if(userGCJ){const s=P(userGCJ[0],userGCJ[1]);html+='<div class="me" style="left:'+s[0]+'px;top:'+s[1]+'px"></div>';}
  if(mapSel!=null&&seq[mapSel]){const it=seq[mapSel],s=P(it.gcj[0],it.gcj[1]);let info="";if(it.horario)info+='<div>'+it.horario+'</div>';const gt=sum(gastosOf(day,it));if(gt)info+='<div>Entrada ¥'+num(gt)+'</div>';
    html+='<div class="bubble" style="left:'+s[0]+'px;top:'+s[1]+'px"><span class="x" data-closebubble="1">'+ic("x")+'</span><b>'+(mapSel+1)+'. '+it.nombre+'</b>'+(it.cn?'<div style="opacity:.7">'+it.cn+'</div>':'')+'<div style="opacity:.7">'+it.tipo+'</div>'+info+'</div>';}
  cv.innerHTML=html;
  cv.querySelectorAll(".pin").forEach(p=>p.addEventListener("click",e=>{e.stopPropagation();mapSel=+p.dataset.pin;mapSelR=null;drawMap(day);}));
  cv.querySelectorAll(".rpin").forEach(p=>p.addEventListener("click",e=>{e.stopPropagation();mapSelR=p.dataset.rpin;mapSel=null;drawMap(day);}));
  const vf=cv.querySelector("[data-verficha]");if(vf)vf.addEventListener("click",e=>{e.stopPropagation();fichaRest(restById(vf.dataset.verficha));});
  const xb=cv.querySelector("[data-closebubble]");if(xb)xb.addEventListener("click",e=>{e.stopPropagation();mapSel=null;mapSelR=null;drawMap(day);});
}
function mapZoom(day,dz){const ms=mapState[day.id];if(!ms)return;const nz=Math.max(4,Math.min(18,ms.z+dz)),f=Math.pow(2,nz-ms.z);ms.cx*=f;ms.cy*=f;ms.z=nz;drawMap(day);}
function bindMap(day){const cv=document.getElementById("mapCanvas");if(!cv||cv._b)return;cv._b=1;const ptrs=new Map();let dr=null,pinch=null;
  cv.addEventListener("pointerdown",e=>{ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});cv.setPointerCapture(e.pointerId);if(ptrs.size===2){const v=[...ptrs.values()],ms=mapState[day.id];pinch={d:Math.hypot(v[0].x-v[1].x,v[0].y-v[1].y),z:ms.z,cx:ms.cx,cy:ms.cy};dr=null;}else{dr={x:e.clientX,y:e.clientY};cv.style.cursor="grabbing";}});
  cv.addEventListener("pointermove",e=>{if(!ptrs.has(e.pointerId))return;ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});const ms=mapState[day.id];if(ptrs.size>=2&&pinch){const v=[...ptrs.values()],dd=Math.hypot(v[0].x-v[1].x,v[0].y-v[1].y),nz=Math.max(4,Math.min(18,Math.round(pinch.z+Math.log(dd/pinch.d)/Math.LN2)));if(nz!==ms.z){const f=Math.pow(2,nz-pinch.z);ms.z=nz;ms.cx=pinch.cx*f;ms.cy=pinch.cy*f;drawMap(day);}}else if(dr){ms.cx-=e.clientX-dr.x;ms.cy-=e.clientY-dr.y;dr={x:e.clientX,y:e.clientY};drawMap(day);}});
  const end=e=>{ptrs.delete(e.pointerId);if(ptrs.size<2)pinch=null;if(ptrs.size===0){dr=null;cv.style.cursor="grab";}};
  cv.addEventListener("pointerup",end);cv.addEventListener("pointercancel",end);}
function locate(day){if(!navigator.geolocation){toast("GPS no disponible");return;}toast("Buscando ubicación…");navigator.geolocation.getCurrentPosition(p=>{userGCJ=wgs2gcj(p.coords.longitude,p.coords.latitude);const ms=mapState[day.id];if(ms){const xy=project(userGCJ[0],userGCJ[1],ms.z);ms.cx=xy[0];ms.cy=xy[1];}drawMap(day);toast("Ubicación encontrada");},e=>toast("No se pudo obtener el GPS"),{enableHighAccuracy:true,timeout:10000});}

render();
/* lo que ya hubiera guardado en este móvil entra en el registro antes de traer nada de fuera */
stampChanges();
document.getElementById("syncBtn").onclick=()=>{if(!sb)syncDialog();else doSync();};
document.getElementById("syncBtn").addEventListener("contextmenu",e=>{e.preventDefault();syncDialog();});
paintSync();
if(sb)doSync(true);
window.addEventListener("online",()=>{if(sb)doSync(true);});
document.addEventListener("visibilitychange",()=>{if(!document.hidden&&sb)doSync(true);});
document.getElementById("verBtn").onclick=()=>chkVer();
if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(()=>{});}
</script>
